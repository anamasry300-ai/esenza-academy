{title:{ar:'عجلة النكهات — Flavor Wheel',en:'The Flavor Wheel'},img:5,body:'<h3>🎨 عجلة نكهات القهوة — دليل التذوق</h3><p>عجلة النكهات (Coffee Flavor Wheel) طورها SCA بالتعاون مع World Coffee Research. تصنف النكهات هرمياً من عام إلى خاص. تبدأ من الوسط وتتوسع إلى الخارج.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🎨 عجلة نكهات القهوة SCA — من العام إلى الخاص</div></div><p><strong>كيف تستخدم عجلة النكهات:</strong></p><ol style="margin:12px 0 12px 20px"><li><strong>الرائحة أولاً:</strong> شم القهوة المطحونة جافة، ثم بعد صب الماء، ثم بعد التحريك</li><li><strong>حدد الفئة العامة:</strong> فاكهي؟ زهري؟ شوكولاتي؟ متبل؟</li><li><strong>توسع للخارج:</strong> إذا فاكهي —> حمضيات؟ توت؟ فواكه استوائية؟</li><li><strong>سجل بدقة:</strong> استخدم مصطلحات محددة. ليس "طعمها حلو" بل "تذكرني بنكهة الكرز الأسود مع لمسة شوكولاتة داكنة"</li></ol><div class="hl"><strong>📊 المركبات الكيميائية المسؤولة:</strong> الليمونين (ليمون) ← Terpenes · الإيثيل أسيتات (فواكه) ← Esters · الغاياكول (مدخن) ← Phenols · ثنائي الأسيتيل (زبدة) ← Diketones · الإيثيل فانيلين (فانيليا) ← Aldehydes</div><div class="q-section"><div class="q-q"><div class="q-t">📝 تمرين تذوق</div><p style="font-size:.9rem;color:#6d4c41">جرب قهوتين مختلفتين جنباً إلى جنب. أغمض عينيك واشم أولاً. صف رائحة كل منهما بكلمة واحدة. ثم ذق وابحث في العجلة عن النكهة الأقرب. سجل كل شيء.</p></div></div>,body_en:'<h3>🎨 Coffee Flavor Wheel — Tasting Guide</h3><p>The Coffee Flavor Wheel was developed by SCA in collaboration with World Coffee Research. It classifies flavors hierarchically from general to specific.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🎨 SCA Coffee Flavor Wheel — from general to specific</div></div><p><strong>How to use the Flavor Wheel:</strong></p><ol style="margin:12px 0 12px 20px"><li><strong>Aroma first:</strong> Smell dry grounds, then after pouring water, then after stirring</li><li><strong>Identify the general category:</strong> Fruity? Floral? Chocolate? Spicy?</li><li><strong>Expand outward:</strong> If fruity — citrus? Berries? Tropical fruits?</li><li><strong>Be precise:</strong> Use specific terms. Not \"it tastes sweet\" but \"reminds me of black cherry with dark chocolate\"</li></ol><div class="hl"><strong>📊 Chemical Compounds:</strong> Limonene (lemon) = Terpenes . Ethyl acetate (fruits) = Esters . Guaiacol (smoky) = Phenols . Diacetyl (butter) = Diketones . Ethyl vanillin (vanilla) = Aldehydes</div><div class="q-section"><div class="q-q"><div class="q-t">📝 Tasting Exercise</div><p style="font-size:.9rem;color:#6d4c41">Try two different coffees side by side. Close your eyes and smell first. Describe each aroma in one word. Taste and find the closest flavor on the wheel. Record everything.</p></div></div>'},
{title:{ar:'بروتوكول الكابينج — خطوة بخطوة',en:'Cupping Protocol — Step by Step'},img:5,body:'<h3>📋 بروتوكول الكابينج الرسمي SCA</h3><p>بروتوكول الكابينج موحد لضمان العدالة والموضوعية في التقييم. إليك الخطوات الرسمية حسب SCA:</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">📋 طاولة كابينج احترافية — 5 أكواب لكل عينة</div></div><p><strong>خطوات الكابينج الرسمي:</strong></p><ol style="margin:12px 0 12px 20px"><li><strong>تحضير العينات:</strong> 8.25 جرام بن + 150 مل ماء عند 93°م (نسبة 1:18.18)</li><li><strong>طحن:</strong> درجة طحن خشنة (مثل ملح البحر) — 70-75% من العينات تمر عبر منخل 20 ميش</li><li><strong>شم الرائحة الجافة:</strong> في غضون 15 دقيقة من الطحن</li><li><strong>صب الماء:</strong> صب الماء على البن وانتظر 4 دقائق</li><li><strong>كسر القشرة (Breaking):</strong> حرك القشرة السطحية بملعقة واشم الرائحة المتصاعدة</li><li><strong>إزالة القشرة:</strong> استخدم ملعقتين لإزالة القشرة والرغوة السطحية</li><li><strong>التذوق:</strong> بعد 10-12 دقيقة من الصب، ابدأ التذوق بسرعة — القهوة تبرد وتتغير</li><li><strong>التقييم:</strong> سجل كل معيار على حدة في ورقة التقييم SCA</li></ol><div class="info-b"><strong>📊 نصائح التذوق الاحترافي:</strong> استخدم ملعقة كابينج عميقة · امص القهوة بقوة مع صوت (Slurp) لرشها على كل براعم الذوق · انتظر 30 ثانية بين كل تذوقة · كل 4 عينات، نظف ذوقك بماء فاتر وخبز محايد.</div><div class="sum"><strong>💡 الخلاصة:</strong> الكابينج ليس مجرد تذوق، إنه نظام تقييم علمي. أتقن البروتوكول لتصبح Q Grader معتمداً من SCA.</div>,body_en:'<h3>📋 Official SCA Cupping Protocol</h3><p>The cupping protocol is standardized to ensure fairness and objectivity in evaluation. Here are the official SCA steps:</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">📋 Professional cupping table — 5 cups per sample</div></div><p><strong>Official Cupping Steps:</strong></p><ol style="margin:12px 0 12px 20px"><li><strong>Sample preparation:</strong> 8.25g coffee + 150ml water at 93°C (1:18.18 ratio)</li><li><strong>Grind:</strong> Coarse (like sea salt) — 70-75% passes through a 20-mesh sieve</li><li><strong>Smell dry fragrance:</strong> Within 15 minutes of grinding</li><li><strong>Pour water:</strong> Pour over grounds and wait 4 minutes</li><li><strong>Break the crust:</strong> Stir surface crust with a spoon and smell rising aromas</li><li><strong>Remove crust:</strong> Use two spoons to remove crust and foam</li><li><strong>Taste:</strong> After 10-12 minutes from pour, start tasting quickly — coffee cools and changes</li><li><strong>Evaluate:</strong> Score each criterion on the SCA evaluation form</li></ol><div class="info-b"><strong>📊 Professional Tasting Tips:</strong> Use a deep cupping spoon . Slurp forcefully to spray coffee across all taste buds . Wait 30 seconds between tastings . After 4 samples, clean palette with warm water and neutral bread.</div><div class="sum"><strong>💡 Summary:</strong> Cupping is not just tasting, it is a scientific evaluation system. Master the protocol to become an SCA-certified Q Grader.</div>'},
]},
{id:'module-C2',title:{ar:'إدارة المقهى الاحترافية',en:'Professional Cafe Management'},icon:'📊',desc:{ar:'إدارة العمليات والتكاليف في عالم القهوة',en:'Operations and Cost Management in the Coffee World'},img:4,lessons:[
{title:{ar:'اختيار مصادر البن والتجارة العادلة',en:'Coffee Sourcing and Fair Trade'},img:9,body:'<h3>🌍 من المزرعة إلى المقهى — سلسلة التوريد</h3><p>اختيار مصدر البن هو أهم قرار في المقهى. سلسلة التوريد: المزرعة → المعالجة → الوسيط → المستورد → المحمصة → المقهى. كل وسيط يضيف 10-20% للسعر.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80" alt=""><div class="cap">🌍 سلسلة توريد القهوة من المزرعة إلى الفنجان</div></div><p><strong>شهادات الاستدامة:</strong></p><ul><li><strong>Direct Trade:</strong> المقهى يشتري مباشرة من المزرعة — أعلى جودة، أعلى سعر، علاقة مباشرة</li><li><strong>Fair Trade:</strong> سعر عادل للمزارع — الحد الأدنى $1.40/باوند للأرابيكا، $1.01 للروبوستا</li><li><strong>Rainforest Alliance:</strong> تحافظ على الغابات المطيرة — 30% من إنتاج القهوة العالمي</li><li><strong>Organic:</strong> زراعة عضوية بدون مبيدات — 10% من الإنتاج العالمي</li></ul><div class="info-b"><strong>📊 أسعار البن 2024-2025:</strong> الأرابيكا التجارية: $2.5-3.5/باوند · Specialty: $5-12/باوند · Direct Trade الفاخر: $15-40/باوند (مثل Panama Geisha الذي قد يصل إلى $600/باوند في المزادات!).</div><div class="err"><strong>❌ خطأ شائع:</strong> افتراض أن السعر الأعلى = جودة أعلى دائماً. السعر يعكس أيضاً الندرة والتكاليف اللوجستية. اعرف من تتعامل معه واطلب عينات قبل الشراء.</div>,body_en:'<h3>🌍 From Farm to Cafe — Supply Chain</h3><p>Choosing the coffee source is the most important decision for a cafe. Supply chain: Farm → Processing → Broker → Importer → Roaster → Cafe. Each intermediary adds 10-20% to the price.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80" alt=""><div class="cap">🌍 Coffee supply chain from farm to cup</div></div><p><strong>Sustainability Certifications:</strong></p><ul><li><strong>Direct Trade:</strong> Cafe buys directly from farm — highest quality, highest price, direct relationship</li><li><strong>Fair Trade:</strong> Fair price for farmers — minimum $1.40/lb for Arabica, $1.01 for Robusta</li><li><strong>Rainforest Alliance:</strong> Protects rainforests — 30% of global coffee production</li><li><strong>Organic:</strong> Organic farming without pesticides — 10% of global production</li></ul><div class="info-b"><strong>📊 Coffee Prices 2024-2025:</strong> Commercial Arabica: $2.5-3.5/lb . Specialty: $5-12/lb . Premium Direct Trade: $15-40/lb (Panama Geisha can reach $600/lb at auctions!).</div><div class="err"><strong>❌ Common Mistake:</strong> Assuming higher price always means higher quality. Price also reflects scarcity and logistics costs. Know your supplier and request samples before purchasing.</div>'},
{title:{ar:'حساب التكاليف وإدارة المخزون',en:'Cost Calculation and Inventory Management'},img:8,body:'<h3>💰 اقتصاديات المقهى — من التكلفة إلى الربح</h3><p>فهم التكاليف ضروري لاستمرارية المقهى. كلفة فنجان القهوة لا تقتصر على البن فقط.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">📊 تحليل تكلفة فنجان القهوة</div></div><p><strong>توزيع تكلفة الفنجان (مثال):</strong></p><ul><li>البن: 12-18 جرام بـ $0.15-0.30 للفنجان (8-12% من سعر البيع)</li><li>الحليب: $0.10-0.20 للفنجان (للمشروبات بالحليب)</li><li>الكوب والغطاء: $0.05-0.15</li><li>العمالة: $0.50-1.00 للفنجان (أكبر تكلفة تشغيلية)</li><li>الإيجار والمصاريف: $0.30-0.80 للفنجان</li></ul><table><tr><th>المشروب</th><th>تكلفة المواد</th><th>سعر البيع</th><th>هامش الربح</th></tr><tr><td>إسبريسو</td><td>$0.20</td><td>$2.50-3.50</td><td>85-92%</td></tr><tr><td>لاتيه</td><td>$0.45</td><td>$4.50-6.00</td><td>87-92%</td></tr><tr><td>V60 Specialty</td><td>$0.80-1.50</td><td>$5.00-8.00</td><td>70-84%</td></tr></table><div class="hl"><strong>💡 قاعدة 30%:</strong> تكلفة البن يجب ألا تتجاوز 30% من سعر بيع الفنجان. إذا اشتريت بناً بـ $8/باوند، كلفة 18 جرام = $0.32. أقل سعر بيع = $0.32 ÷ 0.30 = $1.07. أضف الحليب والتكاليف الأخرى للوصول للسعر النهائي.</div><div class="sum"><strong>💡 الخلاصة:</strong> المقهى الناجح = جودة عالية + تكاليف مضبوطة + تجربة مميزة. البن الجيد يجذب الزبائن، لكن الإدارة الجيدة تبقي المقهى مفتوحاً.</div>,body_en:'<h3>💰 Cafe Economics — From Cost to Profit</h3><p>Understanding costs is essential for cafe sustainability. The cost of a cup of coffee goes beyond just beans.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">📊 Cost analysis of a cup of coffee</div></div><p><strong>Cost breakdown per cup (example):</strong></p><ul><li>Coffee: 12-18g at $0.15-0.30 per cup (8-12% of selling price)</li><li>Milk: $0.10-0.20 per cup (for milk-based drinks)</li><li>Cup and lid: $0.05-0.15</li><li>Labor: $0.50-1.00 per cup (largest operating cost)</li><li>Rent and overhead: $0.30-0.80 per cup</li></ul><table><tr><th>Drink</th><th>Material Cost</th><th>Selling Price</th><th>Profit Margin</th></tr><tr><td>Espresso</td><td>$0.20</td><td>$2.50-3.50</td><td>85-92%</td></tr><tr><td>Latte</td><td>$0.45</td><td>$4.50-6.00</td><td>87-92%</td></tr><tr><td>V60 Specialty</td><td>$0.80-1.50</td><td>$5.00-8.00</td><td>70-84%</td></tr></table><div class="hl"><strong>💡 30% Rule:</strong> Coffee cost should not exceed 30% of the cup selling price. If you buy beans at $8/lb, 18g costs $0.32. Minimum selling price = $0.32 / 0.30 = $1.07. Add milk and other costs.</div><div class="sum"><strong>💡 Summary:</strong> Successful cafe = high quality + controlled costs + unique experience. Good coffee attracts customers, but good management keeps the cafe open.</div>'},
{title:{ar:'تدريب فريق الباريستا ومعايير الجودة',en:'Barista Team Training and Quality Standards'},img:8,body:'<h3>👥 بناء فريق باريستا احترافي</h3><p>فريق الباريستا هو وجه المقهى. تدريبهم وتقييمهم المستمر يضمن جودة ثابتة وتجربة زبون ممتازة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1559056199-641a0ac8b55e?w=600&q=80" alt=""><div class="cap">👥 فريق باريستا محترف في العمل</div></div><p><strong>برنامج تدريب الباريستا الأساسي (أسبوعان):</strong></p><ul><li>اليوم 1-2: نظرية القهوة (أصول، أنواع، تحميص) + اختبار نظري</li><li>اليوم 3-4: تشغيل الماكينة (طحن، جرع، ضبط) + تدريب عملي</li><li>اليوم 5-6: تبخير الحليب و Latte Art الأساسي</li><li>اليوم 7-8: المشروبات (إسبريسو، لاتيه، كابتشينو، موكا)</li><li>اليوم 9-10: النظافة، الصيانة، خدمة الزبائن، طلب الرصيد</li></ul><div class="info-b"><strong>📊 نظام تقييم الجودة اليومي:</strong> كل صباح، اسحب إسبريسو تجريبي وقيّمه: الوقت (25-30 ث) · اللون (بني ذهبي) · الكريما (3-5 مم، مستمرة) · الطعم (توازن بين الحموضة والحلاوة والمرارة). سجل في دفتر الجودة اليومي.</div><div class="err"><strong>❌ خطأ شائع:</strong> تدريب الباريستا الجديد على ماكينة الإسبريسو فقط. الباريستا المحترف يجب أن يتقن كل طرق التحضير: V60، Chemex، AeroPress، Cold Brew.</div><div class="hl"><strong>💡 نصيحة:</strong> اعمل جلسة تذوق أسبوعية للفريق. كل باريستا يحضر قهوته ويتذوقها الفريق ويناقش النكهات. هذا يبني لغة نكهات مشتركة ويرفع مستوى الفريق كله.</div>,body_en:'<h3>👥 Building a Professional Barista Team</h3><p>The barista team is the face of the cafe. Continuous training and evaluation ensures consistent quality and excellent customer experience.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1559056199-641a0ac8b55e?w=600&q=80" alt=""><div class="cap">👥 Professional barista team at work</div></div><p><strong>Basic Barista Training Program (2 weeks):</strong></p><ul><li>Day 1-2: Coffee theory (origins, types, roasting) + written test</li><li>Day 3-4: Machine operation (grinding, dosing, calibration) + practical training</li><li>Day 5-6: Milk steaming and basic Latte Art</li><li>Day 7-8: Beverages (espresso, latte, cappuccino, mocha)</li><li>Day 9-10: Hygiene, maintenance, customer service, inventory management</li></ul><div class="info-b"><strong>📊 Daily Quality Evaluation:</strong> Each morning, pull a test espresso and evaluate: time (25-30 sec) . color (golden brown) . crema (3-5mm, consistent) . taste (balance of acidity, sweetness, bitterness). Record in daily quality log.</div><div class="err"><strong>❌ Common Mistake:</strong> Training new baristas only on the espresso machine. A professional barista must master all brewing methods: V60, Chemex, AeroPress, Cold Brew.</div><div class="hl"><strong>💡 Tip:</strong> Hold weekly team tasting sessions. Each barista prepares their coffee and the team discusses flavors. This builds a shared flavor language and raises the entire team level.</div>'},
]},
{id:'module-C3',title:{ar:'معالجة البن المتقدمة',en:'Advanced Coffee Processing'},icon:'🧪',desc:{ar:'طرق المعالجة والتخمير وتأثيرها على النكهة',en:'Processing and Fermentation Methods and Their Flavor Impact'},img:2,lessons:[
{title:{ar:'طرق المعالجة — مغسول، طبيعي، عسل',en:'Processing Methods — Washed, Natural, Honey'},img:6,body:'<h3>🧪 طرق معالجة كرزة القهوة</h3><p>بعد حصاد كرز القهوة، يجب إزالة اللب والطبقات المحيطة بالبذرة قبل التحميص. طريقة المعالجة تؤثر بشكل جذري على نكهة القهوة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600&q=80" alt=""><div class="cap">🧪 كرز القهوة قبل المعالجة — تختلف طرق المعالجة حسب المنطقة</div></div><p><strong>الطرق الثلاث الرئيسية:</strong></p><p><strong>1. المعالجة المغسولة (Washed):</strong> تزال القشرة واللب مباشرة، تخمر البذور في الماء 12-36 ساعة، ثم تغسل وتجفف. النتيجة: نكهات نظيفة، حموضة زاهية، Body خفيف.</p><p><strong>2. المعالجة الطبيعية (Natural):</strong> تجفف الكرزة كاملة مع لحمها تحت الشمس 3-4 أسابيع. النتيجة: نكهات فاكهية كثيفة (توت، فراولة)، Body ثقيل، حلاوة عالية.</p><p><strong>3. المعالجة بالعسل (Honey):</strong> تزال القشرة لكن يبقى بعض اللب اللزج (Mucilage) أثناء التجفيف. درجة اللون: أصفر ← أحمر ← أسود حسب كمية اللب المتبقي.</p><table><tr><th>الطريقة</th><th>النكهة</th><th>الجسم (Body)</th><th>الحموضة</th><th>استهلاك الماء</th></tr><tr><td>مغسول</td><td>نظيفة، زهرية</td><td>خفيف</td><td>عالية</td><td>40-50 لتر/كجم</td></tr><tr><td>طبيعي</td><td>فاكهية، كثيفة</td><td>ثقيل</td><td>متوسطة</td><td>0.5-1 لتر/كجم</td></tr><tr><td>عسل</td><td>حلوة، كراميل</td><td>متوسط</td><td>متوسطة-عالية</td><td>5-10 لتر/كجم</td></tr></table><div class="info-b"><strong>📊 مركب كيميائي فريد:</strong> المعالجة الطبيعية تنتج ضعف كمية ester-2-nonenone (نكهة التوت) مقارنة بالمغسولة. المغسولة تنتج ضعف كمية linalool (نكهة زهرية). اختيار طريقة المعالجة هو اختيار النكهة.</div><div class="err"><strong>❌ خطأ شائع:</strong> افتراض أن الطبيعي (Natural) أردأ جودة من المغسول. في الواقع، بعض أغلى أنواع القهوة في العالم (مثل اليمنية والإثيوبية الطبيعية) تُعالج طبيعياً وتعطي أعلى درجات التقييم.</div>,body_en:'<h3>🧪 Coffee Cherry Processing Methods</h3><p>After harvesting coffee cherries, the pulp and layers surrounding the seed must be removed before roasting. The processing method radically affects coffee flavor.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600&q=80" alt=""><div class="cap">🧪 Coffee cherries before processing</div></div><p><strong>The Three Main Methods:</strong></p><p><strong>1. Washed Process:</strong> Skin and pulp removed immediately, seeds fermented in water 12-36 hours, then washed and dried. Result: clean flavors, bright acidity, light body.</p><p><strong>2. Natural Process:</strong> Whole cherry dried under the sun for 3-4 weeks. Result: intense fruity flavors (berry, strawberry), heavy body, high sweetness.</p><p><strong>3. Honey Process:</strong> Skin removed but some sticky mucilage remains during drying. Color grade: yellow → red → black depending on mucilage amount.</p><table><tr><th>Method</th><th>Flavor</th><th>Body</th><th>Acidity</th><th>Water Usage</th></tr><tr><td>Washed</td><td>Clean, floral</td><td>Light</td><td>High</td><td>40-50 L/kg</td></tr><tr><td>Natural</td><td>Fruity, intense</td><td>Heavy</td><td>Medium</td><td>0.5-1 L/kg</td></tr><tr><td>Honey</td><td>Sweet, caramel</td><td>Medium</td><td>Medium-High</td><td>5-10 L/kg</td></tr></table><div class="info-b"><strong>📊 Unique Chemical Compound:</strong> Natural processing produces twice the amount of ester-2-nonenone (berry flavor) compared to washed. Washed produces twice the linalool (floral flavor). Choosing processing method is choosing flavor.</div><div class="err"><strong>❌ Common Mistake:</strong> Assuming Natural is lower quality than Washed. In fact, some of the most expensive coffees (Yemeni and Ethiopian Naturals) are naturally processed and score highest.</div>'},
{title:{ar:'كيمياء التخمير وتأثيره على النكهة',en:'Fermentation Chemistry and Its Effect on Flavor'},img:6,body:'<h3>🔬 التخمير في القهوة — علم النكهات المخمرة</h3><p>التخمير (Fermentation) هو عملية تكسير السكريات في لب الكرزة بواسطة الكائنات الدقيقة (الخمائر والبكتيريا). ينتج مركبات عطرية جديدة لا توجد في القهوة غير المخمرة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">🔬 خزانات تخمير — التحكم في درجة الحرارة والوقت</div></div><p><strong>مركبات التخمير الرئيسية:</strong></p><ul><li><strong>الإيثانول:</strong> يتبخر بالتحميص لكنه ساعد في تكوين استرات</li><li><strong>حمض اللاكتيك:</strong> يعطي نكهة زبادي ناعمة، حموضة كريمية</li><li><strong>حمض الخليك:</strong> بكميات صغيرة يعطي حيوية، بكثرة يفسد القهوة</li><li><strong>الإسترات:</strong> مسؤولة عن نكهات الفواكه الطازجة (تفاح، أناناس)</li></ul><div class="info-b"><strong>📊 العوامل المؤثرة في التخمير:</strong> درجة الحرارة (18-25°م مثالية) · وقت التخمير (12-72 ساعة) · نوع الكائنات الدقيقة (طبيعية أو مُضافة) · الأكسجين (تخمير هوائي أم لاهوائي) · سماكة طبقة اللب. التخمير اللاهوائي (Anaerobic) ينتج نكهات أكثر كثافة وتعقيداً.</div><div class="hl"><strong>💡 اتجاه 2025:</strong> التخمير المُتحكم به (Controlled Fermentation) هو أحدث صيحة في القهوة الفاخرة. بعض المنتجين يضيفون خمائر محددة (Saccharomyces cerevisiae) لتحقيق نكهات معينة — مثل نبيذ القهوة!</div><div class="err"><strong>❌ خطأ شائع:</strong> التخمير الزائد (Over-fermentation) يعطي نكهة خلّية وكحولية غير مرغوبة. علامة التخمير الزائد: رائحة كحول قوية، طعم لاذع، لون بني غامق غير طبيعي للحبة المجففة.</div>,body_en:'<h3>🔬 Fermentation in Coffee — The Science of Fermented Flavors</h3><p>Fermentation is the process of breaking down sugars in the cherry pulp by microorganisms (yeasts and bacteria). It produces new aromatic compounds not found in unfermented coffee.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">🔬 Fermentation tanks — controlling temperature and time</div></div><p><strong>Key Fermentation Compounds:</strong></p><ul><li><strong>Ethanol:</strong> Evaporates during roasting but helped form esters</li><li><strong>Lactic Acid:</strong> Gives smooth yogurt-like flavor, creamy acidity</li><li><strong>Acetic Acid:</strong> Small amounts add vibrancy, too much ruins coffee</li><li><strong>Esters:</strong> Responsible for fresh fruit flavors (apple, pineapple)</li></ul><div class="info-b"><strong>📊 Factors Affecting Fermentation:</strong> Temperature (18-25°C ideal) . Time (12-72 hours) . Microorganism type (natural or added) . Oxygen (aerobic vs anaerobic) . Pulp layer thickness. Anaerobic fermentation produces more complex and intense flavors.</div><div class="hl"><strong>💡 2025 Trend:</strong> Controlled Fermentation is the latest trend in specialty coffee. Some producers add specific yeasts (Saccharomyces cerevisiae) to achieve targeted flavors — like coffee wine!</div><div class="err"><strong>❌ Common Mistake:</strong> Over-fermentation gives vinegary and alcoholic undesirable flavors. Signs: strong alcohol smell, sharp taste, unnatural dark brown color of dried bean.</div>'},
{title:{ar:'تقييم الجودة واختيار الموردين',en:'Quality Assessment and Supplier Selection'},img:1,body:'<h3>📋 نظام تقييم الجودة الشامل</h3><p>تقييم القهوة الخضراء قبل الشراء هو أهم خطوة لضمان جودة المنتج النهائي. يتضمن تقييم الحواس، الفحص الفيزيائي، والتحليل الكيميائي.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">📋 فحص البن الأخضر — المرحلة الأولى لضمان الجودة</div></div><p><strong>معايير فحص البن الأخضر (Green Coffee Grading):</strong></p><table><tr><th>المعيار</th><th>Specialty Grade</th><th>Premium</th><th>تجاري</th></tr><tr><td>عدد العيوب الأولية</td><td>0 كاملة</td><td>0-5</td><td>5+</td></tr><tr><td>عدد العيوب الثانوية</td><td>0-3</td><td>3-8</td><td>8+</td></tr><tr><td>نسبة الرطوبة</td><td>10-12%</td><td>10-12.5%</td><td>9-13%</td></tr><tr><td>النشاط المائي (Aw)</td><td>0.55-0.65</td><td>0.55-0.70</td><td>0.50-0.75</td></tr><tr><td>حجم الحبة (Screen Size)</td><td>>80% فوق 15</td><td>>70% فوق 15</td><td>أي حجم</td></tr></table><p><strong>العيوب الأولية (Primary Defects):</strong> حبة سوداء كاملة، حبة متعفنة، كرزة مجففة، حصاة كبيرة. عيب أولي واحد يخفض القهوة من Specialty إلى Premium.</p><div class="info-b"><strong>📊 أسئلة قبل شراء البن:</strong> 1) ما تاريخ الحصاد؟ (يفضل أقل من 12 شهراً) 2) ما نسبة الرطوبة؟ (10-12% مثالية) 3) هل تم تحليل العيوب؟ 4) هل يوجد عينات محمصة ومتذوقة؟ 5) هل السعر يشمل الشحن؟ 6) ما شروط التخزين عند المورد؟</div><div class="sum"><strong>💡 الخلاصة:</strong> تقييم الجودة ليس رفاهية — هو استثمار. بن جيد يمنحك قهوة ممتازة تبني سمعة المقهى. بن رديء يخسرك الزبائن حتى مع أمهر باريستا.</div><div class="q-section"><div class="q-q"><div class="q-t">📝 مشروع تخرج</div><p style="font-size:.9rem;color:#6d4c41">اجمع 3 عينات بن من 3 موردين مختلفين. قيم كل عينة: 1) الفحص البصري (عيوب، حجم) 2) التحميص التجريبي 3) الكابينج 4) احسب تكلفة الفنجان. قدم تقريراً مقارناً.</p></div></div>,body_en:'<h3>📋 Comprehensive Quality Evaluation System</h3><p>Evaluating green coffee before purchase is the most important step for ensuring final product quality. It includes sensory evaluation, physical inspection, and chemical analysis.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">📋 Green coffee inspection — first step to quality assurance</div></div><p><strong>Green Coffee Grading Criteria:</strong></p><table><tr><th>Criterion</th><th>Specialty Grade</th><th>Premium</th><th>Commercial</th></tr><tr><td>Primary Defects</td><td>0 total</td><td>0-5</td><td>5+</td></tr><tr><td>Secondary Defects</td><td>0-3</td><td>3-8</td><td>8+</td></tr><tr><td>Moisture Content</td><td>10-12%</td><td>10-12.5%</td><td>9-13%</td></tr><tr><td>Water Activity (Aw)</td><td>0.55-0.65</td><td>0.55-0.70</td><td>0.50-0.75</td></tr><tr><td>Screen Size</td><td>80% above 15</td><td>70% above 15</td><td>Any size</td></tr></table><p><strong>Primary Defects:</strong> Full black bean, moldy bean, dried cherry, large stone. One primary defect downgrades coffee from Specialty to Premium.</p><div class="info-b"><strong>📊 Questions Before Buying Coffee:</strong> 1) Harvest date? (under 12 months preferred) 2) Moisture content? (10-12% ideal) 3) Defect analysis done? 4) Roasted and cupped samples available? 5) Price includes shipping? 6) Storage conditions at supplier?</div><div class="sum"><strong>💡 Summary:</strong> Quality evaluation is not luxury — it is an investment. Good coffee gives excellent product that builds cafe reputation. Poor coffee loses customers even with the most skilled barista.</div><div class="q-section"><div class="q-q"><div class="q-t">📝 Final Project</div><p style="font-size:.9rem;color:#6d4c41">Collect 3 coffee samples from 3 different suppliers. Evaluate each: 1) Visual inspection (defects, size) 2) Test roast 3) Cupping 4) Calculate cost per cup. Submit a comprehensive report comparing the three coffees with your final recommendation.</p></div></div>'},
]}

function cRatio(){
  let c=parseFloat($('rc').value),w=parseFloat($('rw').value);
  if(!c||!w){to(__({ar:'⚠️ أدخل القيم',en:'⚠️ Enter values'}));return}
  let r=w/c;
  $('rr').innerHTML='<strong>'+c+' '+__({ar:'جرام بن',en:'g coffee'})+' : '+w+' '+__({ar:'مل ماء',en:'ml water'})+'</strong><br><div style="font-size:1.3rem;color:#3e2312;margin:8px 0">1 : '+r.toFixed(1)+'</div>'+
    (r>=15&&r<=18?'✅ '+__({ar:'نسبة مثالية للـ V60',en:'Ideal V60 ratio'}):'⚠️ '+__({ar:'خارج النطاق المثالي 1:15~1:18',en:'Outside ideal range 1:15~1:18'}));
}
function cTDS(){

function oD(){return new Promise((r,j)=>{let q=indexedDB.open('edb',2);q.onupgradeneeded=e=>{let d=e.target.result;if(!d.objectStoreNames.contains('u'))d.createObjectStore('u',{keyPath:'k'});if(!d.objectStoreNames.contains('c'))d.createObjectStore('c',{keyPath:'k'})};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function gA(s){let d=await oD();return new Promise((r,j)=>{let t=d.transaction(s,'readonly'),q=t.objectStore(s).getAll();q.onsuccess=()=>{d.close();r(q.result)};q.onerror=()=>{d.close();j(q.error)}})}
async function pA(s,v){let d=await oD();return new Promise((r,j)=>{let t=d.transaction(s,'readwrite'),q=t.objectStore(s).put(v);q.onsuccess=()=>{d.close();r()};q.onerror=()=>{d.close();j(q.error)}})}
async function dA(s,k){let d=await oD();return new Promise((r,j)=>{let t=d.transaction(s,'readwrite'),q=t.objectStore(s).delete(k);q.onsuccess=()=>{d.close();r()};q.onerror=()=>{d.close();j(q.error)}})}

async function lS(){

  catch(e){$('sl').innerHTML='<div style="color:#e74c3c;padding:20px;text-align:center">'+__({ar:'⚠️ قاعدة البيانات غير متاحة',en:'⚠️ Database unavailable'})+'</div>'}
}

async function aS(){
  let n=$('ni').value.trim(),u=$('ui').value.trim(),p=$('pi').value.trim();
  if(!n||!u||!p){to(__({ar:'⚠️ املأ جميع الحقول',en:'⚠️ Fill all fields'}));return}

  _d(){
    if(!this._data){
      let r=localStorage.getItem(this._key);
      this._data=r?JSON.parse(r):{xp:0,lv:1,streak:0,lastDate:'',hist:[],badges:[],done:{},certs:0,firstBadge:false};
    }
    return this._data;
  },
  _s(){localStorage.setItem(this._key,JSON.stringify(this._data));},
  addXP(n){
    let d=this._d();
    d.xp+=n;
    let nlv=Math.floor((-1+Math.sqrt(1+8*d.xp/1000))/2)+1;
    if(nlv>d.lv){d.lv=nlv;to('🎉 '+__({ar:'تهانينا! وصلت للمستوى '+nlv+'!',en:'Level Up! You reached Level '+nlv+'!'}))}
    this._s();
  },
  checkStreak(){
    let d=this._d(),td=new Date().toDateString();
    if(d.lastDate!==td){
      let yd=new Date();yd.setDate(yd.getDate()-1);
      if(d.lastDate===yd.toDateString()){d.streak++;if(d.streak===3||d.streak===7||d.streak===14||d.streak===30||d.streak===365)this._badge('streak_'+d.streak)}
      else if(d.lastDate){d.streak=1}
      else{d.streak=1}
      d.lastDate=td;
      if(d.streak>1)this.addXP(d.streak*10);
      else this.addXP(10);
    }
    this._s();
  },
  completeLesson(l,mi,li){
    let d=this._d(),k=l+'-'+mi+'-'+li;
    if(!d.done[k]){d.done[k]=1;this.addXP(100);if(!d.firstBadge){d.firstBadge=true;this._badge('first_brew')}}
    this._s();
  },
  _badge(id){
    let d=this._d(),badges={first_brew:{ar:'☕ أول تحضير',en:'☕ First Brew'},streak_3:{ar:'🔥 3 أيام متتالية',en:'🔥 3-Day Streak'},streak_7:{ar:'🔥🔥 أسبوع',en:'🔥🔥 Weekly Warrior'},streak_14:{ar:'🔥🔥🔥 14 يوم',en:'🔥🔥🔥 Fortress'},streak_30:{ar:'🔥🔥🔥🔥 شهر',en:'🔥🔥🔥🔥 Monthly Master'},streak_365:{ar:'🏆 أسطورة سنة',en:'🏆 Yearly Immortal'},all_modules:{ar:'📚 جميع الموديولات',en:'📚 All Modules'},perfect_exam:{ar:'💯 امتحان كامل',en:'💯 Flawless Exam'}};
    if(!d.badges.includes(id)&&badges[id]){d.badges.push(id);to('🏅 '+__({ar:'إنجاز جديد:',en:'Achievement:'})+' '+__(badges[id]));this.addXP(200)}
  },
  get(){return this._d();}
};
G.checkStreak();

/* ===== Dashboard ===== */
function sD(){
  let g=G.get();
  let xpTot=g.xp, lv=g.lv;
  let xpForLv=lv*1000, xpPrev=(lv-1)*lv/2*1000;
  let xpInLv=xpTot-xpPrev, xpNeed=xpForLv-xpPrev;
  let pct=Math.min(100,Math.round(xpInLv/xpNeed*100))||0;
  let totL=0,totD=0;
  let lm=gM('A'),lb=gM('B'),lc=gM('C');
  [...lm,...lb,...lc].forEach(m=>{m.lessons.forEach((l,i)=>{totL++;let k='A-'+lm.indexOf(m)+'-'+i;if(g.done[k])totD++;k='B-'+lb.indexOf(m)+'-'+i;if(g.done[k])totD++;k='C-'+lc.indexOf(m)+'-'+i;if(g.done[k])totD++});

  let streakEm=d=>d>30?'🔥🔥🔥🔥🔥':d>14?'🔥🔥🔥🔥':d>7?'🔥🔥🔥':d>3?'🔥🔥':d>1?'🔥':'🌱';
  let badges=[{id:'first_brew',ar:'☕ أول تحضير',en:'☕ First Brew'},{id:'streak_3',ar:'🔥 3 أيام',en:'🔥 3 Days'},{id:'streak_7',ar:'🔥🔥 أسبوع',en:'🔥🔥 Week'},{id:'streak_14',ar:'🔥🔥🔥 Fortress',en:'🔥🔥🔥 Fortress'},{id:'streak_30',ar:'🔥🔥🔥🔥 شهر',en:'🔥🔥🔥🔥 Month'}];

  // Streak calendar last 7 days
  let cal='';
  for(let i=6;i>=0;i--){
    let d=new Date();d.setDate(d.getDate()-i);
    let ds=d.toDateString();
    let active=g.hist.includes(ds)||ds===g.lastDate;
    cal+='<div style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.7rem;'+(active?'background:#d4a85a;color:#1a0f0a;font-weight:700':'background:#ede0d4;color:#a67b5b')+'">'+d.getDate()+'</div>';
  }

  return '<div style="display:grid;gap:16px;grid-template-columns:1fr 1fr;margin-bottom:16px">'+
    /* XP Card */
    '<div style="background:linear-gradient(135deg,#1a0f0a,#3e2312);border-radius:16px;padding:24px;grid-column:1/-1;display:flex;align-items:center;gap:20px;flex-wrap:wrap">'+
    '<div style="font-size:3rem">'+(lv>=10?'👑':lv>=7?'🔥':lv>=5?'⭐':'🌱')+'</div>'+
    '<div style="flex:1"><div style="color:#d4a85a;font-size:.8rem">'+__({ar:'مستوى الباريستا',en:'Barista Level'})+'</div>'+
    '<div style="color:white;font-size:2rem;font-weight:900">'+lv+'</div>'+
    '<div style="margin-top:8px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#d4a85a,#e8cc8a);border-radius:3px;transition:width 1s"></div></div>'+
    '<div style="color:#a67b5b;font-size:.75rem;margin-top:4px">'+xpInLv+' / '+xpNeed+' XP — '+__({ar:'المستوى القادم',en:'Next Level'})+'</div></div>'+
    /* XP total + lessons */
    '<div style="display:flex;gap:16px;flex-wrap:wrap">'+
    '<div style="text-align:center;padding:8px 16px;background:rgba(255,255,255,.05);border-radius:12px"><div style="color:#d4a85a;font-size:1.3rem;font-weight:900">'+xpTot+'</div><div style="color:#a67b5b;font-size:.7rem">XP</div></div>'+
    '<div style="text-align:center;padding:8px 16px;background:rgba(255,255,255,.05);border-radius:12px"><div style="color:white;font-size:1.3rem;font-weight:900">'+totD+'/'+totL+'</div><div style="color:#a67b5b;font-size:.7rem">'+__({ar:'دروس',en:'Lessons'})+'</div></div>'+
    '</div></div>'+

    /* Streak */
    '<div style="background:white;border-radius:16px;padding:20px;border:2px solid #ede0d4">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><span style="font-size:1.5rem">'+streakEm(g.streak)+'</span><span style="font-weight:700;color:#3e2312;font-size:1.1rem">'+g.streak+' '+__({ar:'يوم',en:'Day Streak'})+'</span></div>'+
    '<div style="display:flex;gap:4px">'+cal+'</div>'+
    '</div>'+

    /* Badges */
    '<div style="background:white;border-radius:16px;padding:20px;border:2px solid #ede0d4">'+
    '<div style="font-weight:700;color:#3e2312;margin-bottom:12px;font-size:.9rem">🏅 '+__({ar:'الإنجازات',en:'Achievements'})+'</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:8px">'+
    (g.badges.length?g.badges.map(b=>{
      let bd=badges.find(x=>x.id===b.split('_')[0]);
      return '<span style="padding:4px 12px;background:#fff8e1;border:1px solid #d4a85a;border-radius:20px;font-size:.8rem;color:#3e2312">'+(lang==='en'?bd?.en:bd?.ar||b)+'</span>'
    }).join(''):'<span style="color:#a67b5b;font-size:.8rem">'+__({ar:'💪 أكمل أول درس لتحصل على أول شارة',en:'💪 Complete your first lesson to earn your first badge'})+'</span>')+
    '</div></div>'+

    /* Quick Stats */
    '<div style="background:white;border-radius:16px;padding:20px;border:2px solid #ede0d4;grid-column:1/-1">'+
    '<div style="font-weight:700;color:#3e2312;margin-bottom:12px">📊 '+__({ar:'إحصائياتك',en:'Your Stats'})+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px">'+
    '<div style="text-align:center;padding:12px;background:#faf5ef;border-radius:12px"><div style="font-size:1.5rem;font-weight:900;color:#3e2312">'+g.certs+'</div><div style="font-size:.75rem;color:#a67b5b">'+__({ar:'شهادات',en:'Certificates'})+'</div></div>'+
    '<div style="text-align:center;padding:12px;background:#faf5ef;border-radius:12px"><div style="font-size:1.5rem;font-weight:900;color:#3e2312">'+g.badges.length+'</div><div style="font-size:.75rem;color:#a67b5b">'+__({ar:'شارات',en:'Badges'})+'</div></div>'+
    '<div style="text-align:center;padding:12px;background:#faf5ef;border-radius:12px"><div style="font-size:1.5rem;font-weight:900;color:#3e2312">'+Object.keys(g.done).length+'</div><div style="font-size:.75rem;color:#a67b5b">'+__({ar:'دروس مكتملة',en:'Completed'})+'</div></div>'+
    '</div></div>'+
    '</div>';
}

/* ===== Override rT to add Dashboard tab ===== */
const _rT=rT;
rT=function(t){
  let r=$('root');
  r.innerHTML='<div class="tbs"><button class="tb'+(t==='d'?' act':'')+'" onclick="rT(\'d\')">🏠 '+__({ar:'الرئيسية',en:'Home'})+'</button><button class="tb'+(t==='c'?' act':'')+'" onclick="rT(\'c\')">📚 '+__({ar:'المنهج',en:'Curriculum'})+'</button><button class="tb'+(t==='e'?' act':'')+'" onclick="rT(\'e\')">📝 '+__({ar:'الاختبار',en:'Exam'})+'</button><button class="tb'+(t==='k'?' act':'')+'" onclick="rT(\'k\')">🧮 '+__({ar:'الحاسبة',en:'Calculator'})+'</button><button class="tb'+(t==='v'?' act':'')+'" onclick="rT(\'v\')">🖨️ '+__({ar:'الشهادات',en:'Certificates'})+'</button><button class="tb'+(t==='a'?' act':'')+'" onclick="rT(\'a\')">🔐 '+__({ar:'الطلاب',en:'Students'})+'</button></div>';
  if(t==='d') r.innerHTML+=sD();
  else if(t==='c') r.innerHTML+=sL();
  else if(t==='e') r.innerHTML+=sEx();
  else if(t==='k') r.innerHTML+=sCalc();
  else if(t==='v'){r.innerHTML+=sV();lC();}
  else r.innerHTML+=sA();
  if(t==='a') lS();
};

/* ===== Override sLsn to award XP ===== */
const _sLsn=sLsn;
sLsn=function(l,mi,li){
  G.completeLesson(l,mi,li);
  _sLsn(l,mi,li);
};

let bl=navigator.language||navigator.userLanguage||'en';
if(bl.startsWith('ar'))setLang('ar');
else rT('d');
</script>
