<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlTag">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucca Academy — Barista Training</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f7f2eb;color:#1a0f0a;min-height:100vh}
hdr{background:linear-gradient(135deg,#1a0f0a,#3e2312);padding:20px;text-align:center;border-bottom:3px solid #d4a85a;position:relative;overflow:hidden}
hdr::before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1200&q=80') center/cover;opacity:.06}
hdr h1{color:#d4a85a;font-size:1.8rem;font-family:Georgia,serif;position:relative}
hdr p{color:#a67b5b;position:relative}
.lang-sw{position:absolute;top:12px;inset-inline-end:12px;display:flex;gap:4px;z-index:2}
.lang-sw button{padding:4px 10px;border:1px solid #d4a85a;border-radius:4px;cursor:pointer;font-size:.75rem;font-weight:700;background:transparent;color:#a67b5b;transition:.3s}
.lang-sw button.act{background:#d4a85a;color:#1a0f0a}

.c{max-width:1000px;margin:0 auto;padding:20px}
@keyframes xp{0%{width:0%}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.ds-card{animation:pop .4s ease both}
.ds-card:nth-child(2){animation-delay:.1s}
.ds-card:nth-child(3){animation-delay:.2s}
.ds-card:nth-child(4){animation-delay:.3s}
.tbs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tb{padding:10px 20px;border:none;border-radius:8px;font-weight:700;cursor:pointer;background:#ede0d4;color:#6d4c41;transition:.3s;font-size:.9rem}
.tb.act,.tb:hover{background:#d4a85a;color:#1a0f0a;transform:translateY(-1px)}
.lg{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:20px}
.lc{background:white;border-radius:20px;overflow:hidden;border:2px solid #ede0d4;cursor:pointer;transition:.4s cubic-bezier(.4,0,.2,1)}
.lc:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,.1);border-color:#d4a85a}
.lc .hd{min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.lc .hd .bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:.5s}
.lc:hover .hd .bg{transform:scale(1.1)}
.lc .hd .ov{position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,15,10,.85),rgba(62,35,18,.75))}
.lc .hd .ic{font-size:3rem;position:relative;z-index:1;margin-bottom:4px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.2))}
.lc .hd h3{color:#d4a85a;font-family:Georgia,serif;font-size:1.5rem;position:relative;z-index:1}
.lc .bd{padding:20px}
.lc .bd p{color:#6d4c41;font-size:.9rem;margin-bottom:12px}
.lc .bd .st{display:flex;justify-content:space-around;padding-top:12px;border-top:1px solid #ede0d4}
.lc .bd .st div{text-align:center}
.lc .bd .st .n{font-weight:900;color:#3e2312;font-size:1.2rem}
.lc .bd .st .l{font-size:.78rem;color:#a67b5b}
.mc{background:white;border-radius:16px;margin-bottom:16px;border:1px solid #ede0d4;overflow:hidden;transition:.3s}
.mc:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.mc .mh{display:flex;cursor:pointer;transition:.3s}
.mc .mh:hover{background:#faf5ef}
.mc .msd{width:130px;min-height:130px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#3e2312,#5a3a28)}
.mc .msd .mbg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.2;transition:.5s}
.mc .mh:hover .msd .mbg{transform:scale(1.1)}
.mc .msd .mic{font-size:2.5rem;position:relative;z-index:1}
.mc .msd .mnm{position:relative;z-index:1;color:rgba(255,255,255,.5);font-size:.75rem;margin-top:4px}
.mc .mi{flex:1;padding:16px 20px;display:flex;flex-direction:column;justify-content:center}
.mc .mi h4{color:#3e2312;font-size:1.1rem}
.mc .mi p{color:#6d4c41;font-size:.85rem;margin-top:4px}
.mc .mi .pr{height:4px;background:#ede0d4;border-radius:2px;margin-top:10px;overflow:hidden}
.mc .mi .pr .fl{height:100%;background:linear-gradient(90deg,#d4a85a,#e8cc8a);border-radius:2px;width:0%;transition:width .8s}
.mc .lessons-list{padding:0 20px 16px}
.mc .lessons-list .lsi{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:.3s;border-bottom:1px solid #f0e8e0}
.mc .lessons-list .lsi:hover{background:#faf5ef;padding-inline-end:16px}
.mc .lessons-list .lsi .ln{width:24px;height:24px;border-radius:50%;background:#ede0d4;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#6d4c41;flex-shrink:0}
.mc .lessons-list .lsi .lt{font-size:.9rem;color:#3e2312;flex:1}
.ap{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.ap h2{color:#3e2312;margin-bottom:16px}
.sf{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sf input{flex:1;min-width:120px;padding:10px 14px;border:2px solid #ede0d4;border-radius:8px;font-size:.95rem;font-family:inherit}
.sf input:focus{outline:none;border-color:#d4a85a;box-shadow:0 0 0 3px rgba(212,168,90,.1)}
.btn{padding:10px 24px;border:none;border-radius:8px;font-weight:700;cursor:pointer;background:#d4a85a;color:#1a0f0a;transition:.3s;font-family:inherit;font-size:.9rem}
.btn:hover{background:#b8922e;transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,168,90,.3)}
.btn-sm{padding:6px 14px;font-size:.85rem}
.btn-rd{background:#e74c3c;color:white}.btn-rd:hover{background:#c0392b}
.si{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #ede0d4}
.h{display:none!important}
.t{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a0f0a;color:#ede0d4;padding:12px 28px;border-radius:12px;opacity:0;transition:.4s;pointer-events:none;z-index:999;font-size:.9rem;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.t.s{opacity:1;transform:translateX(-50%) translateY(0)}
.ls-sc{background:white;border-radius:16px;margin-top:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.ls-sc .ls-h{position:relative;min-height:200px;overflow:hidden;background:linear-gradient(135deg,#1a0f0a,#3e2312)}
.ls-sc .ls-h .hb{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.2;transition:.5s}
.ls-sc:hover .ls-h .hb{transform:scale(1.05)}
.ls-sc .ls-h .hc{position:relative;z-index:1;padding:40px 32px;display:flex;flex-direction:column;justify-content:flex-end;min-height:200px}
.ls-sc .ls-h .hc .br{color:#a67b5b;font-size:.85rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ls-sc .ls-h .hc .br .prg{background:rgba(255,255,255,.1);padding:2px 10px;border-radius:12px;font-size:.78rem}
.ls-sc .ls-h .hc h2{margin-top:4px;font-family:Georgia,serif;font-size:1.6rem;color:white}
.ls-sc .ls-b{padding:28px 32px}
.ls-sc .ls-b .bk{display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;color:#d4a85a;cursor:pointer;font-weight:700;padding:8px 16px;border-radius:8px;transition:.3s;font-size:.9rem}
.ls-sc .ls-b .bk:hover{background:#ede0d4}
.ls-c{line-height:1.9;font-size:.95rem}
.ls-c p{margin-bottom:14px}
.ls-c h3{color:#3e2312;margin:24px 0 12px;font-size:1.2rem}
.ls-c h4{color:#5a3a28;margin:18px 0 8px;font-size:1.05rem}
.ls-c .hl{background:#ede0d4;padding:16px 20px;border-inline-start:4px solid #d4a85a;border-radius:8px;margin:16px 0}
.ls-c .img-c{background:#faf5ef;border-radius:12px;padding:12px;margin:16px 0;text-align:center;border:1px solid #ede0d4;overflow:hidden}
.ls-c .img-c img{max-width:100%;border-radius:8px;display:block;margin:0 auto;max-height:350px;width:100%;object-fit:cover}
.ls-c .img-c .cap{margin-top:8px;font-size:.85rem;color:#6d4c41;display:flex;align-items:center;justify-content:center;gap:6px}
.ls-c .info-b{background:linear-gradient(135deg,#1a0f0a,#3e2312);color:white;padding:20px;border-radius:12px;margin:16px 0}
.ls-c .info-b strong{color:#d4a85a}
.ls-c .err{background:#fde8e8;padding:16px 20px;border-radius:8px;margin:12px 0;border-inline-start:4px solid #e74c3c}
.ls-c .err strong{color:#e74c3c}
.ls-c .sum{background:#e8f5e9;padding:16px 20px;border-radius:8px;margin:16px 0;border-inline-start:4px solid #27ae60}
.ls-c .sum strong{color:#27ae60}
.ls-c .sc-b{background:#fff8e1;padding:12px 16px;border-radius:8px;margin:12px 0;font-size:.9rem;border-inline-start:4px solid #ffc107}
.ls-c .sc-b strong{color:#f57f17}
.ls-c .img-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.ls-c .img-row .img-c{margin:0}
.ls-c ul{margin:12px 0 12px 20px}
.ls-c ul li{margin-bottom:6px}
.ls-c table{width:100%;border-collapse:collapse;margin:16px 0;border-radius:8px;overflow:hidden}
.ls-c table th,.ls-c table td{padding:10px 14px;text-align:start;border:1px solid #ede0d4;font-size:.9rem}
.ls-c table th{background:#ede0d4;color:#3e2312;font-weight:700}
.nav-b{margin-top:24px;padding-top:20px;border-top:2px solid #ede0d4;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.ls-c .q-section{background:#faf5ef;border-radius:12px;padding:20px;margin:16px 0;border:2px solid #ede0d4}
.ls-c .q-section .q-q{margin-bottom:16px;padding:16px;background:white;border-radius:8px}
.ls-c .q-section .q-q .q-t{font-weight:700;margin-bottom:10px;color:#3e2312}
.ls-c .q-section .q-o{padding:10px 14px;margin-bottom:6px;border-radius:6px;cursor:pointer;border:2px solid #ede0d4;transition:.3s;display:flex;align-items:center;gap:8px}
.ls-c .q-section .q-o:hover{border-color:#d4a85a;background:white}
.ls-c .q-section .q-o.s{border-color:#d4a85a;background:#fff8e1}
.ls-c .q-section .q-o.c{border-color:#27ae60;background:#e8f5e9}
.ls-c .q-section .q-o.w{border-color:#e74c3c;background:#fde8e8}
.ls-c .q-section .q-o .ql{width:24px;height:24px;border-radius:50%;background:#ede0d4;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.ls-c .q-section .q-o.s .ql{background:#d4a85a;color:white}
.ls-c .q-section .q-o.c .ql{background:#27ae60;color:white}
.ls-c .q-section .q-o.w .ql{background:#e74c3c;color:white}
.ex{background:white;border-radius:16px;padding:28px 32px;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.ex .eq{margin-bottom:24px;padding:20px;background:#faf5ef;border-radius:12px;border-inline-start:4px solid #d4a85a}
.ex .eq .eqn{font-size:.8rem;color:#a67b5b;margin-bottom:4px}
.ex .eq .eqq{font-weight:700;color:#3e2312;margin-bottom:12px;font-size:1.05rem}
.ex .eq .eo{display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;border-radius:8px;border:2px solid #ede0d4;cursor:pointer;transition:.3s}
.ex .eq .eo:hover{border-color:#d4a85a;background:white}
.ex .eq .eo input[type=radio]{accent-color:#d4a85a;width:18px;height:18px;cursor:pointer}
.ex .eq .eo label{cursor:pointer;flex:1;font-size:.95rem;color:#3e2312}
.ex .eq .eo.s{border-color:#d4a85a;background:#fff8e1}
.ex .eq .eo.c{border-color:#27ae60;background:#e8f5e9}
.ex .eq .eo.w{border-color:#e74c3c;background:#fde8e8}
/* ===== Certificate ===== */
.cert{max-width:740px;margin:0 auto;background:white;border-radius:2px;overflow:hidden;box-shadow:0 16px 100px rgba(0,0,0,.25);position:relative;padding:14px}
.cert .ci{background:linear-gradient(180deg,#fefcf9 0%,#f8f0e6 40%,#f5ebe0 100%);padding:48px 40px 36px;text-align:center;position:relative;z-index:2;border:1px solid #d4a85a;border-radius:2px;box-shadow:inset 0 0 0 4px rgba(212,168,90,.08),inset 0 0 0 8px rgba(212,168,90,.04)}
.cert .ci .bg-pat{position:absolute;inset:0;background-image:radial-gradient(circle at 25% 25%,rgba(212,168,90,.04) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;z-index:0}
/* Ornate corners — Italian style */
.cert .ci .corn{position:absolute;width:50px;height:50px;z-index:3}
.cert .ci .corn-tl{top:12px;right:12px;border-top:3px solid #d4a85a;border-right:3px solid #d4a85a}
.cert .ci .corn-tl::after{content:'❦';position:absolute;top:-10px;right:-10px;font-size:.9rem;color:#d4a85a;opacity:.6}
.cert .ci .corn-tr{top:12px;left:12px;border-top:3px solid #d4a85a;border-left:3px solid #d4a85a}
.cert .ci .corn-tr::after{content:'❦';position:absolute;top:-10px;left:-10px;font-size:.9rem;color:#d4a85a;opacity:.6}
.cert .ci .corn-bl{bottom:12px;right:12px;border-bottom:3px solid #d4a85a;border-right:3px solid #d4a85a}
.cert .ci .corn-bl::after{content:'❦';position:absolute;bottom:-10px;right:-10px;font-size:.9rem;color:#d4a85a;opacity:.6}
.cert .ci .corn-br{bottom:12px;left:12px;border-bottom:3px solid #d4a85a;border-left:3px solid #d4a85a}
.cert .ci .corn-br::after{content:'❦';position:absolute;bottom:-10px;left:-10px;font-size:.9rem;color:#d4a85a;opacity:.6}
/* Coffee branch decorations */
.cert .ci .branch{position:absolute;display:flex;align-items:center;gap:3px;font-size:1rem;opacity:.15;pointer-events:none;z-index:0}
.cert .ci .branch-l{top:50%;right:8px;transform:translateY(-50%) rotate(0deg);flex-direction:column}
.cert .ci .branch-r{top:50%;left:8px;transform:translateY(-50%) rotate(0deg);flex-direction:column}
/* Emblem */
.cert .ci .embl{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px;position:relative;z-index:1}
.cert .ci .embl .em-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,#d4a85a)}
.cert .ci .embl .em-line:last-child{background:linear-gradient(90deg,#d4a85a,transparent)}
.cert .ci .embl .em-icon{width:48px;height:48px;border-radius:50%;border:2px solid #d4a85a;display:flex;align-items:center;justify-content:center;position:relative;background:linear-gradient(135deg,#fff8e1,#fff);box-shadow:0 0 0 4px rgba(212,168,90,.1)}
.cert .ci .embl .em-icon .em-in{font-size:1.2rem;animation:pp 3s ease-in-out infinite}
.cert .ci .ctop{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:2px;position:relative;z-index:1}
.cert .ci .ctop::before,.cert .ci .ctop::after{content:'';flex:1;max-width:60px;height:1px;background:linear-gradient(90deg,transparent,#d4a85a)}
.cert .ci .ctop::after{background:linear-gradient(90deg,#d4a85a,transparent)}
.cert .ci .ctop span{color:#d4a85a;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;font-weight:600}
.cert .ci .an{font-size:1.1rem;font-weight:900;color:#3e2312;letter-spacing:2px;font-family:Georgia,serif;position:relative;z-index:1}
.cert .ci .sub{color:#a67b5b;font-size:.78rem;margin-bottom:4px;position:relative;z-index:1}
.cert .ci .certh{margin:10px 0 6px;position:relative;z-index:1}
.cert .ci .certh .h-gold{display:inline-block;background:linear-gradient(135deg,#b8922e,#d4a85a,#b8922e);color:white;padding:5px 32px;font-size:1rem;font-weight:700;letter-spacing:2px;box-shadow:0 2px 12px rgba(212,168,90,.3);position:relative}
.cert .ci .certh .h-gold::before{content:'❦';position:absolute;right:-16px;top:50%;transform:translateY(-50%);font-size:.7rem;color:rgba(255,255,255,.5)}
.cert .ci .certh .h-gold::after{content:'❦';position:absolute;left:-16px;top:50%;transform:translateY(-50%);font-size:.7rem;color:rgba(255,255,255,.5)}
/* Decorative divider */
.cert .ci .divider{display:flex;align-items:center;justify-content:center;gap:4px;margin:6px auto;max-width:320px;position:relative;z-index:1}
.cert .ci .divider .d-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,#d4a85a)}
.cert .ci .divider .d-line:last-child{background:linear-gradient(90deg,#d4a85a,transparent)}
.cert .ci .divider .d-icon{color:#d4a85a;font-size:.7rem}
.cert .ci .cname-wrap{margin:12px 0;position:relative;padding:8px 0;z-index:1}
.cert .ci .cname-wrap::before{content:'꧁';position:absolute;top:-4px;left:50%;transform:translateX(-50%);color:#d4a85a;font-size:.7rem;opacity:.5}
.cert .ci .cname-wrap::after{content:'꧂';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);color:#d4a85a;font-size:.7rem;opacity:.5}
.cert .ci .cname{font-size:2rem;font-weight:900;color:#1a0f0a;font-family:Georgia,serif;letter-spacing:1px;line-height:1.2}
.cert .ci .cbody{color:#6d4c41;font-size:.88rem;line-height:1.8;max-width:420px;margin:0 auto 8px;position:relative;z-index:1}
.cert .ci .cbody strong{color:#3e2312}
.cert .ci .clevel{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#fff8e1,#fff);padding:4px 16px;border-radius:2px;font-weight:600;color:#3e2312;margin:4px 0 8px;font-size:.82rem;border:1px solid #d4a85a;position:relative;z-index:1}
.cert .ci .clevel .lv-icon{font-size:1.1rem}
.cert .ci .cscore{margin:2px 0;font-size:.82rem;color:#6d4c41;position:relative;z-index:1}
.cert .ci .cscore strong{color:#3e2312}
.cert .ci .csb{height:4px;background:#ede0d4;border-radius:2px;margin:6px auto;overflow:hidden;max-width:240px;position:relative;z-index:1}
.cert .ci .csb .csf{height:100%;background:linear-gradient(90deg,#d4a85a,#e8cc8a);border-radius:2px;transition:width 1s ease}
.cert .ci .csig{display:flex;align-items:flex-end;justify-content:center;gap:28px;margin:12px 0 4px;padding:10px 0 0;position:relative;z-index:1}
.cert .ci .csig .csig-box{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;max-width:160px}
.cert .ci .csig .csig-line{width:100%;height:1px;border-top:2px solid #3e2312;margin-bottom:2px}
.cert .ci .csig .csig-label{font-size:.62rem;color:#a67b5b}
.cert .ci .csig .cstamp-box{flex:0 0 auto;max-width:90px}
.cert .ci .csig .cstamp{width:68px;height:68px;border-radius:50%;border:3px double #d4a85a;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff8e1,#fff);box-shadow:0 0 0 4px white,0 0 0 5px rgba(212,168,90,.25);position:relative;margin-top:-16px}
.cert .ci .csig .cstamp .cstamp-in{font-size:.5rem;color:#3e2312;text-align:center;line-height:1.2;font-weight:700}
.cert .ci .cft{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(212,168,90,.2);position:relative;z-index:1}
.cert .ci .cft .cdate{color:#a67b5b;font-size:.7rem;display:flex;align-items:center;gap:4px}
.cert .ci .cft .csep{color:#d4a85a;font-size:.45rem}
.cert .ci .cphrase{margin:6px 0 0;padding:6px 16px;border-top:1px solid rgba(212,168,90,.15);position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:6px}
.cert .ci .cphrase .ph-text{font-size:.72rem;color:#8d6e63;font-style:italic;letter-spacing:.3px;font-family:Georgia,serif}
.cert .ci .cphrase .ph-sep{color:#d4a85a;font-size:.4rem}
.cert .ci .cphrase .ph-brand{font-size:.65rem;color:#3e2312;font-weight:700;letter-spacing:1px}
.cert .ci .cm{color:#c4b5a5;font-size:.55rem;margin-top:8px;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:6px;position:relative;z-index:1}
.cert .ci .cm span{opacity:.4}
.cnt{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.cnt .cci{display:flex;align-items:center;gap:16px;padding:14px;border:2px solid #ede0d4;border-radius:12px;margin-bottom:12px;transition:.3s;cursor:pointer}
.cnt .cci:hover{border-color:#d4a85a;background:#faf5ef}
.cnt .cci .ccic{font-size:2rem;width:50px;text-align:center}
.cnt .cci .ccid{flex:1}

{title:{ar:'قصة اكتشاف القهوة',en:'The Story of Coffee Discovery'},img:0,body:'<h3>📖 قصة كلد وقطيع الماعز</h3><p>يروى أن راعياً إثيوبياً اسمه كلد لاحظ نشاطاً غير عادي في قطيع الماعز بعد أن أكل ثماراً حمراء من شجرة غريبة. جربها بنفسه وشعر بالنشاط. أخبر الرهبان في الدير المجاور، فصنعوا منها مشروباً ساعدهم على السهر في الصلاة. هكذا بدأت رحلة القهوة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80" alt=""><div class="cap">☕ أول فنجان قهوة في التاريخ — إثيوبيا، القرن 9</div></div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=300&q=60" alt=""><div class="cap">🌿 غابات البن الإثيوبية</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">🫘 حبوب البن الطازجة</div></div></div><div class="sum"><strong>💡 الخلاصة:</strong> اكتشاف القهوة كان مصادفة، لكنه غيّر العالم. الإثيوبيون أول من استخدموا حبة البن كمشروب منشط.</div><div class="q-section"><div class="q-q"><div class="q-t">💬 هل تعلم؟</div><p style="font-size:.9rem;color:#6d4c41">كلمة "قهوة" أصلها من الكلمة العربية "قَهْوَة" التي كانت تعني الخمر في الشعر الجاهلي، ثم أصبحت تُطلق على شراب البن لنشوته.</p></div></div>,body_en:'<h3>📖 The Story of Kaldi & His Goats</h3><p>Legend tells of an Ethiopian goat herder named Kaldi who noticed his goats acting unusually energetic after eating red berries from a strange tree. He tried them himself and felt the same vitality. He told the local monks, who made a drink from the berries that helped them stay awake during prayers. Thus began the journey of coffee.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80" alt=""><div class="cap">☕ The first cup of coffee in history — Ethiopia, 9th century</div></div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=300&q=60" alt=""><div class="cap">🌿 Ethiopian coffee forests</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">🫘 Fresh coffee cherries</div></div></div><div class="sum"><strong>💡 Summary:</strong> Coffee was discovered by accident, but it changed the world. Ethiopians were the first to use the coffee bean as an energizing beverage.</div><div class="q-section"><div class="q-q"><div class="q-t">💬 Did You Know?</div><p style="font-size:.9rem;color:#6d4c41">The word "coffee" originates from the Arabic "qahwa" (قَهْوَة), which originally meant wine in pre-Islamic poetry, later coming to refer to coffee for its stimulating effect.</p></div></div>'},
{title:{ar:'البن العربي — الأصول والتصنيف',en:'Arabica Coffee — Origins and Classification'},img:1,body:'<h3>🔬 التصنيف النباتي للقهوة</h3><p>القهوة تنتمي للجنس <em>Coffea</em>، وأهم نوعين: <strong>Coffea arabica</strong> (75% من الإنتاج) و <strong>Coffea canephora</strong> (روبوستا).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600&q=80" alt=""><div class="cap">🌱 حبوب بن الأرابيكا — Coffea arabica</div></div><p>الأرابيكا نشأت في إثيوبيا، وتُزرع في المرتفعات (600-2000م). الروبوستا أكثر مقاومة للأمراض وأعلى كافيين.</p><table><tr><th>الخاصية</th><th>أرابيكا Arabica</th><th>روبوستا Robusta</th></tr><tr><td>الكافيين</td><td>1.2%</td><td>2.2%</td></tr><tr><td>الارتفاع</td><td>600-2000م</td><td>0-800م</td></tr><tr><td>النكهة</td><td>زهرية/فاكهية</td><td>ترابية/خشنة</td></tr><tr><td>السعر</td><td>أعلى</td><td>أقل</td></tr></table><div class="info-b"><strong>📊 التحليل العلمي:</strong> الأرابيكا تحتوي على زيوت عطرية أكثر تعقيداً (أكثر من 800 مركب عطري)، مما يعطيها نكهات زهرية وفاكهية. الروبوستا تحتوي على ضعف الكافيين ومركبات كلوروجينيك أكثر، مما يعطيها نكهة أكثر مرارة وقسوة.</div><div class="err"><strong>❌ خطأ شائع:</strong> يعتقد البعض أن الأرابيكا والروبوستا من نفس النوع. الحقيقة أنهما نوعان مختلفان تماماً (species مختلفان)، لكل منهما خصائصه الفريدة في الزراعة والنكهة والاستخدام.</div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">🫘 بن الأرابيكا — نكهات معقدة</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=300&q=60" alt=""><div class="cap">☕ الروبوستا — قوة ومرارة</div></div></div><div class="q-section" id="q-a12" style="cursor:pointer" onclick="qAT(this)"><div class="q-q"><div class="q-t">💬 اختبار سريع — اضغط لاختيار الإجابة</div><p style="font-size:.9rem;color:#6d4c41">أي نوع بن يحتوي ضعف الكافيين ومركبات كلوروجينيك أكثر؟</p><div class="q-o" data-correct="0"><span class="ql">أ</span> أرابيكا</div><div class="q-o" data-correct="1"><span class="ql">ب</span> روبوستا</div><div class="q-o" data-correct="0"><span class="ql">ج</span> ليبيريكا</div><div class="q-o" data-correct="0"><span class="ql">د</span> إكسلسا</div></div></div>,body_en:'<h3>🔬 Botanical Classification of Coffee</h3><p>Coffee belongs to the <em>Coffea</em> genus, with two main species: <strong>Coffea arabica</strong> (75% of production) and <strong>Coffea canephora</strong> (Robusta).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600&q=80" alt=""><div class="cap">🌱 Arabica beans — Coffea arabica</div></div><p>Arabica originated in Ethiopia and is grown at high altitudes (600-2000m). Robusta is more disease-resistant and higher in caffeine.</p><table><tr><th>Property</th><th>Arabica</th><th>Robusta</th></tr><tr><td>Caffeine</td><td>1.2%</td><td>2.2%</td></tr><tr><td>Altitude</td><td>600-2000m</td><td>0-800m</td></tr><tr><td>Flavor</td><td>Floral/Fruity</td><td>Earthy/Harsh</td></tr><tr><td>Price</td><td>Higher</td><td>Lower</td></tr></table><div class="info-b"><strong>📊 Scientific Analysis:</strong> Arabica contains more complex aromatic oils (over 800 aromatic compounds), giving it floral and fruity notes. Robusta has twice the caffeine and more chlorogenic acids, giving it a more bitter and harsh flavor.</div><div class="err"><strong>❌ Common Mistake:</strong> Some believe Arabica and Robusta are the same species. They are completely different species, each with unique cultivation and flavor characteristics.</div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">🫘 Arabica — complex flavors</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=300&q=60" alt=""><div class="cap">☕ Robusta — strength and bitterness</div></div></div><div class="q-section" id="q-a12" style="cursor:pointer" onclick="qAT(this)"><div class="q-q"><div class="q-t">💬 Quick Quiz — Click to select answer</div><p style="font-size:.9rem;color:#6d4c41">Which coffee type has twice the caffeine and more chlorogenic acids?</p><div class="q-o" data-correct="0"><span class="ql">A</span> Arabica</div><div class="q-o" data-correct="1"><span class="ql">B</span> Robusta</div><div class="q-o" data-correct="0"><span class="ql">C</span> Liberica</div><div class="q-o" data-correct="0"><span class="ql">D</span> Excelsa</div></div></div>'},
{title:{ar:'من الغابة إلى المزروعات',en:'From Forest to Farms'},img:9,body:'<h3>🌍 انتشار القهوة حول العالم</h3><p>من إثيوبيا انتقلت القهوة إلى اليمن ثم الحجاز، فمصر، فتركيا، ثم أوروبا عبر البندقية. في القرن 17، انتشرت المقاهي في أوروبا وأطلقت عليها اسم "مدارس الحكماء".</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🏛️ أول المقاهي الأوروبية — البندقية، القرن 17</div></div><p>شجرة القهوة العربية Coffea arabica نشأت في المرتفعات الإثيوبية. تنتشر اليوم في "حزام القهوة" (Coffee Belt) حول العالم: أمريكا اللاتينية، أفريقيا، وآسيا.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🗺️ خريطة حزام القهوة العالمي</div></div><div class="sum"><strong>💡 الخلاصة:</strong> القهوة قطعت رحلة آلاف الكيلومترات من غابات إثيوبيا لتصل إلى فنجانك اليوم. كل رشفة تحكي قصة آلاف السنين من التجارة والثقافة.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 اختبار سريع</div><p style="font-size:.9rem;color:#6d4c41">أين نشأت شجرة القهوة العربية Coffea arabica في الأصل؟</p><div class="q-o" data-correct="1"><span class="ql">أ</span> المرتفعات الإثيوبية</div><div class="q-o" data-correct="0"><span class="ql">ب</span> اليمن</div><div class="q-o" data-correct="0"><span class="ql">ج</span> إيطاليا</div><div class="q-o" data-correct="0"><span class="ql">د</span> البرازيل</div></div></div>,body_en:'<h3>🌍 The Spread of Coffee Around the World</h3><p>From Ethiopia, coffee traveled to Yemen, then to Hejaz, Egypt, Turkey, and finally to Europe via Venice. In the 17th century, coffeehouses spread across Europe and were called Schools of Wisdom.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🏛️ The first European coffeehouses — Venice, 17th century</div></div><p>The Coffea arabica tree originated in the Ethiopian highlands. Today it grows across the Coffee Belt around the world: Latin America, Africa, and Asia.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🗺️ Global Coffee Belt map</div></div><div class="sum"><strong>💡 Summary:</strong> Coffee traveled thousands of kilometers from the forests of Ethiopia to reach your cup today. Every sip tells a story of thousands of years of trade and culture.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 Quick Quiz</div><p style="font-size:.9rem;color:#6d4c41">Where did Coffea arabica originally originate?</p><div class="q-o" data-correct="1"><span class="ql">A</span> The Ethiopian highlands</div><div class="q-o" data-correct="0"><span class="ql">B</span> Yemen</div><div class="q-o" data-correct="0"><span class="ql">C</span> Italy</div><div class="q-o" data-correct="0"><span class="ql">D</span> Brazil</div></div></div>'},
{title:{ar:'تشريح حبة البن — من الداخل',en:'Anatomy of the Coffee Bean — Inside Out'},img:6,body:'<h3>🔬 تركيب حبة البن</h3><p>حبة البن هي بذرة ثمرة القهوة (الكرز). تتكون من عدة طبقات: القشرة الخارجية (Exocarp)، اللب الحلو (Mucilage/Mesocarp)، الغلاف الرقيق (Parchment/Endocarp)، طبقة الفضة (Silver Skin/Episperm)، وجنين البذرة (Endosperm).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🔬 تشريح حبة البن — الأجزاء الداخلية</div></div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=300&q=60" alt=""><div class="cap">🍒 كرزة القهوة الحمراء</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">🫘 البذور الخضراء (Green Beans)</div></div></div><div class="hl"><strong>📊 معلومة:</strong> كرزة القهوة الواحدة تحتوي عادة على بذرتين. أحياناً توجد بذرة واحدة فقط (peaberry) وتكون أكثر تركيزاً في النكهة. تمثل peaberry حوالي 5% من المحصول.</div><div class="q-section"><div class="q-q"><div class="q-t">💬 اختبار سريع</div><p style="font-size:.9rem;color:#6d4c41">ما هي الطبقة التي تُعرف بـ "Silver Skin" في حبة البن؟</p></div></div>',body_en:'<h3>🔬 Structure of the Coffee Bean</h3><p>The coffee bean is the seed of the coffee cherry. It consists of several layers: the outer skin (Exocarp), sweet pulp (Mucilage/Mesocarp), parchment layer (Endocarp), silver skin (Episperm), and the seed embryo (Endosperm).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🔬 Coffee bean anatomy — internal parts</div></div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=300&q=60" alt=""><div class="cap">🍒 Red coffee cherry</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">🫘 Green beans</div></div></div><div class="hl"><strong>📊 Fact:</strong> A coffee cherry typically contains two seeds. Sometimes only one seed develops (peaberry), which is more concentrated in flavor. Peaberries make up about 5% of the crop.</div><div class="q-section"><div class="q-q"><div class="q-t">💬 Quick Quiz</div><p style="font-size:.9rem;color:#6d4c41">What layer is known as the Silver Skin in a coffee bean?</p></div></div>'}
]},
{id:'module-A2',title:{ar:'أساسيات التحضير',en:'Brewing Fundamentals'},icon:'⚗️',desc:{ar:'من الحبة إلى الفنجان — علم الاستخلاص',en:'From Bean to Cup — The Science of Extraction'},img:1,lessons:[
{title:{ar:'علم الاستخلاص فيزيائياً وكيميائياً',en:'The Physics and Chemistry of Extraction'},img:3,body:'<h3>🔬 فيزياء وكيمياء الاستخلاص</h3><p>الاستخلاص هو عملية إذابة المركبات القابلة للذوبان من البن المطحون في الماء. العوامل المؤثرة: درجة الطحن، درجة حرارة الماء (92-96°م)، نسبة القهوة للماء، وقت التلامس.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">⚗️ عملية الاستخلاص — القهوة المقطرة</div></div><div class="info-b"><strong>📊 التحليل العميق:</strong> النسبة المثلى للاستخلاص هي 18-22% من وزن القهوة. أقل من 18% = استخلاص ناقص (Under-extraction: طعم حامض ومالح). أكثر من 22% = استخلاص زائد (Over-extraction: طعم مر وجاف).</div><table><tr><th>العامل</th><th>التأثير</th><th>النطاق المثالي</th></tr><tr><td>درجة الطحن</td><td>أدق = أبطأ استخلاص</td><td>متوسط (مثل حبيبات السكر)</td></tr><tr><td>حرارة الماء</td><td>أعلى = استخلاص أسرع</td><td>92-96°م</td></tr><tr><td>وقت التلامس</td><td>أطول = استخلاص أكثر</td><td>2.5-4 دقائق</td></tr><tr><td>النسبة (قهوة:ماء)</td><td>أقل قهوة = استخلاص أسرع</td><td>1:15 إلى 1:17</td></tr></table><div class="err"><strong>❌ خطأ شائع:</strong> الماء المغلي مباشرة (100°م) يحرق القهوة ويسبب مرارة زائدة. الماء المثالي بين 92-96°م — اترك الغلاية 30 ثانية بعد الغليان.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 اختبار سريع</div><p style="font-size:.9rem;color:#6d4c41">النسبة المثلى للاستخلاص حسب SCA هي:</p><div class="q-o" data-correct="1"><span class="ql">أ</span> 18-22%</div><div class="q-o" data-correct="0"><span class="ql">ب</span> 10-15%</div><div class="q-o" data-correct="0"><span class="ql">ج</span> 25-30%</div><div class="q-o" data-correct="0"><span class="ql">د</span> 5-10%</div></div></div>,body_en:'<h3>🔬 The Physics and Chemistry of Extraction</h3><p>Extraction is the process of dissolving soluble compounds from ground coffee into water. The key variables are: grind size, water temperature (92-96°C), coffee-to-water ratio, and contact time.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">⚗️ The extraction process — pour-over coffee</div></div><div class="info-b"><strong>📊 Deep Analysis:</strong> The optimal extraction yield is 18-22% of coffee weight. Below 18% = Under-extraction (sour, salty taste). Above 22% = Over-extraction (bitter, dry taste).</div><table><tr><th>Variable</th><th>Effect</th><th>Optimal Range</th></tr><tr><td>Grind Size</td><td>Finer = Slower extraction</td><td>Medium (like sugar granules)</td></tr><tr><td>Water Temperature</td><td>Higher = Faster extraction</td><td>92-96°C</td></tr><tr><td>Contact Time</td><td>Longer = More extraction</td><td>2.5-4 minutes</td></tr><tr><td>Ratio (Coffee:Water)</td><td>Less coffee = Faster extraction</td><td>1:15 to 1:17</td></tr></table><div class="err"><strong>❌ Common Mistake:</strong> Using boiling water (100°C) directly burns the coffee and causes excessive bitterness. Ideal water is 92-96°C — let the kettle rest 30 seconds after boiling.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 Quick Quiz</div><p style="font-size:.9rem;color:#6d4c41">What is the optimal extraction yield according to SCA?</p><div class="q-o" data-correct="1"><span class="ql">A</span> 18-22%</div><div class="q-o" data-correct="0"><span class="ql">B</span> 10-15%</div><div class="q-o" data-correct="0"><span class="ql">C</span> 25-30%</div><div class="q-o" data-correct="0"><span class="ql">D</span> 5-10%</div></div></div>'},
{title:{ar:'المعدات والأدوات — دليل شامل',en:'Equipment and Tools — Complete Guide'},img:2,body:'<h3>🧰 أدوات تحضير القهوة — مقارنة شاملة</h3><p>أشهر طرق التحضير: V60، Chemex، AeroPress، French Press، والإسبريسو. كل طريقة تعطي نكهة مختلفة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🧰 مجموعة أدوات تحضير القهوة المنزلية</div></div><table><tr><th>الطريقة</th><th>النكهة</th><th>الصعوبة</th><th>الوقت</th></tr><tr><td>V60</td><td>نظيفة، زهرية</td><td>متوسطة</td><td>2.5 دقيقة</td></tr><tr><td>Chemex</td><td>نظيفة جداً، خفيفة</td><td>متوسطة</td><td>4 دقائق</td></tr><tr><td>AeroPress</td><td>غنية، كاملة</td><td>سهلة</td><td>1.5 دقيقة</td></tr><tr><td>French Press</td><td>ثقيلة، زيتية</td><td>سهلة</td><td>4 دقائق</td></tr><tr><td>إسبريسو</td><td>مركزة، كريمية</td><td>صعبة</td><td>25-30 ثانية</td></tr></table><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">☕ V60</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=300&q=60" alt=""><div class="cap">⚗️ Chemex</div></div></div><div class="sum"><strong>💡 نصيحة:</strong> ابدأ بطريقة V60 — الأبسط والأكثر تحكماً في المتغيرات. أتقنها أولاً ثم جرب باقي الطرق.</div>,body_en:'<h3>🧰 Coffee Brewing Equipment — Comprehensive Comparison</h3><p>The most popular brewing methods: V60, Chemex, AeroPress, French Press, and Espresso. Each method produces a distinct flavor profile.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🧰 Home coffee brewing equipment collection</div></div><table><tr><th>Method</th><th>Flavor</th><th>Difficulty</th><th>Time</th></tr><tr><td>V60</td><td>Clean, floral</td><td>Medium</td><td>2.5 min</td></tr><tr><td>Chemex</td><td>Very clean, light</td><td>Medium</td><td>4 min</td></tr><tr><td>AeroPress</td><td>Rich, full-bodied</td><td>Easy</td><td>1.5 min</td></tr><tr><td>French Press</td><td>Heavy, oily</td><td>Easy</td><td>4 min</td></tr><tr><td>Espresso</td><td>Concentrated, creamy</td><td>Hard</td><td>25-30 sec</td></tr></table><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">☕ V60</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=300&q=60" alt=""><div class="cap">⚗️ Chemex</div></div></div><div class="sum"><strong>💡 Tip:</strong> Start with the V60 method — the simplest with the most control over variables. Master it first, then try other methods.</div>'},
{title:{ar:'المقاييس والنسب الذهبية',en:'Measurements and Golden Ratios'},img:10,body:'<h3>⚖️ علم النسب في القهوة</h3><p>النسبة الأساسية: 60 جرام قهوة لكل لتر ماء (1:16.7). للإسبريسو: 1:2 (قهوة:ماء).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">⚖️ الدقة في القياس — مفتاح الاتساق</div></div><div class="hl"><strong>📊 جدول النسب الذهبية:</strong> V60: 1:15-1:17 · AeroPress: 1:14-1:16 · French Press: 1:12-1:15 · إسبريسو: 1:2-1:3 · Cold Brew: 1:8-1:10</div><div class="q-section"><div class="q-q"><div class="q-t">📝 تمرين عملي</div><p style="font-size:.9rem;color:#6d4c41">استخدم ميزان القهوة لقياس 15 جرام بن. أضف 250 مل ماء عند 94°م. انتظر 3 دقائق واستمتع بأول فنجان احترافي!</p></div></div>,body_en:'<h3>⚖️ The Science of Coffee Ratios</h3><p>The standard ratio: 60 grams of coffee per liter of water (1:16.7). For espresso: 1:2 (coffee:water).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">⚖️ Precision in measurement — the key to consistency</div></div><div class="hl"><strong>📊 Golden Ratio Reference:</strong> V60: 1:15-1:17 · AeroPress: 1:14-1:16 · French Press: 1:12-1:15 · Espresso: 1:2-1:3 · Cold Brew: 1:8-1:10</div><div class="q-section"><div class="q-q"><div class="q-t">📝 Practical Exercise</div><p style="font-size:.9rem;color:#6d4c41">Use your coffee scale to measure 15g of coffee. Add 250ml of water at 94°C. Wait 3 minutes and enjoy your first professional cup!</p></div></div>'},
{title:{ar:'تمارين عملية — أول فنجان احترافي',en:'Practical Exercises — Your First Professional Cup'},img:3,body:'<h3>🛠️ دليل خطوة بخطوة</h3><p>الآن حان وقت التطبيق العملي. اتبع هذه الخطوات لتحضير أول فنجان قهوة باحترافية:</p><ol style="margin:12px 0 12px 20px"><li><strong>جهز الأدوات:</strong> V60، فلتر ورقي، غلاية بميزان حرارة، ميزان دقيق</li><li><strong>سخن الماء:</strong> اغلي الماء واتركه 30 ثانية ليصل إلى 94°م</li><li><strong>اطحن البن:</strong> درجة طحن متوسطة (مثل حبيبات السكر الخشن)</li><li><strong>وزن:</strong> 15 جرام بن + 250 جرام ماء</li><li><strong>صب:</strong> بلل البن أولاً بـ 30 مل وانتظر 30 ثانية (Blooming)</li><li><strong>استمر في الصب:</strong> على 3 مراحل متساوية</li><li><strong>انتظر:</strong> 2.5-3 دقائق إجمالي وقت التحضير</li><li><strong>استمتع:</strong> صب في الكوب المفضل لديك!</li></ol><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🛠️ تحضير V60 خطوة بخطوة</div></div><div class="sum"><strong>💡 الخلاصة:</strong> الممارسة تصنع الإتقان. كل مرة تحضر فيها قهوة، سجل الملاحظات: الطعم، الرائحة، وقت التحضير. ستتحسن مع كل مرة!</div>',body_en:'h3>🛠️ Step-by-Step Guide</h3><p>Now it\'s time for hands-on practice. Follow these steps to brew your first professional cup of coffee:</p><ol style="margin:12px 0 12px 20px"><li><strong>Prepare tools:</strong> V60, paper filter, gooseneck kettle with thermometer, precision scale</li><li><strong>Heat water:</strong> Boil water and let it rest 30 seconds to reach 94°C</li><li><strong>Grind coffee:</strong> Medium grind (like coarse sugar granules)</li><li><strong>Weigh:</strong> 15g coffee + 250g water</li><li><strong>Pour:</strong> Wet the grounds first with 30ml and wait 30 seconds (Blooming)</li><li><strong>Continue pouring:</strong> In 3 equal stages</li><li><strong>Wait:</strong> 2.5-3 minutes total brew time</li><li><strong>Enjoy:</strong> Pour into your favorite cup!</li></ol><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🛠️ Step-by-step V60 brewing</div></div><div class="sum"><strong>💡 Summary:</strong> Practice makes perfect. Every time you brew coffee, take notes: flavor, aroma, brew time. You will improve with every cup!</div>'}
]},
{id:'module-A3',title:{ar:'مشروبات الإسبريسو',en:'Espresso Drinks'},icon:'☕',desc:{ar:'فن تحضير الإسبريسو والمشروبات المبنية عليه',en:'The Art of Espresso and Espresso-Based Drinks'},img:4,lessons:[
{title:{ar:'ما هو الإسبريسو؟',en:'What is Espresso?'},img:7,body:'<h3>☕ تعريف الإسبريسو</h3><p>الإسبريسو مشروب مركّز يُحضّر بدفع الماء الساخن (92°م) تحت ضغط 9 بار عبر البن المطحون ناعماً (طحن إسبريسو).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">☕ الإسبريسو — قلب عالم القهوة الاحترافي</div></div><div class="info-b"><strong>📊 مواصفات الإسبريسو المثالي حسب SCA:</strong> 25-30 ثانية استخلاص · 25-35 مل حجم · 7-9 جرام جرعة · كريما ذهبية سميكة 3-5 مم · درجة حرارة 90-96°م</div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">⏱️ التوقيت المثالي</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">🎯 الكريما الذهبية</div></div></div><div class="sc-b"><strong>🔬 مرجع SCA:</strong> الإسبريسو حسب معايير SCA هو 25-35 مل من الإسبريسو تُحضّر من 7-9 جرام بن في 25-30 ثانية عند 90-96°م و 9 بار ضغط.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 اختبار سريع</div><p style="font-size:.9rem;color:#6d4c41">كم ضغط الإسبريسو المثالي حسب SCA؟</p><div class="q-o" data-correct="0"><span class="ql">أ</span> 15 بار</div><div class="q-o" data-correct="0"><span class="ql">ب</span> 5 بار</div><div class="q-o" data-correct="0"><span class="ql">ج</span> 3 بار</div><div class="q-o" data-correct="1"><span class="ql">د</span> 9 بار</div></div></div>,body_en:'<h3>☕ What is Espresso?</h3><p>Espresso is a concentrated beverage made by forcing hot water (92°C) at 9 bars of pressure through finely ground coffee (espresso grind).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">☕ Espresso — the heart of the professional coffee world</div></div><div class="info-b"><strong>📊 SCA Ideal Espresso Specifications:</strong> 25-30 sec extraction · 25-35 ml volume · 7-9g dose · Thick golden crema 3-5mm · Temperature 90-96°C</div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">⏱️ Perfect timing</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">🎯 Golden crema</div></div></div><div class="sc-b"><strong>🔬 SCA Reference:</strong> According to SCA standards, espresso is 25-35ml prepared from 7-9g of coffee in 25-30 seconds at 90-96°C and 9 bar pressure.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 Quick Quiz</div><p style="font-size:.9rem;color:#6d4c41">What is the ideal espresso pressure according to SCA?</p><div class="q-o" data-correct="0"><span class="ql">A</span> 15 bar</div><div class="q-o" data-correct="0"><span class="ql">B</span> 5 bar</div><div class="q-o" data-correct="0"><span class="ql">C</span> 3 bar</div><div class="q-o" data-correct="1"><span class="ql">D</span> 9 bar</div></div></div>'},
{title:{ar:'لاتيه — فن الحليب',en:'Latte — The Art of Milk'},img:4,body:'<h3>🥛 لاتيه (Caffè Latte)</h3><p>إسبريسو + حليب مبخر (steamed milk) + طبقة رقيقة من الرغوة. النسبة: 1/3 إسبريسو + 2/3 حليب.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🥛 لاتيه — المشروب الأكثر شعبية في المقاهي حول العالم</div></div><p><strong>Latte Art (فن اللاتيه)</strong> هو فن صب الحليب على الإسبريسو لتشكيل رسومات (قلب، روزيتا، توليب). يبدأ بالحليب المناسب — حليب كامل الدسم عند درجة حرارة 55-65°م.</p><div class="hl"><strong>🖌️ أنواع فن اللاتيه:</strong> ❤️ القلب (Heart) — الأسهل للمبتدئين · 🌸 الروزيتا (Rosetta) — شكل ورق الشجر · 🌷 التوليب (Tulip) — متعدد الطبقات</div><div class="err"><strong>❌ خطأ شائع:</strong> تسخين الحليب لأكثر من 70°م يحرق البروتينات (اللاكتوز) ويفسد الطعم الحلو. الحرارة المثالية للتبخير: 55-65°م.</div>,body_en:'<h3>🥛 Latte (Caffè Latte)</h3><p>Espresso + steamed milk + a thin layer of foam. Ratio: 1/3 espresso + 2/3 milk.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🥛 Latte — the most popular drink in cafes worldwide</div></div><p><strong>Latte Art</strong> is the art of pouring milk onto espresso to create patterns (heart, rosetta, tulip). It starts with the right milk — whole milk at 55-65°C.</p><div class="hl"><strong>🖌️ Types of Latte Art:</strong> ❤️ Heart — easiest for beginners · 🌸 Rosetta — leaf pattern · 🌷 Tulip — multi-layered</div><div class="err"><strong>❌ Common Mistake:</strong> Heating milk above 70°C burns the proteins (lactose) and ruins the sweet taste. The ideal steaming temperature: 55-65°C.</div>'},
{title:{ar:'كابتشينو وموكا',en:'Cappuccino & Mocha'},img:2,body:'<h3>☕ كابتشينو وموكا — المشروبات الكلاسيكية</h3><p><strong>الكابتشينو:</strong> إسبريسو + حليب مبخر + رغوة كثيفة بنسبة 1:1:1. سُمي على اسم رهبان الكابوتشين بسبب لون ردائهم البني.</p><p><strong>الموكا (Caffè Mocha):</strong> إسبريسو + شوكولاتة + حليب مبخر. ابتكرت في إيطاليا كخيار للحلويات.</p><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">☕ كابتشينو كلاسيك</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">🍫 موكا بالشوكولاتة</div></div></div><table><tr><th>المشروب</th><th>إسبريسو</th><th>حليب</th><th>رغوة</th><th>إضافات</th></tr><tr><td>لاتيه</td><td>1</td><td>2</td><td>خفيفة</td><td>-</td></tr><tr><td>كابتشينو</td><td>1</td><td>1</td><td>كثيفة</td><td>-</td></tr><tr><td>موكا</td><td>1</td><td>2</td><td>خفيفة</td><td>شوكولاتة</td></tr><tr><td>ماكياتو</td><td>1</td><td>½</td><td>قليلة</td><td>-</td></tr></table><div class="sum"><strong>💡 الخلاصة:</strong> الفرق بين لاتيه وكابتشينو هو كمية الرغوة. اللاتيه رغوة خفيفة، الكابتشينو رغوة كثيفة تعلو المشروب.</div>',body_en:'h3>☕ Cappuccino & Mocha — The Classic Drinks</h3><p><strong>Cappuccino:</strong> Espresso + steamed milk + thick foam in a 1:1:1 ratio. Named after the Capuchin monks due to the brown color of their robes.</p><p><strong>Caffè Mocha:</strong> Espresso + chocolate + steamed milk. Created in Italy as a dessert option.</p><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">☕ Classic Cappuccino</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">🍫 Chocolate Mocha</div></div></div><table><tr><th>Drink</th><th>Espresso</th><th>Milk</th><th>Foam</th><th>Add-ins</th></tr><tr><td>Latte</td><td>1</td><td>2</td><td>Light</td><td>-</td></tr><tr><td>Cappuccino</td><td>1</td><td>1</td><td>Thick</td><td>-</td></tr><tr><td>Mocha</td><td>1</td><td>2</td><td>Light</td><td>Chocolate</td></tr><tr><td>Macchiato</td><td>1</td><td>½</td><td>Slight</td><td>-</td></tr></table><div class="sum"><strong>💡 Summary:</strong> The difference between Latte and Cappuccino is the amount of foam. Latte has light foam, Cappuccino has thick foam that sits on top of the drink.</div>'}
]},
{id:'module-B1',title:{ar:'أسرار التحميص',en:'Roasting Secrets'},icon:'🔥',desc:{ar:'علم تحميص القهوة من الأخضر إلى المحمص',en:'The Science of Roasting — From Green to Brown'},img:2,lessons:[
{title:{ar:'كيمياء التحميص — تفاعل ميلارد',en:'Roasting Chemistry — The Maillard Reaction'},img:11,body:'<h3>🔥 علم تحميص القهوة</h3><p>التحميص هو تطبيق حرارة على البن الأخضر لتحويله كيميائياً وفيزيائياً إلى بن محمص صالح للاستخلاص. تبدأ الحبة باللون الأخضر وتنتهي باللون البني.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80" alt=""><div class="cap">🔥 عملية التحميص — من الأخضر إلى البني</div></div><div class="info-b"><strong>📊 التحليل العلمي العميق:</strong> تفاعل ميلارد (Maillard Reaction) يبدأ عند 150°م ويكون مسؤولاً عن النكهات المعقدة — نفس التفاعل الذي يعطي الخبز المحمص والستيك نكهته. عند أول crack (196°م)، يتمدد حجم الحبة بنسبة 50-80% ويتحول النشا إلى سكريات. عند ثاني crack (220°م)، تتحول الزيوت إلى سطح الحبة.</div><table><tr><th>المرحلة</th><th>درجة الحرارة</th><th>التغير الكيميائي</th><th>النكهة الناتجة</th></tr><tr><td>التجفيف</td><td>30-100°م</td><td>تبخر الرطوبة من 10% إلى 0%</td><td>بدون نكهة</td></tr><tr><td>تفاعل ميلارد</td><td>150-190°م</td><td>تفاعل الأحماض الأمينية مع السكريات</td><td>نكهات الخبز المحمص</td></tr><tr><td>First Crack</td><td>196°م</td><td>تمدد الحبة واندفاع البخار</td><td>حموضة زهرية</td></tr><tr><td>التطوير</td><td>196-220°م</td><td>تكسر الكلوروجينيك أسيد</td><td>نكهات كراميل</td></tr><tr><td>Second Crack</td><td>220°م+</td><td>احتراق السكريات وتكسر الزيوت</td><td>مدخن داكن</td></tr></table><div class="sc-b"><strong>🔬 مرجع SCA:</strong> مقياس Agtron يستخدم لقياس درجة التحميص رقمياً. #95 = فاتح جداً (الحموضة عالية)، #55 = متوسط (توازن)، #25 = داكن جداً (مرارة عالية).</div><div class="err"><strong>❌ خطأ شائع:</strong> التحميص الداكن يخفي عيوب البن الرديء. البن الفاخر (Specialty) يُحمص فاتحاً أو متوسطاً لإبراز نكهاته الطبيعية، وليس لإخفائها.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 اختبار سريع</div><p style="font-size:.9rem;color:#6d4c41">عند أي درجة حرارة يبدأ تفاعل ميلارد (Maillard)؟</p><div class="q-o" data-correct="0"><span class="ql">أ</span> 100°م</div><div class="q-o" data-correct="1"><span class="ql">ب</span> 150°م</div><div class="q-o" data-correct="0"><span class="ql">ج</span> 200°م</div><div class="q-o" data-correct="0"><span class="ql">د</span> 50°م</div></div></div>,body_en:'<h3>🔥 The Science of Coffee Roasting</h3><p>Roasting is the application of heat to green coffee to chemically and physically transform it into roasted coffee ready for extraction. The bean starts green and ends brown.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80" alt=""><div class="cap">🔥 The roasting process — from green to brown</div></div><div class="info-b"><strong>📊 Deep Scientific Analysis:</strong> The Maillard Reaction begins at 150°C and is responsible for complex flavors — the same reaction that gives toast and steak their flavor. At first crack (196°C), the bean expands 50-80% and starches convert to sugars. At second crack (220°C), oils migrate to the bean surface.</div><table><tr><th>Phase</th><th>Temperature</th><th>Chemical Change</th><th>Resulting Flavor</th></tr><tr><td>Drying</td><td>30-100°C</td><td>Moisture evaporates from 10% to 0%</td><td>No flavor</td></tr><tr><td>Maillard</td><td>150-190°C</td><td>Amino acids react with sugars</td><td>Toasted bread flavors</td></tr><tr><td>First Crack</td><td>196°C</td><td>Bean expansion, steam rush</td><td>Floral acidity</td></tr><tr><td>Development</td><td>196-220°C</td><td>Chlorogenic acid breakdown</td><td>Caramel flavors</td></tr><tr><td>Second Crack</td><td>220°C+</td><td>Sugar combustion, oil breakdown</td><td>Dark smoky</td></tr></table><div class="sc-b"><strong>🔬 SCA Reference:</strong> The Agtron scale measures roast degree numerically. #95 = Very Light (high acidity), #55 = Medium (balanced), #25 = Very Dark (high bitterness).</div><div class="err"><strong>❌ Common Mistake:</strong> Dark roasting hides defects in poor quality beans. Specialty coffee is roasted light or medium to highlight natural flavors, not to hide them.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 Quick Quiz</div><p style="font-size:.9rem;color:#6d4c41">At what temperature does the Maillard Reaction begin?</p><div class="q-o" data-correct="2"><span class="ql">A</span> 100°C</div><div class="q-o" data-correct="0"><span class="ql">B</span> 196°C</div><div class="q-o" data-correct="1"><span class="ql">C</span> 150°C</div><div class="q-o" data-correct="0"><span class="ql">D</span> 220°C</div></div></div>'},
{title:{ar:'منحنيات التحميص وضبط الماكينة',en:'Roast Curves and Machine Calibration'},img:11,body:'<h3>📈 فن قراءة منحنيات التحميص</h3><p>منحنى التحميص (Roast Curve) هو رسم بياني يوثق درجة حرارة البن عبر الزمن. كل ماكينة تحميص لها بصمتها الحرارية الفريدة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">📈 منحنى تحميص — Rate of Rise (RoR)</div></div><p><strong>Rate of Rise (RoR):</strong> معدل ارتفاع الحرارة بالدرجة في الدقيقة. منحنى مثالي يبدأ بانحدار تدريجي. إذا زاد RoR عن 15°م/دقيقة، خطر حرق الحبة. إذا قل عن 5°م/دقيقة، يصبح التحميص باهتاً.</p><div class="info-b"><strong>📊 الثالوث الذهبي للتحميص:</strong> 1) وقت التجفيف (Drying time): 4-5 دقائق 2) وقت ميلارد (Maillard time): 3-5 دقائق 3) وقت التطوير (Development time): 20-25% من إجمالي وقت التحميص. Development Time Ratio = وقت ما بعد First Crack ÷ إجمالي وقت التحميص × 100.</div><div class="sum"><strong>💡 قاعدة تجريبية:</strong> لمعظم أنواع البن Single Origin، الوقت المثالي بين First Crack ونهاية التحميص هو 90-120 ثانية للتعبير عن نكهات الفواكه والحلاوة.</div>,body_en:'<h3>📈 The Art of Reading Roast Curves</h3><p>A roast curve is a graph documenting bean temperature over time. Every roasting machine has its unique thermal signature.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">📈 Roast curve — Rate of Rise (RoR)</div></div><p><strong>Rate of Rise (RoR):</strong> The rate of temperature increase in degrees per minute. An ideal curve starts with a gradual decline. If RoR exceeds 15°C/min, there is a risk of scorching. If it drops below 5°C/min, the roast becomes baked.</p><div class="info-b"><strong>📊 The Golden Triad of Roasting:</strong> 1) Drying time: 4-5 minutes 2) Maillard time: 3-5 minutes 3) Development time: 20-25% of total roast time. Development Time Ratio = Post-First Crack Time / Total Roast Time x 100.</div><div class="sum"><strong>💡 Practical Rule:</strong> For most single origin coffees, the ideal time between First Crack and roast end is 90-120 seconds to express fruity flavors and sweetness.</div>'},
{title:{ar:'تأثير التحميص على TDS والاستخلاص',en:'Roast Level Effect on TDS & Extraction'},img:10,body:'<h3>🔬 علاقة التحميص بالاستخلاص</h3><p>البن المحمص فاتحاً (Light Roast) أكثر كثافة وصلابة، يحتاج طحناً أدق وماءً أشد حرارة للاستخلاص. البن المحمص داكناً (Dark Roast) أكثر مسامية ويستخلص بسرعة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">🔬 مسامية الحبة تزداد مع التحميص</div></div><table><tr><th>درجة التحميص</th><th>مسامية</th><th>طحن مناسب</th><th>TDS متوقع</th></tr><tr><td>فاتح (Light)</td><td>منخفضة</td><td>ناعم</td><td>1.2-1.3%</td></tr><tr><td>متوسط (Medium)</td><td>متوسطة</td><td>متوسط</td><td>1.35-1.45%</td></tr><tr><td>داكن (Dark)</td><td>عالية</td><td>خشن</td><td>1.5-1.6%</td></tr></table><div class="err"><strong>❌ خطأ شائع:</strong> استخدام نفس الطحن لكل درجات التحميص. البن الفاتح يحتاج طحناً أدق لأن الخلايا أقل مسامية، والبن الداكن يحتاج طحناً أخشن لتجنب الاستخلاص الزائد.</div><div class="sc-b"><strong>🔬 مرجع IBA:</strong> معهد الباريستا الدولي يوصي بزيادة 1-2 درجة على مقياس الطحن لكل 10 نقاط Agtron زيادة (أي كلما افتح التحميص، كلما احتجت طحناً أدق).</div>,body_en:'<h3>🔬 The Relationship Between Roast and Extraction</h3><p>Light roast coffee is denser and harder, requiring a finer grind and hotter water for extraction. Dark roast coffee is more porous and extracts quickly.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">🔬 Bean porosity increases with roasting</div></div><table><tr><th>Roast Level</th><th>Porosity</th><th>Grind Size</th><th>Expected TDS</th></tr><tr><td>Light</td><td>Low</td><td>Fine</td><td>1.2-1.3%</td></tr><tr><td>Medium</td><td>Medium</td><td>Medium</td><td>1.35-1.45%</td></tr><tr><td>Dark</td><td>High</td><td>Coarse</td><td>1.5-1.6%</td></tr></table><div class="err"><strong>❌ Common Mistake:</strong> Using the same grind setting for all roast levels. Light roasts need a finer grind because the cells are less porous; dark roasts need a coarser grind to avoid over-extraction.</div><div class="sc-b"><strong>🔬 IBA Reference:</strong> The International Barista Institute recommends increasing the grind by 1-2 steps for every 10 Agtron points increase.</div>'},
]},
{id:'module-B2',title:{ar:'علم الماء في القهوة',en:'Water Science in Coffee'},icon:'💧',desc:{ar:'جودة الماء وتأثيرها الحاسم على طعم القهوة',en:'Water Quality and Its Critical Impact on Coffee Taste'},img:3,lessons:[
{title:{ar:'كيمياء الماء وتأثيره على الاستخلاص',en:'Water Chemistry and Its Effect on Extraction'},img:8,body:'<h3>💧 الماء — المذيب المثالي للقهوة</h3><p>القهوة تتكون من 98-99% ماء. إذا كان الماء غير مناسب، يستحيل عمل قهوة جيدة بغض النظر عن جودة البن. الماء هو المذيب الذي يستخلص المركبات العطرية والنكهات من البن المطحون.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">💧 جودة الماء أساس القهوة الجيدة</div></div><p><strong>العناصر الرئيسية في الماء المؤثرة على القهوة:</strong></p><ul><li>الكالسيوم (Ca²⁺): ضروري لاستخلاص النكهات، يدعم الجسم والقوام</li><li>المغنيسيوم (Mg²⁺): الأهم! يعزز استخلاص الفواكه والحموضة الزهرية</li><li>البيكربونات (HCO₃⁻): تخفف الحموضة — كثرتها تطفئ النكهات</li><li>الصوديوم (Na⁺): بكميات قليلة يعزز الحلاوة</li></ul><table><tr><th>المعدن</th><th>الكمية المثلى</th><th>التأثير على النكهة</th><th>مشكلة النقص/الزيادة</th></tr><tr><td>المغنيسيوم</td><td>10-30 ppm</td><td>يزيد النكهات الزهرية والفاكهية</td><td>نقصه → استخلاص باهت</td></tr><tr><td>الكالسيوم</td><td>30-60 ppm</td><td>يقوي Body القهوة</td><td>زيادته → قسوة ومرارة</td></tr><tr><td>البيكربونات</td><td>40-80 ppm</td><td>تخفف الحموضة</td><td>كثرتها → قهوة مسطحة</td></tr></table><div class="info-b"><strong>📊 القياسات المرجعية SCA لماء القهوة:</strong> TDS: 150-175 ppm · العسر الكلي: 60-120 ppm · القلوية: 40-80 ppm CaCO₃ · pH: 6.5-7.5 · الصوديوم: <10 mg/L</div><div class="err"><strong>❌ خطأ شائع:</strong> الماء المقطر (0 TDS) يستخلص بسرعة زائدة ويعطي قهوة حامضة جداً لأنه لا يحتوي على معادن لتعديل الاستخلاص. الماء العسر جداً (>250 ppm) يمنع الاستخلاص ويعطي مرارة.</div>,body_en:'<h3>💧 Water — The Ideal Solvent for Coffee</h3><p>Coffee is 98-99% water. If the water is unsuitable, it is impossible to make good coffee regardless of bean quality. Water is the solvent that extracts aromatic compounds and flavors from ground coffee.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">💧 Water quality is the foundation of good coffee</div></div><p><strong>Key minerals in water that affect coffee:</strong></p><ul><li>Calcium (Ca2+): Essential for flavor extraction, supports body and texture</li><li>Magnesium (Mg2+): Most important! Enhances fruit and floral acidity extraction</li><li>Bicarbonate (HCO3-): Buffers acidity — too much flattens flavors</li><li>Sodium (Na+): In small amounts enhances sweetness</li></ul><table><tr><th>Mineral</th><th>Optimal Level</th><th>Flavor Impact</th><th>Deficiency/Excess</th></tr><tr><td>Magnesium</td><td>10-30 ppm</td><td>Increases floral and fruity notes</td><td>Deficiency = flat extraction</td></tr><tr><td>Calcium</td><td>30-60 ppm</td><td>Strengthens body</td><td>Excess = harshness, bitterness</td></tr><tr><td>Bicarbonate</td><td>40-80 ppm</td><td>Reduces acidity</td><td>Excess = flat coffee</td></tr></table><div class="info-b"><strong>📊 SCA Water Quality Standards:</strong> TDS: 150-175 ppm . Total Hardness: 60-120 ppm . Alkalinity: 40-80 ppm CaCO3 . pH: 6.5-7.5 . Sodium: <10 mg/L</div><div class="err"><strong>❌ Common Mistake:</strong> Distilled water (0 TDS) extracts too quickly and produces very sour coffee because it lacks minerals to buffer extraction. Very hard water (>250 ppm) prevents extraction and causes bitterness.</div>'},
{title:{ar:'TDS — مفتاح الاتساق والاحترافية',en:'TDS — The Key to Consistency & Professionalism'},img:5,body:'<h3>📊 فهم مقياس TDS</h3><p>TDS (Total Dissolved Solids) هو إجمالي المواد الصلبة الذائبة في المشروب. يقاس بجهاز Refractometer. النسبة المثلى للقهوة المقطرة: 1.2-1.5%.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">📊 قياس TDS بجهاز Refractometer</div></div><p><strong>علاقة TDS بالاستخلاص:</strong> TDS × وزن المشروب ÷ وزن القهوة الجافة = Extraction Yield (نسبة الاستخلاص). النسبة المثلى: 18-22%.</p><p class="hl">مثال تطبيقي: 250 مل قهوة TDS=1.4% = 3.5 جرام مواد صلبة ذائبة. إذا استخدمت 20 جرام بن، يكون الاستخلاص = 3.5÷20×100 = 17.5% (استخلاص ناقص، زود الطحن أو الحرارة).</p><div class="sum"><strong>💡 نصيحة احترافية:</strong> احتفظ بسجل TDS لكل قهوة تحضرها. مع الوقت ستعرف العلاقة بين TDS والطعم المثالي لكل نوع بن. الاتساق هو الفرق بين الباريستا الجيد والممتاز.</div><div class="q-section"><div class="q-q"><div class="q-t">📝 تمرين عملي</div><p style="font-size:.9rem;color:#6d4c41">حضر قهوة V60 بالطريقة المعتادة. بعد التحضير، خذ 3 قراءات TDS واحسب المتوسط. سجل النتيجة وقارنها بـ 1.35%. هل تحتاج تعديل الطحن أو النسبة؟</p></div></div>,body_en:'<h3>📊 Understanding TDS Measurement</h3><p>TDS (Total Dissolved Solids) is the total amount of dissolved solids in the beverage. It is measured with a Refractometer. The optimal range for drip coffee: 1.2-1.5%.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">📊 Measuring TDS with a Refractometer</div></div><p><strong>TDS and Extraction Relationship:</strong> TDS x Beverage Weight / Dry Coffee Weight = Extraction Yield. Optimal range: 18-22%.</p><p class="hl">Practical example: 250ml coffee at 1.4% TDS = 3.5g dissolved solids. If you used 20g of coffee, extraction = 3.5/20x100 = 17.5% (under-extraction — grind finer or increase temperature).</p><div class="sum"><strong>💡 Pro Tip:</strong> Keep a TDS log for every coffee you brew. Over time you will learn the relationship between TDS and perfect flavor. Consistency is the difference between a good barista and a great one.</div><div class="q-section"><div class="q-q"><div class="q-t">📝 Practical Exercise</div><p style="font-size:.9rem;color:#6d4c41">Brew a V60 using your usual method. Take 3 TDS readings and calculate the average. Compare to 1.35%. Do you need to adjust grind or ratio?</p></div></div>'},
{title:{ar:'أنظمة معالجة المياه وفلاتر المقهى',en:'Water Treatment Systems and Cafe Filters'},img:8,body:'<h3>🛠️ اختيار نظام معالجة المياه</h3><p>كل مقهى محترف يحتاج نظام معالجة مياه. أنواع الفلاتر: الكربون النشط (يزيل الكلور والروائح)، التبادل الأيوني (يخفف العسر)، التناضح العكسي RO (يزيل كل شيء ويحتاج إعادة تمعدن).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🛠️ نظام معالجة مياه احترافي للمقاهي</div></div><table><tr><th>النظام</th><th>يزيل</th><th>المميزات</th><th>العيوب</th></tr><tr><td>كربون نشط</td><td>كلور، روائح</td><td>رخيص، سهل</td><td>لا يغير TDS</td></tr><tr><td>تبادل أيوني</td><td>عسر (Ca, Mg)</td><td>يضبط القلوية</td><td>يحتاج صيانة دورية</td></tr><tr><td>RO + إعادة تمعدن</td><td>كل شيء</td><td>تحكم كامل</td><td>غالي، يهدر ماء</td></tr></table><div class="hl"><strong>💡 توصية الخبراء:</strong> لمعظم المقاهي المتوسطة، كربون نشط + فلتريوم أيوني يكفي للوصول إلى TDS 150-175 ppm. للمقاهي الفاخرة، RO مع إضافة أملاح مخصصة للقهوة (Third Wave Water).</div><div class="err"><strong>❌ خطأ شائع:</strong> استخدام فلتر واحد فقط للمقهى بالكامل (ماكينة إسبريسو + ماء ساخن + باريستا). كل استخدام يحتاج معالجة مختلفة. ماكينة الإسبريسو تحتاج ماء أقل عسراً لمنع الترسبات الكلسية.</div>,body_en:'<h3>🛠️ Choosing a Water Treatment System</h3><p>Every professional cafe needs a water treatment system. Filter types: Activated Carbon (removes chlorine and odors), Ion Exchange (softens water), Reverse Osmosis RO (removes everything and needs re-mineralization).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🛠️ Professional water treatment system for cafes</div></div><table><tr><th>System</th><th>Removes</th><th>Pros</th><th>Cons</th></tr><tr><td>Activated Carbon</td><td>Chlorine, odors</td><td>Cheap, easy</td><td>Does not change TDS</td></tr><tr><td>Ion Exchange</td><td>Hardness (Ca, Mg)</td><td>Adjusts alkalinity</td><td>Needs regular maintenance</td></tr><tr><td>RO + Re-mineralization</td><td>Everything</td><td>Full control</td><td>Expensive, wastes water</td></tr></table><div class="hl"><strong>💡 Expert Recommendation:</strong> For most medium-scale cafes, activated carbon + ion exchange filter is sufficient to reach 150-175 ppm TDS. For specialty cafes, RO with custom coffee mineral additives.</div><div class="err"><strong>❌ Common Mistake:</strong> Using a single filter for the entire cafe (espresso machine + hot water + barista). Each use requires different treatment. Espresso machine needs softer water to prevent scale.</div>'},
]},
{id:'module-B3',title:{ar:'متغيرات التحضير المتقدمة',en:'Advanced Brewing Variables'},icon:'⚙️',desc:{ar:'علم الطحن والاستخلاص للاحتراف',en:'Grinding and Extraction Science for Professionals'},img:1,lessons:[
{title:{ar:'توزيع حجم الطحن — Particle Size Distribution',en:'Particle Size Distribution'},img:2,body:'<h3>⚙️ علم الطحن: Particle Size Distribution</h3><p>الطحن ليس مجرد ناعم أو خشن. كل درجة طحن تنتج توزيعاً من الأحجام. المطحنة الجيدة تنتج توزيعاً ضيقاً (أغلب الحبيبات بنفس الحجم). المطحنة الرديئة تنتج غبار ناعم (Fines) وحبيبات خشنة (Boulders).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">⚙️ توزيع أحجام الطحن — الفارق بين مطحنة جيدة ورديئة</div></div><p><strong>تأثير Fines و Boulders:</strong> الـ Fines تستخلص بسرعة وتسبب مرارة. الـ Boulders تستخلص ببطء وتسبب حموضة غير مرغوبة. النتيجة: قهوة حامضة ومرة في نفس الوقت.</p><div class="info-b"><strong>📊 قياس توزيع الطحن:</strong> مقياس Micron (ميكرون). الإسبريسو = 200-350 ميكرون · V60 = 500-800 ميكرون · French Press = 800-1200 ميكرون. النسبة المثلى للـ Fines أقل من 5% من الوزن.</div><div class="sc-b"><strong>🔬 مرجع SCA:</strong> SCA تقيس جودة المطحنة بمنحنى PSD (Particle Size Distribution). المطحنة الاحترافية يجب أن يكون منحناها bell-shaped ضيق (Standard Deviation < 100 ميكرون).</div><div class="err"><strong>❌ خطأ شائع:</strong> تنظيف المطحنة يومياً فقط. الـ Fines المتراكمة تتعفن وتسبب مرارة غير طبيعية. نظف المطحنة بين كل تغيير في درجة الطحن (بعد 3-4 استخدمات).</div>,body_en:'<h3>⚙️ Grinding Science: Particle Size Distribution</h3><p>Grinding is not just fine or coarse. Every grind setting produces a distribution of particle sizes. A good grinder produces a narrow distribution (most particles the same size). A poor grinder produces fines and boulders.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">⚙️ Particle size distribution — difference between a good and poor grinder</div></div><p><strong>Effect of Fines and Boulders:</strong> Fines extract quickly and cause bitterness. Boulders extract slowly and cause unwanted sourness. Result: coffee that is both sour and bitter.</p><div class="info-b"><strong>📊 Grind Distribution Measurement:</strong> Micron scale. Espresso = 200-350 microns . V60 = 500-800 microns . French Press = 800-1200 microns. Optimal fines: less than 5%.</div><div class="sc-b"><strong>🔬 SCA Reference:</strong> SCA measures grinder quality by PSD curves. A professional grinder should have a narrow bell-shaped curve (Standard Deviation under 100 microns).</div><div class="err"><strong>❌ Common Mistake:</strong> Cleaning the grinder only daily. Accumulated fines go rancid and cause unnatural bitterness. Clean between every grind size change.</div>'},
{title:{ar:'منحنيات الاستخلاص — Extraction Yield',en:'Extraction Yield Curves'},img:3,body:'<h3>📈 تحليل Extraction Yield</h3><p>Extraction Yield (EY) = نسبة المواد الذائبة من البن الجاف. النطاق المثالي حسب SCA: 18-22%. داخل هذا النطاق، يختلف الطعم حسب TDS.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">📈 جدول Extraction Yield — النقطة المثالية</div></div><p><strong>خريطة النكهات حسب EY:</strong></p><ul><li><strong>EY < 16%:</strong> استخلاص ناقص جداً — طعم مالح، حامض، ضعيف، يشبه ماء البن</li><li><strong>EY 16-18%:</strong> ناقص خفيف — حموضة عالية، حلاوة قليلة، Body خفيف</li><li><strong>EY 18-20%:</strong> مثالي للحموضة الزهرية — مثالي للـ Single Origin الفاتح</li><li><strong>EY 20-22%:</strong> مثالي للتوازن — قهوة كاملة، حلاوة، Body متوسط (المعيار الذهبي)</li><li><strong>EY 22-24%:</strong> زائد خفيف — مرارة خفيفة، طعم خشبي، Body ثقيل</li><li><strong>EY > 24%:</strong> استخلاص زائد — مرارة عالية، جفاف، رماد</li></ul><table><tr><th>إذا كان الطعم</th><th>المشكلة</th><th>الحل</th></tr><tr><td>حامض + مالح</td><td>Under-extraction</td><td>زد الحرارة أو انعم الطحن</td></tr><tr><td>مر + جاف</td><td>Over-extraction</td><td>قلل الحرارة أو اخشن الطحن</td></tr><tr><td>حامض ومر معاً</td><td>PSD سيئ (Fines+Boulders)</td><td>نظف المطحنة أو غير المطحنة</td></tr></table><div class="hl"><strong>💡 حل سريع:</strong> مشكلة تذوقها حامض ومر في نفس الوقت؟ غالباً المطحنة مشكلتها مش درجة الطحن. جرب نخلة غبار الطحن عبر sieve (منخل) 200 ميكرون.</div>,body_en:'<h3>📈 Extraction Yield Analysis</h3><p>Extraction Yield (EY) = percentage of dissolved solids from dry coffee. SCA optimal range: 18-22%. Within this range, flavor varies by TDS.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">📈 Extraction Yield chart — the sweet spot</div></div><p><strong>Flavor Map by EY:</strong></p><ul><li><strong>EY under 16%:</strong> Severe under-extraction — salty, sour, weak</li><li><strong>EY 16-18%:</strong> Slight under-extraction — high acidity, low sweetness</li><li><strong>EY 18-20%:</strong> Ideal for floral acidity — perfect for light single origin</li><li><strong>EY 20-22%:</strong> Ideal for balance — full coffee, sweetness, medium body</li><li><strong>EY 22-24%:</strong> Slight over-extraction — mild bitterness, woody taste</li><li><strong>EY over 24%:</strong> Over-extraction — high bitterness, dryness, ash taste</li></ul><table><tr><th>If taste is</th><th>Problem</th><th>Solution</th></tr><tr><td>Sour + Salty</td><td>Under-extraction</td><td>Increase heat or grind finer</td></tr><tr><td>Bitter + Dry</td><td>Over-extraction</td><td>Reduce heat or grind coarser</td></tr></table><div class="hl"><strong>💡 Quick Fix:</strong> Tasting both sour and bitter? The grinder is likely the issue. Try sifting fines through a 200-micron sieve.</div>'},
{title:{ar:'ضبط الوصفات الاحترافية — Dialing In',en:'Professional Recipe Calibration — Dialing In'},img:7,body:'<h3>🎯 علم ضبط الوصفات Dialing In</h3><p>كل نوع بن جديد يحتاج ضبط (Dial In). عملية منهجية لتحديد أفضل إعدادات: درجة الطحن، الجرعة، وقت التحضير، النسبة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🎯 عملية Dial In الاحترافية</div></div><p><strong>بروتوكول Dial In للمبتدئين (4 خطوات):</strong></p><ol style="margin:12px 0 12px 20px"><li><strong>اختر النسبة:</strong> ابدأ بـ 1:16 للـ V60 (15 جرام بن: 240 مل ماء)</li><li><strong>ثبت الحرارة:</strong> 94°م لتحميص متوسط، 96°م لتحميص فاتح، 92°م لتحميص داكن</li><li><strong>اضبط الطحن:</strong> ابدأ بطحن متوسط كحبيبات السكر. القهوة تخلص في 2:30-3:00 دقائق → صح. أسرع من 2:00 → انعم الطحن. أبطأ من 3:30 → اخشن الطحن.</li><li><strong>اضبط الذوق:</strong> بعد الوصول للوقت المناسب، ذق. حامض → انعم قليلاً. مر → اخشن قليلاً.</li></ol><div class="info-b"><strong>📊 جداول ضبط الإسبريسو الاحترافي:</strong> جرعة: 18-20 جرام · وقت: 25-30 ثانية · حجم الخرج: 36-40 جرام (نسبة 1:2) · الضغط: 9 بار · الحرارة: 93°م. إذا تخلص الإسبريسو أسرع من 20 ثانية → انعم الطحن. أبطأ من 35 ثانية → اخشن الطحن.</div><div class="sum"><strong>💡 الخلاصة:</strong> Dial In عملية علمية منظمة. غير متغيراً واحداً فقط في كل مرة. سجل كل شيء. الاحتراف ليس موهبة — هو نظام توثيق وتكرار.</div>,body_en:'<h3>🎯 The Science of Dialing In</h3><p>Every new coffee requires dialing in — a systematic process to determine the best settings: grind size, dose, brew time, ratio.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🎯 Professional dialing in process</div></div><p><strong>Beginner Dial In Protocol (4 steps):</strong></p><ol style="margin:12px 0 12px 20px"><li><strong>Choose ratio:</strong> Start with 1:16 for V60 (15g coffee: 240ml water)</li><li><strong>Set temperature:</strong> 94°C for medium roast, 96°C for light, 92°C for dark</li><li><strong>Adjust grind:</strong> Start medium like sugar. Finishes in 2:30-3:00 = correct. Faster than 2:00 = finer. Slower than 3:30 = coarser.</li><li><strong>Adjust by taste:</strong> Sour = finer. Bitter = coarser.</li></ol><div class="info-b"><strong>📊 Professional Espresso Dialing:</strong> Dose: 18-20g . Time: 25-30 sec . Yield: 36-40g . Pressure: 9 bar . Temp: 93°C. Faster than 20 sec = finer. Slower than 35 sec = coarser.</div><div class="sum"><strong>💡 Summary:</strong> Dialing in is a systematic scientific process. Change only one variable at a time. Document everything.</div>'},
]},
{id:'module-C1',title:{ar:'التقييم الحسي والكابينج',en:'Sensory Evaluation & Cupping'},icon:'👅',desc:{ar:'علم تذوق القهوة الاحترافي SCA',en:'Professional Coffee Tasting — SCA Standards'},img:3,lessons:[
{title:{ar:'فن الكابينج — تذوق احترافي',en:'The Art of Cupping — Professional Tasting'},img:5,body:'<h3>👅 التقييم الحسي الاحترافي (Cupping)</h3><p>الكابينج هو طريقة موحدة لتقييم القهوة معتمدة من SCA. يقيم 10 معايير بمجموع 100 نقطة. القهوة التي تحصل على 80+ تصنف Specialty Grade.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">👅 جلسة كابينج احترافية — تقييم القهوة</div></div><div class="info-b"><strong>📊 معايير SCA للتقييم (100 نقطة):</strong> العطر (Fragrance/Aroma) 15% · النكهة (Flavor) 20% · الحموضة (Acidity) 10% · القوام (Body) 10% · المذاق النهائي (Aftertaste) 10% · التوازن (Balance) 10% · الحلاوة (Sweetness) 10% · النظافة (Clean Cup) 10% · التوحيد (Uniformity) 10% · الانطباع العام (Overall) 5%</div><p>تصنيفات SCA: 90-100 = Outstanding · 85-89.99 = Excellent · 80-84.99 = Very Good (Specialty) · <80 = Below Specialty (تجارية).</p><div class="err"><strong>❌ خطأ شائع جداً:</strong> الخلط بين الحموضة (Acidity) والمرارة (Bitterness). الحموضة نكهة مرغوبة تدل على جودة البن — تشبه حموضة الحمضيات أو التفاح. المرارة الزائدة تدل على استخلاص زائد أو تحميص داكن جداً.</div>,body_en:'<h3>👅 Professional Sensory Evaluation (Cupping)</h3><p>Cupping is a standardized method for evaluating coffee, approved by SCA. It evaluates 10 criteria for a total of 100 points. Coffee scoring 80+ is classified as Specialty Grade.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">👅 Professional cupping session — coffee evaluation</div></div><div class="info-b"><strong>📊 SCA Evaluation Criteria (100 points):</strong> Fragrance/Aroma 15% . Flavor 20% . Acidity 10% . Body 10% . Aftertaste 10% . Balance 10% . Sweetness 10% . Clean Cup 10% . Uniformity 10% . Overall 5%</div><p>SCA Classifications: 90-100 = Outstanding . 85-89.99 = Excellent . 80-84.99 = Very Good (Specialty) . Under 80 = Below Specialty.</p><div class="err"><strong>❌ Common Mistake:</strong> Confusing acidity with bitterness. Acidity is a desirable flavor indicating quality — similar to citrus or apple acidity. Excessive bitterness indicates over-extraction or very dark roasting.</div>'},
