<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <title>Esenza Academy</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #F7F2EB; color: #1A0F0A;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1A0F0A, #3E2312);
            padding: 20px; text-align: center;
            border-bottom: 3px solid #D4A85A;
        }
        .header h1 {
            font-family: 'Georgia', serif;
            color: #D4A85A; font-size: 1.8rem;
        }
        .header p { color: #A67B5B; font-size: 0.9rem; margin-top: 4px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .admin-panel {
            background: white; border-radius: 12px; padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .admin-panel h2 { color: #3E2312; margin-bottom: 16px; }
        .student-form { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .student-form input {
            flex: 1; min-width: 120px; padding: 10px 14px;
            border: 2px solid #EDE0D4; border-radius: 8px;
            font-family: inherit; font-size: 0.95rem;
        }
        .student-form input:focus { outline: none; border-color: #D4A85A; }
        .btn {
            padding: 10px 24px; border: none; border-radius: 8px;
            font-family: inherit; font-weight: 700; cursor: pointer;
            background: #D4A85A; color: #1A0F0A; transition: 0.3s;
        }
        .btn:hover { background: #B8922E; transform: translateY(-1px); }
        .btn-danger { background: #E74C3C; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .student-list { margin-top: 16px; }
        .student-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #EDE0D4;
        }
        .student-item strong { color: #3E2312; }
        .student-item span { color: #6D4C41; font-size: 0.85rem; }
        .empty { color: #A67B5B; text-align: center; padding: 20px; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1A0F0A; color: #EDE0D4; padding: 12px 24px;
            border-radius: 8px; opacity: 0; transition: 0.4s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .login-card {
            background: white; border-radius: 16px; padding: 40px;
            max-width: 400px; margin: 60px auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-card h1 { color: #3E2312; margin-bottom: 8px; }
        .login-card input {
            width: 100%; padding: 12px; margin-bottom: 12px;
            border: 2px solid #EDE0D4; border-radius: 8px;
            font-family: inherit; font-size: 1rem;
        }
        .login-card input:focus { border-color: #D4A85A; outline: none; }
        .error { color: #E74C3C; margin-bottom: 12px; display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>☕ Esenza Academy</h1>
    <p>تدريب الباريستا — من البداية للاحتراف</p>
</div>

<div id="loginScreen" class="container">
    <div class="login-card">
        <h1>تسجيل الدخول</h1>
        <div class="error" id="loginError"></div>
        <input type="text" id="userInput" placeholder="اسم المستخدم">
        <input type="password" id="passInput" placeholder="كلمة المرور">
        <button class="btn" id="loginBtn" style="width:100%;font-size:1.1rem;">دخول</button>
    </div>
</div>

<div id="appScreen" class="container" style="display:none;">
    <div class="admin-panel">
        <h2>🔐 لوحة المشرف</h2>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <span id="userLabel" style="color:#6D4C41;"></span>
            <button class="btn btn-danger" onclick="doLogout()">تسجيل خروج</button>
        </div>
        <h3>➕ إضافة طالب جديد</h3>
        <div class="student-form">
            <input type="text" id="nameInput" placeholder="الاسم">
            <input type="text" id="userNewInput" placeholder="اسم المستخدم">
            <input type="text" id="passNewInput" placeholder="كلمة المرور">
            <button class="btn" onclick="addStudent()">إضافة</button>
        </div>
        <h3>📋 قائمة الطلاب</h3>
        <div id="studentList" class="student-list">
            <div class="empty">لا يوجد طلاب بعد</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let students = [];
let loggedIn = false;

const DB_NAME = 'esenza_db';
const DB_VER = 1;

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VER);
        req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('users')) {
                db.createObjectStore('users', { keyPath: 'username' });
            }
            if (!db.objectStoreNames.contains('settings')) {
                db.createObjectStore('settings', { keyPath: 'key' });
            }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

async function dbGet(store, key) {
    const db = await openDB();
    return new Promise((res, rej) => {
        const t = db.transaction(store, 'readonly');
        const r = t.objectStore(store).get(key);
        r.onsuccess = () => { db.close(); res(r.result); };
        r.onerror = () => { db.close(); rej(r.error); };
    });
}

async function dbPut(store, data) {
    const db = await openDB();
    return new Promise((res, rej) => {
        const t = db.transaction(store, 'readwrite');
        const r = t.objectStore(store).put(data);
        r.onsuccess = () => { db.close(); res(); };
        r.onerror = () => { db.close(); rej(r.error); };
    });
}

async function dbGetAll(store) {
    const db = await openDB();
    return new Promise((res, rej) => {
        const t = db.transaction(store, 'readonly');
        const r = t.objectStore(store).getAll();
        r.onsuccess = () => { db.close(); res(r.result); };
        r.onerror = () => { db.close(); rej(r.error); };
    });
}

async function dbDelete(store, key) {
    const db = await openDB();
    return new Promise((res, rej) => {
        const t = db.transaction(store, 'readwrite');
        const r = t.objectStore(store).delete(key);
        r.onsuccess = () => { db.close(); res(); };
        r.onerror = () => { db.close(); rej(r.error); };
    });
}

function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

async function seedAdmin() {
    const existing = await dbGet('users', 'admin');
    if (!existing) {
        await dbPut('users', { username: 'admin', password: 'esenza2024', name: 'المدير', role: 'admin' });
    }
}

async function handleLogin() {
    const user = document.getElementById('userInput').value.trim();
    const pass = document.getElementById('passInput').value.trim();
    const errorEl = document.getElementById('loginError');
    
    if (!user || !pass) {
        errorEl.textContent = '⚠️ أدخل اسم المستخدم وكلمة المرور';
        errorEl.style.display = 'block';
        return;
    }
    
    try {
        await seedAdmin();
        const u = await dbGet('users', user);
        if (!u || u.password !== pass) {
            errorEl.textContent = '⚠️ اسم المستخدم أو كلمة المرور خطأ';
            errorEl.style.display = 'block';
            return;
        }
        errorEl.style.display = 'none';
        enterApp(u);
    } catch(e) {
        errorEl.textContent = '⚠️ خطأ: ' + e.message;
        errorEl.style.display = 'block';
    }
}

function enterApp(user) {
    loggedIn = true;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('userLabel').textContent = '👋 مرحباً ' + user.name;
    loadStudents();
}

function doLogout() {
    loggedIn = false;
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('appScreen').style.display = 'none';
    document.getElementById('userInput').value = '';
    document.getElementById('passInput').value = '';
}

async function loadStudents() {
    const all = await dbGetAll('users');
    students = all.filter(u => u.username !== 'admin');
    const el = document.getElementById('studentList');
    if (students.length === 0) {
        el.innerHTML = '<div class="empty">لا يوجد طلاب بعد</div>';
        return;
    }
    el.innerHTML = students.map(s => `
        <div class="student-item">
            <div>
                <strong>${s.name}</strong><br>
                <span>@${s.username}</span>
            </div>
            <button class="btn btn-danger" onclick="deleteStudent('${s.username}')">حذف</button>
        </div>
    `).join('');
}

async function addStudent() {
    const name = document.getElementById('nameInput').value.trim();
    const user = document.getElementById('userNewInput').value.trim();
    const pass = document.getElementById('passNewInput').value.trim();
    if (!name || !user || !pass) { showToast('⚠️ املأ جميع الحقول'); return; }
    if (user === 'admin') { showToast('⚠️ هذا الاسم محجوز'); return; }
    const existing = await dbGet('users', user);
    if (existing) { showToast('⚠️ الطالب موجود'); return; }
    await dbPut('users', { username: user, password: pass, name, role: 'student' });
    document.getElementById('nameInput').value = '';
    document.getElementById('userNewInput').value = '';
    document.getElementById('passNewInput').value = '';
    showToast('✅ تم إضافة ' + name);
    loadStudents();
}

async function deleteStudent(username) {
    await dbDelete('users', username);
    showToast('🗑️ تم حذف الطالب');
    loadStudents();
}

document.getElementById('loginBtn').addEventListener('click', handleLogin);
document.getElementById('userInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('passInput').focus();
});
document.getElementById('passInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
});

seedAdmin();
</script>
</body>
</html>
