<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esenza Academy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f7f2eb;color:#1a0f0a}
hdr{background:linear-gradient(135deg,#1a0f0a,#3e2312);padding:20px;text-align:center;border-bottom:3px solid #d4a85a}
hdr h1{color:#d4a85a;font-size:1.8rem;font-family:Georgia,serif}
hdr p{color:#a67b5b;font-size:.9rem;margin-top:4px}
.c{max-width:1000px;margin:0 auto;padding:20px}
.tbs{display:flex;gap:8px;margin-bottom:20px}
.tb{padding:10px 24px;border:none;border-radius:8px;font-weight:700;cursor:pointer;background:#ede0d4;color:#6d4c41}
.tb.act{background:#d4a85a;color:#1a0f0a}
.lg{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.lc{background:white;border-radius:16px;overflow:hidden;border:2px solid #ede0d4;cursor:pointer}
.lc:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.lc .hd{padding:24px;text-align:center;background:linear-gradient(135deg,#1a0f0a,#3e2312)}
.lc .hd .ic{font-size:3rem}
.lc .hd h3{color:#d4a85a;font-family:Georgia,serif;font-size:1.4rem;margin-top:8px}
.lc .bd{padding:20px}
.lc .bd p{color:#6d4c41;font-size:.9rem;margin-bottom:12px}
.lc .bd .st{display:flex;justify-content:space-around;padding-top:12px;border-top:1px solid #ede0d4}
.lc .bd .st div{text-align:center}
.lc .bd .st .n{font-weight:900;color:#3e2312;font-size:1.1rem}
.lc .bd .st .l{font-size:.78rem;color:#a67b5b}
.mc{background:white;border-radius:12px;margin-bottom:12px;border:1px solid #ede0d4;overflow:hidden}
.mc .mi{padding:16px 20px}
.mc .mi h4{color:#3e2312}
.mc .mi p{color:#6d4c41;font-size:.85rem;margin-bottom:8px}
.mc .mi .ls{list-style:none;padding:0}
.mc .mi .ls li{padding:6px 0;border-bottom:1px solid #ede0d4;cursor:pointer;color:#3e2312;font-size:.9rem}
.mc .mi .ls li:hover{color:#d4a85a}
.ap{background:white;border-radius:12px;padding:24px}
.ap h2{color:#3e2312;margin-bottom:16px}
.sf{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sf input{flex:1;min-width:120px;padding:10px 14px;border:2px solid #ede0d4;border-radius:8px;font-size:.95rem}
.sf input:focus{outline:none;border-color:#d4a85a}
.btn{padding:10px 24px;border:none;border-radius:8px;font-weight:700;cursor:pointer;background:#d4a85a;color:#1a0f0a}
.btn:hover{background:#b8922e}
.bd{border-radius:8px;background:#e74c3c;margin:8px}.bd:hover{background:#c0392b}
.si{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #ede0d4}
.h{display:none!important}
.t{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a0f0a;color:#ede0d4;padding:12px 24px;border-radius:8px;opacity:0;transition:.4s;pointer-events:none;z-index:999}
.t.s{opacity:1}
.ls-sc{background:white;border-radius:12px;margin-top:20px}
.ls-sc .ls-h{padding:20px;background:linear-gradient(135deg,#1a0f0a,#3e2312);color:white}
.ls-sc .ls-h .br{color:#a67b5b;font-size:.85rem}
.ls-sc .ls-h h2{margin-top:8px;font-family:Georgia,serif}
.ls-sc .ls-b{padding:24px}
.ls-sc .ls-b .bk{display:inline-block;margin-bottom:16px;color:#d4a85a;cursor:pointer;font-weight:700}
.ls-c{line-height:1.8}
.ls-c p{margin-bottom:12px}
.ls-c h3{color:#3e2312;margin:20px 0 10px}
.ls-c .hl{background:#ede0d4;padding:16px;border-right:4px solid #d4a85a;border-radius:8px;margin:12px 0}
</style>
</head>
<body>
<hdr><h1>☕ Esenza Academy</h1><p>تدريب الباريستا — من البداية للاحتراف</p></hdr>
<div class="c" id="root"></div>
<div class="t" id="t"></div>
<script>
// ==================== Content ====================
const CL = {
  A:{id:'A',t:'مبتدئ',ic:'🌱',co:'#27AE60',d:'اكتشاف القهوة وأصولها'},
  B:{id:'B',t:'محترف',ic:'🔥',co:'#E67E22',d:'أسرار التحميص والاستخلاص المتقدم'},
  C:{id:'C',t:'ماستر',ic:'👑',co:'#8E44AD',d:'التقييم الحسي والإدارة والابتكار'}
};
const CM = [];

for(let lv of ['A','B','C']){
  let n = lv==='A'?3:(lv==='B'?3:3);
  for(let i=1;i<=n;i++){
    CM.push({
      id:'module-'+lv+i,
      title:lv+' — موديول '+i,
      icon:lv==='A'?'☕':'🔥',
      desc:'محتوى المستوى '+lv+' - الوحدة '+i,
      lessons:[
        {title:'الدرس الأول - '+lv+i+'1',body:'<h3>مقدمة</h3><p>هذا هو الدرس الأول في المستوى '+lv+'. محتوى علمي معتمد من SCA.</p><div class="hl"><strong>💡 الخلاصة:</strong> هذا الدرس يغطي المفاهيم الأساسية.</div>'},
        {title:'الدرس الثاني - '+lv+i+'2',body:'<h3>التعمق العلمي</h3><p>في هذا الدرس نتعمق أكثر في الموضوع.</p><div class="hl"><strong>📊 التحليل:</strong> فهم أعمق للمادة العلمية.</div>'},
      ]
    });
  }
}

CM[0]={id:'module-A1',title:'اكتشاف القهوة وأصولها',icon:'🌍',desc:'رحلة حبة البن من الغابة إلى الفنجان',lessons:[
{title:'قصة اكتشاف القهوة',body:'<h3>📖 قصة كلد وقطيع الماعز</h3><p>يروى أن راعياً إثيوبياً اسمه كلد لاحظ نشاطاً غير عادي في قطيع الماعز بعد أن أكل ثماراً حمراء من شجرة غريبة. جربها بنفسه وشعر بالنشاط. أخبر الرهبان في الدير المجاور، فصنعوا منها مشروباً ساعدهم على السهر في الصلاة. هكذا بدأت رحلة القهوة.</p><div class="hl"><strong>💡 الخلاصة:</strong> اكتشاف القهوة كان مصادفة، لكنه غيّر العالم. الإثيوبيون أول من استخدموا حبة البن كمشروب منشط.</div>'},
{title:'البن العربي — الأصول والتصنيف',body:'<h3>🔬 التصنيف النباتي</h3><p>القهوة تنتمي للجنس Coffea، وأهم نوعين: Coffea arabica (75% من الإنتاج) و Coffea canephora (روبوستا).</p><p>العربية نشأت في إثيوبيا، وتزرع في المرتفعات (600-2000م). الروبوستا أكثر مقاومة للأمراض وأعلى كافيين.</p><div class="hl"><strong>📊 التحليل:</strong> العربية تحتوي على 1.2% كافيين، الروبوستا 2.2%. الزيوت العطرية في العربية أكثر تعقيداً، مما يعطيها نكهات زهرية وفاكهية.</div>'},
]};
if(CM.length>1)CM[1]={id:'module-A2',title:'أساسيات التحضير',icon:'⚗️',desc:'من الحبة إلى الفنجان — علم الاستخلاص',lessons:[
{title:'علم الاستخلاص',body:'<h3>🔬 فيزياء وكيمياء الاستخلاص</h3><p>الاستخلاص هو عملية إذابة المركبات القابلة للذوبان من البن المطحون في الماء. العوامل المؤثرة: درجة الطحن، درجة حرارة الماء (92-96°م)، نسبة القهوة للماء، وقت التلامس.</p><div class="hl"><strong>📊 التحليل العلمي:</strong> النسبة المثلى للاستخلاص هي 18-22% من وزن القهوة. أقل من 18% استخلاص ناقص (طعم حامض)، أكثر من 22% استخلاص زائد (طعم مر).</div>'},
]};

function $(id){return document.getElementById(id)}
function qs(s){return document.querySelector(s)}
function qsa(s){return document.querySelectorAll(s)}
function to(m){let e=$('t');e.textContent=m;e.classList.add('s');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('s'),2000)}

function gL(m){return m.id.replace('module-','')[0]}
function gM(l){return CM.filter(m=>gL(m)===l)}
function gLM(l){return CM.filter(m=>gL(m)===l)}

function rT(t){
  let r=$('root');
  r.innerHTML='<div class="tbs" id="tbs">'+
    '<button class="tb'+(t==='c'?' act':'')+'" onclick="rT(\'c\')">📚 المنهج</button>'+
    '<button class="tb'+(t==='a'?' act':'')+'" onclick="rT(\'a\')">🔐 الطلاب</button>'+
  '</div>';
  if(t==='c') r.innerHTML+=sL();
  else r.innerHTML+=sA();
  if(t==='a') lS();
}

function sL(){
  let h='<h2 style="color:#3e2312;margin-bottom:16px;">🎯 اختر مستواك</h2><div class="lg">';
  ['A','B','C'].forEach(l=>{
    let lv=CL[l],ms=gM(l),tl=ms.reduce((s,m)=>s+m.lessons.length,0);
    h+='<div class="lc" onclick="sM(\''+l+'\')"><div class="hd"><div class="ic">'+lv.ic+'</div><h3>'+lv.t+'</h3></div><div class="bd"><p>'+lv.d+'</p><div class="st"><div><div class="n">'+ms.length+'</div><div class="l">موديولات</div></div><div><div class="n">'+tl+'</div><div class="l">دروس</div></div></div></div></div>';
  });
  return h+'</div><div id="ms"></div><div id="ls"></div>';
}

function sM(l){
  let ms=gM(l),lv=CL[l];
  let h='<button class="btn" onclick="rT(\'c\')" style="margin-bottom:16px">⬅ الرجوع للمستويات</button>'+
    '<h2 style="color:#3e2312;margin-bottom:16px">'+lv.ic+' '+lv.t+' — '+ms.length+' موديولات</h2>';
  ms.forEach((m,mi)=>{
    h+='<div class="mc"><div class="mi"><h4>'+m.icon+' '+m.title+'</h4><p>'+m.desc+' — '+m.lessons.length+' دروس</p>'+
      '<ul class="ls">';
    m.lessons.forEach((les,li)=>{
      h+='<li onclick="sLsn(\''+l+'\','+mi+','+li+')">📖 '+les.title+'</li>';
    });
    h+='</ul></div></div>';
  });
  $('ms').innerHTML=h;
  $('ms').scrollIntoView({behavior:'smooth'});
}

function sLsn(l,mi,li){
  let ms=gM(l);
  let m=ms[mi],les=m.lessons[li];
  let prev=li>0?'<button class="btn" onclick="sLsn(\''+l+'\','+mi+','+(li-1)+')" style="margin-left:8px">⬅ السابق</button>':'';
  let next=li<m.lessons.length-1?'<button class="btn" onclick="sLsn(\''+l+'\','+mi+','+(li+1)+')">التالي ➡</button>':'';
  let h='<div class="ls-sc"><div class="ls-h"><div class="br">'+m.icon+' '+m.title+' — درس '+(li+1)+' من '+m.lessons.length+'</div><h2>'+les.title+'</h2></div>'+
    '<div class="ls-b"><div class="bk" onclick="sM(\''+l+'\')">⬅ الرجوع للموديول</div><div class="ls-c">'+les.body+'</div>'+
    '<div style="margin-top:24px;padding-top:20px;border-top:2px solid #ede0d4">'+prev+next+'</div></div></div>';
  $('ls').innerHTML=h;
  $('ls').scrollIntoView({behavior:'smooth'});
}

function sA(){
  return '<div class="ap"><h2>🔐 لوحة المشرف</h2>'+
    '<h3>➕ إضافة طالب</h3><div class="sf">'+
    '<input type="text" id="ni" placeholder="الاسم">'+
    '<input type="text" id="ui" placeholder="اسم المستخدم">'+
    '<input type="text" id="pi" placeholder="كلمة المرور">'+
    '<button class="btn" onclick="aS()">إضافة</button></div>'+
    '<h3>📋 الطلاب</h3><div id="sl"><div class="empty" style="color:#a67b5b;padding:20px;text-align:center">لا يوجد طلاب</div></div></div>';
}

function oD(){
  return new Promise((r,j)=>{
    let q=indexedDB.open('edb',1);
    q.onupgradeneeded=e=>{let d=e.target.result;if(!d.objectStoreNames.contains('u'))d.createObjectStore('u',{keyPath:'k'})};
    q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);
  });
}
async function gA(s){let d=await oD();return new Promise((r,j)=>{let t=d.transaction(s,'readonly'),q=t.objectStore(s).getAll();q.onsuccess=()=>{d.close();r(q.result)};q.onerror=()=>{d.close();j(q.error)}})}
async function pA(s,v){let d=await oD();return new Promise((r,j)=>{let t=d.transaction(s,'readwrite'),q=t.objectStore(s).put(v);q.onsuccess=()=>{d.close();r()};q.onerror=()=>{d.close();j(q.error)}})}
async function dA(s,k){let d=await oD();return new Promise((r,j)=>{let t=d.transaction(s,'readwrite'),q=t.objectStore(s).delete(k);q.onsuccess=()=>{d.close();r()};q.onerror=()=>{d.close();j(q.error)}})}

async function lS(){
  try{
    let a=await gA('u'),s=a.filter(x=>x.k!=='admin');
    let e=$('sl');
    if(!s.length){e.innerHTML='<div style="color:#a67b5b;padding:20px;text-align:center">لا يوجد طلاب بعد</div>';return}
    e.innerHTML=s.map(x=>'<div class="si"><div><strong>'+x.n+'</strong><br><span style="color:#6d4c41;font-size:.85rem">@'+x.k+'</span></div><button class="btn" style="background:#e74c3c;color:white" onclick="dS(\''+x.k+'\')">حذف</button></div>').join('');
  }catch(e){$('sl').innerHTML='<div style="color:#e74c3c;padding:20px;text-align:center">⚠️ خطأ في قاعدة البيانات</div>'}
}

async function aS(){
  let n=$('ni').value.trim(),u=$('ui').value.trim(),p=$('pi').value.trim();
  if(!n||!u||!p){to('⚠️ املأ الحقول');return}
  if(u==='admin'){to('⚠️ الاسم محجوز');return}
  try{await pA('u',{k:u,n,password:p,role:'student'})}catch(e){}
  $('ni').value='';$('ui').value='';$('pi').value='';
  to('✅ تم إضافة '+n);lS();
}

async function dS(u){try{await dA('u',u)}catch(e){}to('🗑️ تم الحذف');lS()}

rT('c');
</script>
</body>
</html>
