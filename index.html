<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esenza Academy — تدريب الباريستا</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f7f2eb;color:#1a0f0a;min-height:100vh}
hdr{background:linear-gradient(135deg,#1a0f0a,#3e2312);padding:20px;text-align:center;border-bottom:3px solid #d4a85a;position:relative;overflow:hidden}
hdr::before{content:'';position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1200&q=80') center/cover;opacity:.06}
hdr h1{color:#d4a85a;font-size:1.8rem;font-family:Georgia,serif;position:relative}
hdr p{color:#a67b5b;position:relative}
.c{max-width:1000px;margin:0 auto;padding:20px}
.tbs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tb{padding:10px 20px;border:none;border-radius:8px;font-weight:700;cursor:pointer;background:#ede0d4;color:#6d4c41;transition:.3s;font-size:.9rem}
.tb.act,.tb:hover{background:#d4a85a;color:#1a0f0a;transform:translateY(-1px)}
.lg{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:20px}
.lc{background:white;border-radius:20px;overflow:hidden;border:2px solid #ede0d4;cursor:pointer;transition:.4s cubic-bezier(.4,0,.2,1)}
.lc:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,.1);border-color:#d4a85a}
.lc .hd{min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.lc .hd .bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:.5s}
.lc:hover .hd .bg{transform:scale(1.1)}
.lc .hd .ov{position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,15,10,.85),rgba(62,35,18,.75))}
.lc .hd .ic{font-size:3rem;position:relative;z-index:1;margin-bottom:4px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.2))}
.lc .hd h3{color:#d4a85a;font-family:Georgia,serif;font-size:1.5rem;position:relative;z-index:1}
.lc .bd{padding:20px}
.lc .bd p{color:#6d4c41;font-size:.9rem;margin-bottom:12px}
.lc .bd .st{display:flex;justify-content:space-around;padding-top:12px;border-top:1px solid #ede0d4}
.lc .bd .st div{text-align:center}
.lc .bd .st .n{font-weight:900;color:#3e2312;font-size:1.2rem}
.lc .bd .st .l{font-size:.78rem;color:#a67b5b}
.mc{background:white;border-radius:16px;margin-bottom:16px;border:1px solid #ede0d4;overflow:hidden;transition:.3s}
.mc:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.mc .mh{display:flex;cursor:pointer;transition:.3s}
.mc .mh:hover{background:#faf5ef}
.mc .msd{width:130px;min-height:130px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#3e2312,#5a3a28)}
.mc .msd .mbg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.2;transition:.5s}
.mc .mh:hover .msd .mbg{transform:scale(1.1)}
.mc .msd .mic{font-size:2.5rem;position:relative;z-index:1}
.mc .msd .mnm{position:relative;z-index:1;color:rgba(255,255,255,.5);font-size:.75rem;margin-top:4px}
.mc .mi{flex:1;padding:16px 20px;display:flex;flex-direction:column;justify-content:center}
.mc .mi h4{color:#3e2312;font-size:1.1rem}
.mc .mi p{color:#6d4c41;font-size:.85rem;margin-top:4px}
.mc .mi .pr{height:4px;background:#ede0d4;border-radius:2px;margin-top:10px;overflow:hidden}
.mc .mi .pr .fl{height:100%;background:linear-gradient(90deg,#d4a85a,#e8cc8a);border-radius:2px;width:0%;transition:width .8s}
.mc .lessons-list{padding:0 20px 16px}
.mc .lessons-list .lsi{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:.3s;border-bottom:1px solid #f0e8e0}
.mc .lessons-list .lsi:hover{background:#faf5ef;padding-right:16px}
.mc .lessons-list .lsi .ln{width:24px;height:24px;border-radius:50%;background:#ede0d4;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#6d4c41;flex-shrink:0}
.mc .lessons-list .lsi .lt{font-size:.9rem;color:#3e2312;flex:1}
.ap{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.ap h2{color:#3e2312;margin-bottom:16px}
.sf{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sf input{flex:1;min-width:120px;padding:10px 14px;border:2px solid #ede0d4;border-radius:8px;font-size:.95rem;font-family:inherit}
.sf input:focus{outline:none;border-color:#d4a85a;box-shadow:0 0 0 3px rgba(212,168,90,.1)}
.btn{padding:10px 24px;border:none;border-radius:8px;font-weight:700;cursor:pointer;background:#d4a85a;color:#1a0f0a;transition:.3s;font-family:inherit;font-size:.9rem}
.btn:hover{background:#b8922e;transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,168,90,.3)}
.btn-sm{padding:6px 14px;font-size:.85rem}
.btn-rd{background:#e74c3c;color:white}.btn-rd:hover{background:#c0392b}
.si{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #ede0d4}
.h{display:none!important}
.t{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a0f0a;color:#ede0d4;padding:12px 28px;border-radius:12px;opacity:0;transition:.4s;pointer-events:none;z-index:999;font-size:.9rem;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.t.s{opacity:1;transform:translateX(-50%) translateY(0)}
.ls-sc{background:white;border-radius:16px;margin-top:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.ls-sc .ls-h{position:relative;min-height:200px;overflow:hidden;background:linear-gradient(135deg,#1a0f0a,#3e2312)}
.ls-sc .ls-h .hb{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.2;transition:.5s}
.ls-sc:hover .ls-h .hb{transform:scale(1.05)}
.ls-sc .ls-h .hc{position:relative;z-index:1;padding:40px 32px;display:flex;flex-direction:column;justify-content:flex-end;min-height:200px}
.ls-sc .ls-h .hc .br{color:#a67b5b;font-size:.85rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ls-sc .ls-h .hc .br .prg{background:rgba(255,255,255,.1);padding:2px 10px;border-radius:12px;font-size:.78rem}
.ls-sc .ls-h .hc h2{margin-top:4px;font-family:Georgia,serif;font-size:1.6rem;color:white}
.ls-sc .ls-b{padding:28px 32px}
.ls-sc .ls-b .bk{display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;color:#d4a85a;cursor:pointer;font-weight:700;padding:8px 16px;border-radius:8px;transition:.3s;font-size:.9rem}
.ls-sc .ls-b .bk:hover{background:#ede0d4}
.ls-c{line-height:1.9;font-size:.95rem}
.ls-c p{margin-bottom:14px}
.ls-c h3{color:#3e2312;margin:24px 0 12px;font-size:1.2rem}
.ls-c h4{color:#5a3a28;margin:18px 0 8px;font-size:1.05rem}
.ls-c .hl{background:#ede0d4;padding:16px 20px;border-right:4px solid #d4a85a;border-radius:8px;margin:16px 0}
.ls-c .img-c{background:#faf5ef;border-radius:12px;padding:12px;margin:16px 0;text-align:center;border:1px solid #ede0d4;overflow:hidden}
.ls-c .img-c img{max-width:100%;border-radius:8px;display:block;margin:0 auto;max-height:350px;width:100%;object-fit:cover}
.ls-c .img-c .cap{margin-top:8px;font-size:.85rem;color:#6d4c41;display:flex;align-items:center;justify-content:center;gap:6px}
.ls-c .info-b{background:linear-gradient(135deg,#1a0f0a,#3e2312);color:white;padding:20px;border-radius:12px;margin:16px 0}
.ls-c .info-b strong{color:#d4a85a}
.ls-c .err{background:#fde8e8;padding:16px 20px;border-radius:8px;margin:12px 0;border-right:4px solid #e74c3c}
.ls-c .err strong{color:#e74c3c}
.ls-c .sum{background:#e8f5e9;padding:16px 20px;border-radius:8px;margin:16px 0;border-right:4px solid #27ae60}
.ls-c .sum strong{color:#27ae60}
.ls-c .sc-b{background:#fff8e1;padding:12px 16px;border-radius:8px;margin:12px 0;font-size:.9rem;border-right:4px solid #ffc107}
.ls-c .sc-b strong{color:#f57f17}
.ls-c .img-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.ls-c .img-row .img-c{margin:0}
.ls-c ul{margin:12px 0 12px 20px}
.ls-c ul li{margin-bottom:6px}
.ls-c table{width:100%;border-collapse:collapse;margin:16px 0;border-radius:8px;overflow:hidden}
.ls-c table th,.ls-c table td{padding:10px 14px;text-align:right;border:1px solid #ede0d4;font-size:.9rem}
.ls-c table th{background:#ede0d4;color:#3e2312;font-weight:700}
.nav-b{margin-top:24px;padding-top:20px;border-top:2px solid #ede0d4;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.ls-c .q-section{background:#faf5ef;border-radius:12px;padding:20px;margin:16px 0;border:2px solid #ede0d4}
.ls-c .q-section .q-q{margin-bottom:16px;padding:16px;background:white;border-radius:8px}
.ls-c .q-section .q-q .q-t{font-weight:700;margin-bottom:10px;color:#3e2312}
.ls-c .q-section .q-o{padding:10px 14px;margin-bottom:6px;border-radius:6px;cursor:pointer;border:2px solid #ede0d4;transition:.3s;display:flex;align-items:center;gap:8px}
.ls-c .q-section .q-o:hover{border-color:#d4a85a;background:white}
.ls-c .q-section .q-o.s{border-color:#d4a85a;background:#fff8e1}
.ls-c .q-section .q-o.c{border-color:#27ae60;background:#e8f5e9}
.ls-c .q-section .q-o.w{border-color:#e74c3c;background:#fde8e8}
.ls-c .q-section .q-o .ql{width:24px;height:24px;border-radius:50%;background:#ede0d4;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.ls-c .q-section .q-o.s .ql{background:#d4a85a;color:white}
.ls-c .q-section .q-o.c .ql{background:#27ae60;color:white}
.ls-c .q-section .q-o.w .ql{background:#e74c3c;color:white}
.ex{background:white;border-radius:16px;padding:28px 32px;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.ex .eq{margin-bottom:24px;padding:20px;background:#faf5ef;border-radius:12px;border-right:4px solid #d4a85a}
.ex .eq .eqn{font-size:.8rem;color:#a67b5b;margin-bottom:4px}
.ex .eq .eqq{font-weight:700;color:#3e2312;margin-bottom:12px;font-size:1.05rem}
.ex .eq .eo{display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;border-radius:8px;border:2px solid #ede0d4;cursor:pointer;transition:.3s}
.ex .eq .eo:hover{border-color:#d4a85a;background:white}
.ex .eq .eo input[type=radio]{accent-color:#d4a85a;width:18px;height:18px;cursor:pointer}
.ex .eq .eo label{cursor:pointer;flex:1;font-size:.95rem;color:#3e2312}
.ex .eq .eo.s{border-color:#d4a85a;background:#fff8e1}
.ex .eq .eo.c{border-color:#27ae60;background:#e8f5e9}
.ex .eq .eo.w{border-color:#e74c3c;background:#fde8e8}
/* ===== Certificate ===== */
.cert{max-width:720px;margin:0 auto;background:white;border-radius:4px;overflow:hidden;box-shadow:0 12px 80px rgba(0,0,0,.2);position:relative;padding:10px}
.cert .ci{background:linear-gradient(135deg,#fcf9f5,#f8f0e6);padding:48px 40px 40px;text-align:center;position:relative;z-index:2;border:3px double #d4a85a;border-radius:4px;box-shadow:inset 0 0 0 1px rgba(212,168,90,.2)}
.cert .ci::before{content:'☕';position:absolute;top:10px;left:20px;font-size:2rem;opacity:.08;transform:rotate(-15deg)}
.cert .ci::after{content:'☕';position:absolute;bottom:10px;right:20px;font-size:2rem;opacity:.08;transform:rotate(15deg)}
.cert .ci .corner{position:absolute;width:30px;height:30px;border-color:#d4a85a;border-style:solid}
.cert .ci .corner-tl{top:16px;right:16px;border-width:3px 3px 0 0}
.cert .ci .corner-tr{top:16px;left:16px;border-width:3px 0 0 3px}
.cert .ci .corner-bl{bottom:16px;right:16px;border-width:0 3px 3px 0}
.cert .ci .corner-br{bottom:16px;left:16px;border-width:0 0 3px 3px}
.cert .ci .c-icon{width:56px;height:56px;margin:0 auto 10px;position:relative}
.cert .ci .c-icon .outer{position:absolute;inset:0;border-radius:50%;border:2px solid #d4a85a;animation:pp 3s ease-in-out infinite}
.cert .ci .c-icon .outer::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(212,168,90,.2)}
.cert .ci .c-icon .inner{position:absolute;inset:6px;border-radius:50%;background:linear-gradient(135deg,#d4a85a,#b8922e);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:white;box-shadow:0 2px 10px rgba(212,168,90,.3)}
.cert .ci .cx{border:0;padding:0;margin:0;font-size:0;height:0}
.cert .ci .ctop{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:4px}
.cert .ci .ctop::before,.cert .ci .ctop::after{content:'';flex:1;max-width:80px;height:1px;background:linear-gradient(90deg,transparent,#d4a85a)}
.cert .ci .ctop::after{background:linear-gradient(90deg,#d4a85a,transparent)}
.cert .ci .ctop span{color:#d4a85a;font-size:.8rem;letter-spacing:3px;text-transform:uppercase}
.cert .ci .an{font-size:1.2rem;font-weight:900;color:#3e2312;letter-spacing:2px;font-family:Georgia,serif}
.cert .ci .sub{color:#a67b5b;font-size:.8rem;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.cert .ci .sub::before,.cert .ci .sub::after{content:'•';color:#d4a85a;font-size:.6rem}
.cert .ci .certh{margin:8px 0 4px;position:relative}
.cert .ci .certh .h-gold{display:inline-block;background:linear-gradient(135deg,#d4a85a,#b8922e);color:white;padding:6px 36px;border-radius:4px;font-size:1.1rem;font-weight:700;letter-spacing:2px;box-shadow:0 2px 8px rgba(212,168,90,.3)}
.cert .ci .cname-wrap{margin:14px 0;position:relative;padding:6px 0}
.cert .ci .cname-wrap::before{content:'—';position:absolute;top:-2px;left:50%;transform:translateX(-50%);color:#d4a85a;font-size:.8rem}
.cert .ci .cname-wrap::after{content:'—';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);color:#d4a85a;font-size:.8rem}
.cert .ci .cname{font-size:2rem;font-weight:900;color:#1a0f0a;font-family:Georgia,serif;letter-spacing:1px;line-height:1.2}
.cert .ci .cbody{color:#6d4c41;font-size:.9rem;line-height:1.8;max-width:400px;margin:0 auto 10px}
.cert .ci .cbody strong{color:#3e2312}
.cert .ci .clevel{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#fff8e1,#fff);padding:5px 18px;border-radius:3px;font-weight:600;color:#3e2312;margin:4px 0 10px;font-size:.85rem;border:1px solid #d4a85a;letter-spacing:.5px}
.cert .ci .clevel .lv-icon{font-size:1.2rem}
.cert .ci .cscore{margin:4px 0;font-size:.85rem;color:#6d4c41}
.cert .ci .cscore strong{color:#3e2312}
.cert .ci .csb{height:5px;background:#ede0d4;border-radius:3px;margin:6px auto 4px;overflow:hidden;max-width:280px}
.cert .ci .csb .csf{height:100%;background:linear-gradient(90deg,#d4a85a,#e8cc8a);border-radius:3px;transition:width 1s ease}
.cert .ci .csig{display:flex;align-items:flex-end;justify-content:center;gap:32px;margin:14px 0 6px;padding:12px 0 0;position:relative}
.cert .ci .csig .csig-box{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;max-width:180px}
.cert .ci .csig .csig-line{width:100%;height:1px;border-top:2px solid #3e2312;margin-bottom:2px}
.cert .ci .csig .csig-label{font-size:.65rem;color:#a67b5b}
.cert .ci .csig .cstamp-box{flex:0 0 auto;max-width:100px}
.cert .ci .csig .cstamp{width:72px;height:72px;border-radius:50%;border:3px double #d4a85a;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff8e1,#fff);box-shadow:0 0 0 4px white,0 0 0 5px rgba(212,168,90,.3);position:relative;margin-top:-20px}
.cert .ci .csig .cstamp .cstamp-in{font-size:.5rem;color:#3e2312;text-align:center;line-height:1.2;font-weight:700}
.cert .ci .cft{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid #ede0d4}
.cert .ci .cft .cdate{color:#a67b5b;font-size:.72rem;display:flex;align-items:center;gap:4px}
.cert .ci .cft .csep{color:#d4a85a;font-size:.5rem}
.cert .ci .cm{color:#c4b5a5;font-size:.6rem;margin-top:12px;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:6px}
.cert .ci .cm span{opacity:.5}
.cnt{background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.cnt .cci{display:flex;align-items:center;gap:16px;padding:14px;border:2px solid #ede0d4;border-radius:12px;margin-bottom:12px;transition:.3s;cursor:pointer}
.cnt .cci:hover{border-color:#d4a85a;background:#faf5ef}
.cnt .cci .ccic{font-size:2rem;width:50px;text-align:center}
.cnt .cci .ccid{flex:1}
.cnt .cci .ccid .cct{font-weight:700;color:#3e2312;font-size:.95rem}
.cnt .cci .ccid .ccs{color:#a67b5b;font-size:.8rem}
.cnt .cci .ccid .ccd{color:#6d4c41;font-size:.78rem}
/* ===== Animations ===== */
@keyframes fi{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pp{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes fw{from{width:0%}}
@keyframes sh{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes gl{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes sd{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes ru{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lc{animation:fi .5s ease both}
.lc:nth-child(2){animation-delay:.15s}
.lc:nth-child(3){animation-delay:.3s}
.mc{animation:ru .4s ease both}
.mc:nth-child(2){animation-delay:.1s}
.mc:nth-child(3){animation-delay:.2s}
.mc:nth-child(4){animation-delay:.3s}
.mc:nth-child(5){animation-delay:.4s}
.mc:nth-child(6){animation-delay:.5s}
.mc:nth-child(7){animation-delay:.6s}
.mc:nth-child(8){animation-delay:.7s}
.mc:nth-child(9){animation-delay:.8s}
.ls-sc{animation:fi .5s ease}
.ex{animation:fi .5s ease}
.cert .ci .cb{animation:pp 2s ease-in-out infinite}
.cert .ci .cs{animation:pp 3s ease-in-out infinite}
.btn{position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);background-size:200% 100%;animation:sh 3s ease-in-out infinite;pointer-events:none}
.tb{animation:sd .3s ease both}
.tb:nth-child(2){animation-delay:.05s}
.tb:nth-child(3){animation-delay:.1s}
.tb:nth-child(4){animation-delay:.15s}
.lc .hd .ic{animation:fl 4s ease-in-out infinite}
.cci{animation:ru .4s ease both}
.cci:nth-child(2){animation-delay:.1s}
.cci:nth-child(3){animation-delay:.2s}
.cci:nth-child(4){animation-delay:.3s}
.lsi{transition:.3s}
.lsi:hover .ln{transform:scale(1.15);background:#d4a85a;color:white}
.ln{transition:.3s}
hdr{animation:sd .5s ease}

{id:'module-A1',title:'اكتشاف القهوة وأصولها',icon:'🌍',desc:'رحلة حبة البن من الغابة إلى الفنجان',img:0,lessons:[
{title:'قصة اكتشاف القهوة',img:0,body:'<h3>📖 قصة كلد وقطيع الماعز</h3><p>يروى أن راعياً إثيوبياً اسمه كلد لاحظ نشاطاً غير عادي في قطيع الماعز بعد أن أكل ثماراً حمراء من شجرة غريبة. جربها بنفسه وشعر بالنشاط. أخبر الرهبان في الدير المجاور، فصنعوا منها مشروباً ساعدهم على السهر في الصلاة. هكذا بدأت رحلة القهوة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80" alt=""><div class="cap">☕ أول فنجان قهوة في التاريخ — إثيوبيا، القرن 9</div></div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=300&q=60" alt=""><div class="cap">🌿 غابات البن الإثيوبية</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">🫘 حبوب البن الطازجة</div></div></div><div class="sum"><strong>💡 الخلاصة:</strong> اكتشاف القهوة كان مصادفة، لكنه غيّر العالم. الإثيوبيون أول من استخدموا حبة البن كمشروب منشط.</div><div class="q-section"><div class="q-q"><div class="q-t">💬 هل تعلم؟</div><p style="font-size:.9rem;color:#6d4c41">كلمة "قهوة" أصلها من الكلمة العربية "قَهْوَة" التي كانت تعني الخمر في الشعر الجاهلي، ثم أصبحت تُطلق على شراب البن لنشوته.</p></div></div>'},
{title:'البن العربي — الأصول والتصنيف',img:1,body:'<h3>🔬 التصنيف النباتي للقهوة</h3><p>القهوة تنتمي للجنس <em>Coffea</em>، وأهم نوعين: <strong>Coffea arabica</strong> (75% من الإنتاج) و <strong>Coffea canephora</strong> (روبوستا).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600&q=80" alt=""><div class="cap">🌱 حبوب بن الأرابيكا — Coffea arabica</div></div><p>الأرابيكا نشأت في إثيوبيا، وتُزرع في المرتفعات (600-2000م). الروبوستا أكثر مقاومة للأمراض وأعلى كافيين.</p><table><tr><th>الخاصية</th><th>أرابيكا Arabica</th><th>روبوستا Robusta</th></tr><tr><td>الكافيين</td><td>1.2%</td><td>2.2%</td></tr><tr><td>الارتفاع</td><td>600-2000م</td><td>0-800م</td></tr><tr><td>النكهة</td><td>زهرية/فاكهية</td><td>ترابية/خشنة</td></tr><tr><td>السعر</td><td>أعلى</td><td>أقل</td></tr></table><div class="info-b"><strong>📊 التحليل العلمي:</strong> الأرابيكا تحتوي على زيوت عطرية أكثر تعقيداً (أكثر من 800 مركب عطري)، مما يعطيها نكهات زهرية وفاكهية. الروبوستا تحتوي على ضعف الكافيين ومركبات كلوروجينيك أكثر، مما يعطيها نكهة أكثر مرارة وقسوة.</div><div class="err"><strong>❌ خطأ شائع:</strong> يعتقد البعض أن الأرابيكا والروبوستا من نفس النوع. الحقيقة أنهما نوعان مختلفان تماماً (species مختلفان)، لكل منهما خصائصه الفريدة في الزراعة والنكهة والاستخدام.</div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">🫘 بن الأرابيكا — نكهات معقدة</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=300&q=60" alt=""><div class="cap">☕ الروبوستا — قوة ومرارة</div></div></div><div class="q-section" id="q-a12" style="cursor:pointer" onclick="qAT(this)"><div class="q-q"><div class="q-t">💬 اختبار سريع — اضغط لاختيار الإجابة</div><p style="font-size:.9rem;color:#6d4c41">أي نوع بن يحتوي ضعف الكافيين ومركبات كلوروجينيك أكثر؟</p><div class="q-o" data-correct="0"><span class="ql">أ</span> أرابيكا</div><div class="q-o" data-correct="1"><span class="ql">ب</span> روبوستا</div><div class="q-o" data-correct="0"><span class="ql">ج</span> ليبيريكا</div><div class="q-o" data-correct="0"><span class="ql">د</span> إكسلسا</div></div></div>'},
{title:'من الغابة إلى المزروعات',img:9,body:'<h3>🌍 انتشار القهوة حول العالم</h3><p>من إثيوبيا انتقلت القهوة إلى اليمن ثم الحجاز، فمصر، فتركيا، ثم أوروبا عبر البندقية. في القرن 17، انتشرت المقاهي في أوروبا وأطلقت عليها اسم "مدارس الحكماء".</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🏛️ أول المقاهي الأوروبية — البندقية، القرن 17</div></div><p>شجرة القهوة العربية Coffea arabica نشأت في المرتفعات الإثيوبية. تنتشر اليوم في "حزام القهوة" (Coffee Belt) حول العالم: أمريكا اللاتينية، أفريقيا، وآسيا.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🗺️ خريطة حزام القهوة العالمي</div></div><div class="sum"><strong>💡 الخلاصة:</strong> القهوة قطعت رحلة آلاف الكيلومترات من غابات إثيوبيا لتصل إلى فنجانك اليوم. كل رشفة تحكي قصة آلاف السنين من التجارة والثقافة.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 اختبار سريع</div><p style="font-size:.9rem;color:#6d4c41">أين نشأت شجرة القهوة العربية Coffea arabica في الأصل؟</p><div class="q-o" data-correct="1"><span class="ql">أ</span> المرتفعات الإثيوبية</div><div class="q-o" data-correct="0"><span class="ql">ب</span> اليمن</div><div class="q-o" data-correct="0"><span class="ql">ج</span> إيطاليا</div><div class="q-o" data-correct="0"><span class="ql">د</span> البرازيل</div></div></div>'},
{title:'تشريح حبة البن — من الداخل',img:6,body:'<h3>🔬 تركيب حبة البن</h3><p>حبة البن هي بذرة ثمرة القهوة (الكرز). تتكون من عدة طبقات: القشرة الخارجية (Exocarp)، اللب الحلو (Mucilage/Mesocarp)، الغلاف الرقيق (Parchment/Endocarp)، طبقة الفضة (Silver Skin/Episperm)، وجنين البذرة (Endosperm).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🔬 تشريح حبة البن — الأجزاء الداخلية</div></div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=300&q=60" alt=""><div class="cap">🍒 كرزة القهوة الحمراء</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">🫘 البذور الخضراء (Green Beans)</div></div></div><div class="hl"><strong>📊 معلومة:</strong> كرزة القهوة الواحدة تحتوي عادة على بذرتين. أحياناً توجد بذرة واحدة فقط (peaberry) وتكون أكثر تركيزاً في النكهة. تمثل peaberry حوالي 5% من المحصول.</div><div class="q-section"><div class="q-q"><div class="q-t">💬 اختبار سريع</div><p style="font-size:.9rem;color:#6d4c41">ما هي الطبقة التي تُعرف بـ "Silver Skin" في حبة البن؟</p></div></div>'}
]},
{id:'module-A2',title:'أساسيات التحضير',icon:'⚗️',desc:'من الحبة إلى الفنجان — علم الاستخلاص',img:1,lessons:[
{title:'علم الاستخلاص فيزيائياً وكيميائياً',img:3,body:'<h3>🔬 فيزياء وكيمياء الاستخلاص</h3><p>الاستخلاص هو عملية إذابة المركبات القابلة للذوبان من البن المطحون في الماء. العوامل المؤثرة: درجة الطحن، درجة حرارة الماء (92-96°م)، نسبة القهوة للماء، وقت التلامس.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">⚗️ عملية الاستخلاص — القهوة المقطرة</div></div><div class="info-b"><strong>📊 التحليل العميق:</strong> النسبة المثلى للاستخلاص هي 18-22% من وزن القهوة. أقل من 18% = استخلاص ناقص (Under-extraction: طعم حامض ومالح). أكثر من 22% = استخلاص زائد (Over-extraction: طعم مر وجاف).</div><table><tr><th>العامل</th><th>التأثير</th><th>النطاق المثالي</th></tr><tr><td>درجة الطحن</td><td>أدق = أبطأ استخلاص</td><td>متوسط (مثل حبيبات السكر)</td></tr><tr><td>حرارة الماء</td><td>أعلى = استخلاص أسرع</td><td>92-96°م</td></tr><tr><td>وقت التلامس</td><td>أطول = استخلاص أكثر</td><td>2.5-4 دقائق</td></tr><tr><td>النسبة (قهوة:ماء)</td><td>أقل قهوة = استخلاص أسرع</td><td>1:15 إلى 1:17</td></tr></table><div class="err"><strong>❌ خطأ شائع:</strong> الماء المغلي مباشرة (100°م) يحرق القهوة ويسبب مرارة زائدة. الماء المثالي بين 92-96°م — اترك الغلاية 30 ثانية بعد الغليان.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 اختبار سريع</div><p style="font-size:.9rem;color:#6d4c41">النسبة المثلى للاستخلاص حسب SCA هي:</p><div class="q-o" data-correct="1"><span class="ql">أ</span> 18-22%</div><div class="q-o" data-correct="0"><span class="ql">ب</span> 10-15%</div><div class="q-o" data-correct="0"><span class="ql">ج</span> 25-30%</div><div class="q-o" data-correct="0"><span class="ql">د</span> 5-10%</div></div></div>'},
{title:'المعدات والأدوات — دليل شامل',img:2,body:'<h3>🧰 أدوات تحضير القهوة — مقارنة شاملة</h3><p>أشهر طرق التحضير: V60، Chemex، AeroPress، French Press، والإسبريسو. كل طريقة تعطي نكهة مختلفة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🧰 مجموعة أدوات تحضير القهوة المنزلية</div></div><table><tr><th>الطريقة</th><th>النكهة</th><th>الصعوبة</th><th>الوقت</th></tr><tr><td>V60</td><td>نظيفة، زهرية</td><td>متوسطة</td><td>2.5 دقيقة</td></tr><tr><td>Chemex</td><td>نظيفة جداً، خفيفة</td><td>متوسطة</td><td>4 دقائق</td></tr><tr><td>AeroPress</td><td>غنية، كاملة</td><td>سهلة</td><td>1.5 دقيقة</td></tr><tr><td>French Press</td><td>ثقيلة، زيتية</td><td>سهلة</td><td>4 دقائق</td></tr><tr><td>إسبريسو</td><td>مركزة، كريمية</td><td>صعبة</td><td>25-30 ثانية</td></tr></table><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">☕ V60</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=300&q=60" alt=""><div class="cap">⚗️ Chemex</div></div></div><div class="sum"><strong>💡 نصيحة:</strong> ابدأ بطريقة V60 — الأبسط والأكثر تحكماً في المتغيرات. أتقنها أولاً ثم جرب باقي الطرق.</div>'},
{title:'المقاييس والنسب الذهبية',img:10,body:'<h3>⚖️ علم النسب في القهوة</h3><p>النسبة الأساسية: 60 جرام قهوة لكل لتر ماء (1:16.7). للإسبريسو: 1:2 (قهوة:ماء).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">⚖️ الدقة في القياس — مفتاح الاتساق</div></div><div class="hl"><strong>📊 جدول النسب الذهبية:</strong> V60: 1:15-1:17 · AeroPress: 1:14-1:16 · French Press: 1:12-1:15 · إسبريسو: 1:2-1:3 · Cold Brew: 1:8-1:10</div><div class="q-section"><div class="q-q"><div class="q-t">📝 تمرين عملي</div><p style="font-size:.9rem;color:#6d4c41">استخدم ميزان القهوة لقياس 15 جرام بن. أضف 250 مل ماء عند 94°م. انتظر 3 دقائق واستمتع بأول فنجان احترافي!</p></div></div>'},
{title:'تمارين عملية — أول فنجان احترافي',img:3,body:'<h3>🛠️ دليل خطوة بخطوة</h3><p>الآن حان وقت التطبيق العملي. اتبع هذه الخطوات لتحضير أول فنجان قهوة باحترافية:</p><ol style="margin:12px 0 12px 20px"><li><strong>جهز الأدوات:</strong> V60، فلتر ورقي، غلاية بميزان حرارة، ميزان دقيق</li><li><strong>سخن الماء:</strong> اغلي الماء واتركه 30 ثانية ليصل إلى 94°م</li><li><strong>اطحن البن:</strong> درجة طحن متوسطة (مثل حبيبات السكر الخشن)</li><li><strong>وزن:</strong> 15 جرام بن + 250 جرام ماء</li><li><strong>صب:</strong> بلل البن أولاً بـ 30 مل وانتظر 30 ثانية (Blooming)</li><li><strong>استمر في الصب:</strong> على 3 مراحل متساوية</li><li><strong>انتظر:</strong> 2.5-3 دقائق إجمالي وقت التحضير</li><li><strong>استمتع:</strong> صب في الكوب المفضل لديك!</li></ol><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🛠️ تحضير V60 خطوة بخطوة</div></div><div class="sum"><strong>💡 الخلاصة:</strong> الممارسة تصنع الإتقان. كل مرة تحضر فيها قهوة، سجل الملاحظات: الطعم، الرائحة، وقت التحضير. ستتحسن مع كل مرة!</div>'}
]},
{id:'module-A3',title:'مشروبات الإسبريسو',icon:'☕',desc:'فن تحضير الإسبريسو والمشروبات المبنية عليه',img:4,lessons:[
{title:'ما هو الإسبريسو؟',img:7,body:'<h3>☕ تعريف الإسبريسو</h3><p>الإسبريسو مشروب مركّز يُحضّر بدفع الماء الساخن (92°م) تحت ضغط 9 بار عبر البن المطحون ناعماً (طحن إسبريسو).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">☕ الإسبريسو — قلب عالم القهوة الاحترافي</div></div><div class="info-b"><strong>📊 مواصفات الإسبريسو المثالي حسب SCA:</strong> 25-30 ثانية استخلاص · 25-35 مل حجم · 7-9 جرام جرعة · كريما ذهبية سميكة 3-5 مم · درجة حرارة 90-96°م</div><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">⏱️ التوقيت المثالي</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">🎯 الكريما الذهبية</div></div></div><div class="sc-b"><strong>🔬 مرجع SCA:</strong> الإسبريسو حسب معايير SCA هو 25-35 مل من الإسبريسو تُحضّر من 7-9 جرام بن في 25-30 ثانية عند 90-96°م و 9 بار ضغط.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 اختبار سريع</div><p style="font-size:.9rem;color:#6d4c41">كم ضغط الإسبريسو المثالي حسب SCA؟</p><div class="q-o" data-correct="0"><span class="ql">أ</span> 15 بار</div><div class="q-o" data-correct="0"><span class="ql">ب</span> 5 بار</div><div class="q-o" data-correct="0"><span class="ql">ج</span> 3 بار</div><div class="q-o" data-correct="1"><span class="ql">د</span> 9 بار</div></div></div>'},
{title:'لاتيه — فن الحليب',img:4,body:'<h3>🥛 لاتيه (Caffè Latte)</h3><p>إسبريسو + حليب مبخر (steamed milk) + طبقة رقيقة من الرغوة. النسبة: 1/3 إسبريسو + 2/3 حليب.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🥛 لاتيه — المشروب الأكثر شعبية في المقاهي حول العالم</div></div><p><strong>Latte Art (فن اللاتيه)</strong> هو فن صب الحليب على الإسبريسو لتشكيل رسومات (قلب، روزيتا، توليب). يبدأ بالحليب المناسب — حليب كامل الدسم عند درجة حرارة 55-65°م.</p><div class="hl"><strong>🖌️ أنواع فن اللاتيه:</strong> ❤️ القلب (Heart) — الأسهل للمبتدئين · 🌸 الروزيتا (Rosetta) — شكل ورق الشجر · 🌷 التوليب (Tulip) — متعدد الطبقات</div><div class="err"><strong>❌ خطأ شائع:</strong> تسخين الحليب لأكثر من 70°م يحرق البروتينات (اللاكتوز) ويفسد الطعم الحلو. الحرارة المثالية للتبخير: 55-65°م.</div>'},
{title:'كابتشينو وموكا',img:2,body:'<h3>☕ كابتشينو وموكا — المشروبات الكلاسيكية</h3><p><strong>الكابتشينو:</strong> إسبريسو + حليب مبخر + رغوة كثيفة بنسبة 1:1:1. سُمي على اسم رهبان الكابوتشين بسبب لون ردائهم البني.</p><p><strong>الموكا (Caffè Mocha):</strong> إسبريسو + شوكولاتة + حليب مبخر. ابتكرت في إيطاليا كخيار للحلويات.</p><div class="img-row"><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=60" alt=""><div class="cap">☕ كابتشينو كلاسيك</div></div><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=60" alt=""><div class="cap">🍫 موكا بالشوكولاتة</div></div></div><table><tr><th>المشروب</th><th>إسبريسو</th><th>حليب</th><th>رغوة</th><th>إضافات</th></tr><tr><td>لاتيه</td><td>1</td><td>2</td><td>خفيفة</td><td>-</td></tr><tr><td>كابتشينو</td><td>1</td><td>1</td><td>كثيفة</td><td>-</td></tr><tr><td>موكا</td><td>1</td><td>2</td><td>خفيفة</td><td>شوكولاتة</td></tr><tr><td>ماكياتو</td><td>1</td><td>½</td><td>قليلة</td><td>-</td></tr></table><div class="sum"><strong>💡 الخلاصة:</strong> الفرق بين لاتيه وكابتشينو هو كمية الرغوة. اللاتيه رغوة خفيفة، الكابتشينو رغوة كثيفة تعلو المشروب.</div>'}
]},
{id:'module-B1',title:'أسرار التحميص',icon:'🔥',desc:'علم تحميص القهوة من الأخضر إلى المحمص',img:2,lessons:[
{title:'كيمياء التحميص — تفاعل ميلارد',img:11,body:'<h3>🔥 علم تحميص القهوة</h3><p>التحميص هو تطبيق حرارة على البن الأخضر لتحويله كيميائياً وفيزيائياً إلى بن محمص صالح للاستخلاص. تبدأ الحبة باللون الأخضر وتنتهي باللون البني.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80" alt=""><div class="cap">🔥 عملية التحميص — من الأخضر إلى البني</div></div><div class="info-b"><strong>📊 التحليل العلمي العميق:</strong> تفاعل ميلارد (Maillard Reaction) يبدأ عند 150°م ويكون مسؤولاً عن النكهات المعقدة — نفس التفاعل الذي يعطي الخبز المحمص والستيك نكهته. عند أول crack (196°م)، يتمدد حجم الحبة بنسبة 50-80% ويتحول النشا إلى سكريات. عند ثاني crack (220°م)، تتحول الزيوت إلى سطح الحبة.</div><table><tr><th>المرحلة</th><th>درجة الحرارة</th><th>التغير الكيميائي</th><th>النكهة الناتجة</th></tr><tr><td>التجفيف</td><td>30-100°م</td><td>تبخر الرطوبة من 10% إلى 0%</td><td>بدون نكهة</td></tr><tr><td>تفاعل ميلارد</td><td>150-190°م</td><td>تفاعل الأحماض الأمينية مع السكريات</td><td>نكهات الخبز المحمص</td></tr><tr><td>First Crack</td><td>196°م</td><td>تمدد الحبة واندفاع البخار</td><td>حموضة زهرية</td></tr><tr><td>التطوير</td><td>196-220°م</td><td>تكسر الكلوروجينيك أسيد</td><td>نكهات كراميل</td></tr><tr><td>Second Crack</td><td>220°م+</td><td>احتراق السكريات وتكسر الزيوت</td><td>مدخن داكن</td></tr></table><div class="sc-b"><strong>🔬 مرجع SCA:</strong> مقياس Agtron يستخدم لقياس درجة التحميص رقمياً. #95 = فاتح جداً (الحموضة عالية)، #55 = متوسط (توازن)، #25 = داكن جداً (مرارة عالية).</div><div class="err"><strong>❌ خطأ شائع:</strong> التحميص الداكن يخفي عيوب البن الرديء. البن الفاخر (Specialty) يُحمص فاتحاً أو متوسطاً لإبراز نكهاته الطبيعية، وليس لإخفائها.</div><div class="q-section" onclick="qAT(this)" style="cursor:pointer"><div class="q-q"><div class="q-t">💬 اختبار سريع</div><p style="font-size:.9rem;color:#6d4c41">عند أي درجة حرارة يبدأ تفاعل ميلارد (Maillard)؟</p><div class="q-o" data-correct="0"><span class="ql">أ</span> 100°م</div><div class="q-o" data-correct="1"><span class="ql">ب</span> 150°م</div><div class="q-o" data-correct="0"><span class="ql">ج</span> 200°م</div><div class="q-o" data-correct="0"><span class="ql">د</span> 50°م</div></div></div>'},
{title:'منحنيات التحميص وضبط الماكينة',img:11,body:'<h3>📈 فن قراءة منحنيات التحميص</h3><p>منحنى التحميص (Roast Curve) هو رسم بياني يوثق درجة حرارة البن عبر الزمن. كل ماكينة تحميص لها بصمتها الحرارية الفريدة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">📈 منحنى تحميص — Rate of Rise (RoR)</div></div><p><strong>Rate of Rise (RoR):</strong> معدل ارتفاع الحرارة بالدرجة في الدقيقة. منحنى مثالي يبدأ بانحدار تدريجي. إذا زاد RoR عن 15°م/دقيقة، خطر حرق الحبة. إذا قل عن 5°م/دقيقة، يصبح التحميص باهتاً.</p><div class="info-b"><strong>📊 الثالوث الذهبي للتحميص:</strong> 1) وقت التجفيف (Drying time): 4-5 دقائق 2) وقت ميلارد (Maillard time): 3-5 دقائق 3) وقت التطوير (Development time): 20-25% من إجمالي وقت التحميص. Development Time Ratio = وقت ما بعد First Crack ÷ إجمالي وقت التحميص × 100.</div><div class="sum"><strong>💡 قاعدة تجريبية:</strong> لمعظم أنواع البن Single Origin، الوقت المثالي بين First Crack ونهاية التحميص هو 90-120 ثانية للتعبير عن نكهات الفواكه والحلاوة.</div>'},
{title:'تأثير التحميص على TDS والاستخلاص',img:10,body:'<h3>🔬 علاقة التحميص بالاستخلاص</h3><p>البن المحمص فاتحاً (Light Roast) أكثر كثافة وصلابة، يحتاج طحناً أدق وماءً أشد حرارة للاستخلاص. البن المحمص داكناً (Dark Roast) أكثر مسامية ويستخلص بسرعة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">🔬 مسامية الحبة تزداد مع التحميص</div></div><table><tr><th>درجة التحميص</th><th>مسامية</th><th>طحن مناسب</th><th>TDS متوقع</th></tr><tr><td>فاتح (Light)</td><td>منخفضة</td><td>ناعم</td><td>1.2-1.3%</td></tr><tr><td>متوسط (Medium)</td><td>متوسطة</td><td>متوسط</td><td>1.35-1.45%</td></tr><tr><td>داكن (Dark)</td><td>عالية</td><td>خشن</td><td>1.5-1.6%</td></tr></table><div class="err"><strong>❌ خطأ شائع:</strong> استخدام نفس الطحن لكل درجات التحميص. البن الفاتح يحتاج طحناً أدق لأن الخلايا أقل مسامية، والبن الداكن يحتاج طحناً أخشن لتجنب الاستخلاص الزائد.</div><div class="sc-b"><strong>🔬 مرجع IBA:</strong> معهد الباريستا الدولي يوصي بزيادة 1-2 درجة على مقياس الطحن لكل 10 نقاط Agtron زيادة (أي كلما افتح التحميص، كلما احتجت طحناً أدق).</div>'},
]},
{id:'module-B2',title:'علم الماء في القهوة',icon:'💧',desc:'جودة الماء وتأثيرها الحاسم على طعم القهوة',img:3,lessons:[
{title:'كيمياء الماء وتأثيره على الاستخلاص',img:8,body:'<h3>💧 الماء — المذيب المثالي للقهوة</h3><p>القهوة تتكون من 98-99% ماء. إذا كان الماء غير مناسب، يستحيل عمل قهوة جيدة بغض النظر عن جودة البن. الماء هو المذيب الذي يستخلص المركبات العطرية والنكهات من البن المطحون.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">💧 جودة الماء أساس القهوة الجيدة</div></div><p><strong>العناصر الرئيسية في الماء المؤثرة على القهوة:</strong></p><ul><li>الكالسيوم (Ca²⁺): ضروري لاستخلاص النكهات، يدعم الجسم والقوام</li><li>المغنيسيوم (Mg²⁺): الأهم! يعزز استخلاص الفواكه والحموضة الزهرية</li><li>البيكربونات (HCO₃⁻): تخفف الحموضة — كثرتها تطفئ النكهات</li><li>الصوديوم (Na⁺): بكميات قليلة يعزز الحلاوة</li></ul><table><tr><th>المعدن</th><th>الكمية المثلى</th><th>التأثير على النكهة</th><th>مشكلة النقص/الزيادة</th></tr><tr><td>المغنيسيوم</td><td>10-30 ppm</td><td>يزيد النكهات الزهرية والفاكهية</td><td>نقصه → استخلاص باهت</td></tr><tr><td>الكالسيوم</td><td>30-60 ppm</td><td>يقوي Body القهوة</td><td>زيادته → قسوة ومرارة</td></tr><tr><td>البيكربونات</td><td>40-80 ppm</td><td>تخفف الحموضة</td><td>كثرتها → قهوة مسطحة</td></tr></table><div class="info-b"><strong>📊 القياسات المرجعية SCA لماء القهوة:</strong> TDS: 150-175 ppm · العسر الكلي: 60-120 ppm · القلوية: 40-80 ppm CaCO₃ · pH: 6.5-7.5 · الصوديوم: <10 mg/L</div><div class="err"><strong>❌ خطأ شائع:</strong> الماء المقطر (0 TDS) يستخلص بسرعة زائدة ويعطي قهوة حامضة جداً لأنه لا يحتوي على معادن لتعديل الاستخلاص. الماء العسر جداً (>250 ppm) يمنع الاستخلاص ويعطي مرارة.</div>'},
{title:'TDS — مفتاح الاتساق والاحترافية',img:5,body:'<h3>📊 فهم مقياس TDS</h3><p>TDS (Total Dissolved Solids) هو إجمالي المواد الصلبة الذائبة في المشروب. يقاس بجهاز Refractometer. النسبة المثلى للقهوة المقطرة: 1.2-1.5%.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">📊 قياس TDS بجهاز Refractometer</div></div><p><strong>علاقة TDS بالاستخلاص:</strong> TDS × وزن المشروب ÷ وزن القهوة الجافة = Extraction Yield (نسبة الاستخلاص). النسبة المثلى: 18-22%.</p><p class="hl">مثال تطبيقي: 250 مل قهوة TDS=1.4% = 3.5 جرام مواد صلبة ذائبة. إذا استخدمت 20 جرام بن، يكون الاستخلاص = 3.5÷20×100 = 17.5% (استخلاص ناقص، زود الطحن أو الحرارة).</p><div class="sum"><strong>💡 نصيحة احترافية:</strong> احتفظ بسجل TDS لكل قهوة تحضرها. مع الوقت ستعرف العلاقة بين TDS والطعم المثالي لكل نوع بن. الاتساق هو الفرق بين الباريستا الجيد والممتاز.</div><div class="q-section"><div class="q-q"><div class="q-t">📝 تمرين عملي</div><p style="font-size:.9rem;color:#6d4c41">حضر قهوة V60 بالطريقة المعتادة. بعد التحضير، خذ 3 قراءات TDS واحسب المتوسط. سجل النتيجة وقارنها بـ 1.35%. هل تحتاج تعديل الطحن أو النسبة؟</p></div></div>'},
{title:'أنظمة معالجة المياه وفلاتر المقهى',img:8,body:'<h3>🛠️ اختيار نظام معالجة المياه</h3><p>كل مقهى محترف يحتاج نظام معالجة مياه. أنواع الفلاتر: الكربون النشط (يزيل الكلور والروائح)، التبادل الأيوني (يخفف العسر)، التناضح العكسي RO (يزيل كل شيء ويحتاج إعادة تمعدن).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🛠️ نظام معالجة مياه احترافي للمقاهي</div></div><table><tr><th>النظام</th><th>يزيل</th><th>المميزات</th><th>العيوب</th></tr><tr><td>كربون نشط</td><td>كلور، روائح</td><td>رخيص، سهل</td><td>لا يغير TDS</td></tr><tr><td>تبادل أيوني</td><td>عسر (Ca, Mg)</td><td>يضبط القلوية</td><td>يحتاج صيانة دورية</td></tr><tr><td>RO + إعادة تمعدن</td><td>كل شيء</td><td>تحكم كامل</td><td>غالي، يهدر ماء</td></tr></table><div class="hl"><strong>💡 توصية الخبراء:</strong> لمعظم المقاهي المتوسطة، كربون نشط + فلتريوم أيوني يكفي للوصول إلى TDS 150-175 ppm. للمقاهي الفاخرة، RO مع إضافة أملاح مخصصة للقهوة (Third Wave Water).</div><div class="err"><strong>❌ خطأ شائع:</strong> استخدام فلتر واحد فقط للمقهى بالكامل (ماكينة إسبريسو + ماء ساخن + باريستا). كل استخدام يحتاج معالجة مختلفة. ماكينة الإسبريسو تحتاج ماء أقل عسراً لمنع الترسبات الكلسية.</div>'},
]},
{id:'module-B3',title:'متغيرات التحضير المتقدمة',icon:'⚙️',desc:'علم الطحن والاستخلاص للاحتراف',img:1,lessons:[
{title:'توزيع حجم الطحن — Particle Size Distribution',img:2,body:'<h3>⚙️ علم الطحن: Particle Size Distribution</h3><p>الطحن ليس مجرد ناعم أو خشن. كل درجة طحن تنتج توزيعاً من الأحجام. المطحنة الجيدة تنتج توزيعاً ضيقاً (أغلب الحبيبات بنفس الحجم). المطحنة الرديئة تنتج غبار ناعم (Fines) وحبيبات خشنة (Boulders).</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">⚙️ توزيع أحجام الطحن — الفارق بين مطحنة جيدة ورديئة</div></div><p><strong>تأثير Fines و Boulders:</strong> الـ Fines تستخلص بسرعة وتسبب مرارة. الـ Boulders تستخلص ببطء وتسبب حموضة غير مرغوبة. النتيجة: قهوة حامضة ومرة في نفس الوقت.</p><div class="info-b"><strong>📊 قياس توزيع الطحن:</strong> مقياس Micron (ميكرون). الإسبريسو = 200-350 ميكرون · V60 = 500-800 ميكرون · French Press = 800-1200 ميكرون. النسبة المثلى للـ Fines أقل من 5% من الوزن.</div><div class="sc-b"><strong>🔬 مرجع SCA:</strong> SCA تقيس جودة المطحنة بمنحنى PSD (Particle Size Distribution). المطحنة الاحترافية يجب أن يكون منحناها bell-shaped ضيق (Standard Deviation < 100 ميكرون).</div><div class="err"><strong>❌ خطأ شائع:</strong> تنظيف المطحنة يومياً فقط. الـ Fines المتراكمة تتعفن وتسبب مرارة غير طبيعية. نظف المطحنة بين كل تغيير في درجة الطحن (بعد 3-4 استخدمات).</div>'},
{title:'منحنيات الاستخلاص — Extraction Yield',img:3,body:'<h3>📈 تحليل Extraction Yield</h3><p>Extraction Yield (EY) = نسبة المواد الذائبة من البن الجاف. النطاق المثالي حسب SCA: 18-22%. داخل هذا النطاق، يختلف الطعم حسب TDS.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">📈 جدول Extraction Yield — النقطة المثالية</div></div><p><strong>خريطة النكهات حسب EY:</strong></p><ul><li><strong>EY < 16%:</strong> استخلاص ناقص جداً — طعم مالح، حامض، ضعيف، يشبه ماء البن</li><li><strong>EY 16-18%:</strong> ناقص خفيف — حموضة عالية، حلاوة قليلة، Body خفيف</li><li><strong>EY 18-20%:</strong> مثالي للحموضة الزهرية — مثالي للـ Single Origin الفاتح</li><li><strong>EY 20-22%:</strong> مثالي للتوازن — قهوة كاملة، حلاوة، Body متوسط (المعيار الذهبي)</li><li><strong>EY 22-24%:</strong> زائد خفيف — مرارة خفيفة، طعم خشبي، Body ثقيل</li><li><strong>EY > 24%:</strong> استخلاص زائد — مرارة عالية، جفاف، رماد</li></ul><table><tr><th>إذا كان الطعم</th><th>المشكلة</th><th>الحل</th></tr><tr><td>حامض + مالح</td><td>Under-extraction</td><td>زد الحرارة أو انعم الطحن</td></tr><tr><td>مر + جاف</td><td>Over-extraction</td><td>قلل الحرارة أو اخشن الطحن</td></tr><tr><td>حامض ومر معاً</td><td>PSD سيئ (Fines+Boulders)</td><td>نظف المطحنة أو غير المطحنة</td></tr></table><div class="hl"><strong>💡 حل سريع:</strong> مشكلة تذوقها حامض ومر في نفس الوقت؟ غالباً المطحنة مشكلتها مش درجة الطحن. جرب نخلة غبار الطحن عبر sieve (منخل) 200 ميكرون.</div>'},
{title:'ضبط الوصفات الاحترافية — Dialing In',img:7,body:'<h3>🎯 علم ضبط الوصفات Dialing In</h3><p>كل نوع بن جديد يحتاج ضبط (Dial In). عملية منهجية لتحديد أفضل إعدادات: درجة الطحن، الجرعة، وقت التحضير، النسبة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">🎯 عملية Dial In الاحترافية</div></div><p><strong>بروتوكول Dial In للمبتدئين (4 خطوات):</strong></p><ol style="margin:12px 0 12px 20px"><li><strong>اختر النسبة:</strong> ابدأ بـ 1:16 للـ V60 (15 جرام بن: 240 مل ماء)</li><li><strong>ثبت الحرارة:</strong> 94°م لتحميص متوسط، 96°م لتحميص فاتح، 92°م لتحميص داكن</li><li><strong>اضبط الطحن:</strong> ابدأ بطحن متوسط كحبيبات السكر. القهوة تخلص في 2:30-3:00 دقائق → صح. أسرع من 2:00 → انعم الطحن. أبطأ من 3:30 → اخشن الطحن.</li><li><strong>اضبط الذوق:</strong> بعد الوصول للوقت المناسب، ذق. حامض → انعم قليلاً. مر → اخشن قليلاً.</li></ol><div class="info-b"><strong>📊 جداول ضبط الإسبريسو الاحترافي:</strong> جرعة: 18-20 جرام · وقت: 25-30 ثانية · حجم الخرج: 36-40 جرام (نسبة 1:2) · الضغط: 9 بار · الحرارة: 93°م. إذا تخلص الإسبريسو أسرع من 20 ثانية → انعم الطحن. أبطأ من 35 ثانية → اخشن الطحن.</div><div class="sum"><strong>💡 الخلاصة:</strong> Dial In عملية علمية منظمة. غير متغيراً واحداً فقط في كل مرة. سجل كل شيء. الاحتراف ليس موهبة — هو نظام توثيق وتكرار.</div>'},
]},
{id:'module-C1',title:'التقييم الحسي والكابينج',icon:'👅',desc:'علم تذوق القهوة الاحترافي SCA',img:3,lessons:[
{title:'فن الكابينج — تذوق احترافي',img:5,body:'<h3>👅 التقييم الحسي الاحترافي (Cupping)</h3><p>الكابينج هو طريقة موحدة لتقييم القهوة معتمدة من SCA. يقيم 10 معايير بمجموع 100 نقطة. القهوة التي تحصل على 80+ تصنف Specialty Grade.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">👅 جلسة كابينج احترافية — تقييم القهوة</div></div><div class="info-b"><strong>📊 معايير SCA للتقييم (100 نقطة):</strong> العطر (Fragrance/Aroma) 15% · النكهة (Flavor) 20% · الحموضة (Acidity) 10% · القوام (Body) 10% · المذاق النهائي (Aftertaste) 10% · التوازن (Balance) 10% · الحلاوة (Sweetness) 10% · النظافة (Clean Cup) 10% · التوحيد (Uniformity) 10% · الانطباع العام (Overall) 5%</div><p>تصنيفات SCA: 90-100 = Outstanding · 85-89.99 = Excellent · 80-84.99 = Very Good (Specialty) · <80 = Below Specialty (تجارية).</p><div class="err"><strong>❌ خطأ شائع جداً:</strong> الخلط بين الحموضة (Acidity) والمرارة (Bitterness). الحموضة نكهة مرغوبة تدل على جودة البن — تشبه حموضة الحمضيات أو التفاح. المرارة الزائدة تدل على استخلاص زائد أو تحميص داكن جداً.</div>'},
{title:'عجلة النكهات — Flavor Wheel',img:5,body:'<h3>🎨 عجلة نكهات القهوة — دليل التذوق</h3><p>عجلة النكهات (Coffee Flavor Wheel) طورها SCA بالتعاون مع World Coffee Research. تصنف النكهات هرمياً من عام إلى خاص. تبدأ من الوسط وتتوسع إلى الخارج.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">🎨 عجلة نكهات القهوة SCA — من العام إلى الخاص</div></div><p><strong>كيف تستخدم عجلة النكهات:</strong></p><ol style="margin:12px 0 12px 20px"><li><strong>الرائحة أولاً:</strong> شم القهوة المطحونة جافة، ثم بعد صب الماء، ثم بعد التحريك</li><li><strong>حدد الفئة العامة:</strong> فاكهي؟ زهري؟ شوكولاتي؟ متبل؟</li><li><strong>توسع للخارج:</strong> إذا فاكهي —> حمضيات؟ توت؟ فواكه استوائية؟</li><li><strong>سجل بدقة:</strong> استخدم مصطلحات محددة. ليس "طعمها حلو" بل "تذكرني بنكهة الكرز الأسود مع لمسة شوكولاتة داكنة"</li></ol><div class="hl"><strong>📊 المركبات الكيميائية المسؤولة:</strong> الليمونين (ليمون) ← Terpenes · الإيثيل أسيتات (فواكه) ← Esters · الغاياكول (مدخن) ← Phenols · ثنائي الأسيتيل (زبدة) ← Diketones · الإيثيل فانيلين (فانيليا) ← Aldehydes</div><div class="q-section"><div class="q-q"><div class="q-t">📝 تمرين تذوق</div><p style="font-size:.9rem;color:#6d4c41">جرب قهوتين مختلفتين جنباً إلى جنب. أغمض عينيك واشم أولاً. صف رائحة كل منهما بكلمة واحدة. ثم ذق وابحث في العجلة عن النكهة الأقرب. سجل كل شيء.</p></div></div>'},
{title:'بروتوكول الكابينج — خطوة بخطوة',img:5,body:'<h3>📋 بروتوكول الكابينج الرسمي SCA</h3><p>بروتوكول الكابينج موحد لضمان العدالة والموضوعية في التقييم. إليك الخطوات الرسمية حسب SCA:</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">📋 طاولة كابينج احترافية — 5 أكواب لكل عينة</div></div><p><strong>خطوات الكابينج الرسمي:</strong></p><ol style="margin:12px 0 12px 20px"><li><strong>تحضير العينات:</strong> 8.25 جرام بن + 150 مل ماء عند 93°م (نسبة 1:18.18)</li><li><strong>طحن:</strong> درجة طحن خشنة (مثل ملح البحر) — 70-75% من العينات تمر عبر منخل 20 ميش</li><li><strong>شم الرائحة الجافة:</strong> في غضون 15 دقيقة من الطحن</li><li><strong>صب الماء:</strong> صب الماء على البن وانتظر 4 دقائق</li><li><strong>كسر القشرة (Breaking):</strong> حرك القشرة السطحية بملعقة واشم الرائحة المتصاعدة</li><li><strong>إزالة القشرة:</strong> استخدم ملعقتين لإزالة القشرة والرغوة السطحية</li><li><strong>التذوق:</strong> بعد 10-12 دقيقة من الصب، ابدأ التذوق بسرعة — القهوة تبرد وتتغير</li><li><strong>التقييم:</strong> سجل كل معيار على حدة في ورقة التقييم SCA</li></ol><div class="info-b"><strong>📊 نصائح التذوق الاحترافي:</strong> استخدم ملعقة كابينج عميقة · امص القهوة بقوة مع صوت (Slurp) لرشها على كل براعم الذوق · انتظر 30 ثانية بين كل تذوقة · كل 4 عينات، نظف ذوقك بماء فاتر وخبز محايد.</div><div class="sum"><strong>💡 الخلاصة:</strong> الكابينج ليس مجرد تذوق، إنه نظام تقييم علمي. أتقن البروتوكول لتصبح Q Grader معتمداً من SCA.</div>'},
]},
{id:'module-C2',title:'إدارة المقهى الاحترافية',icon:'📊',desc:'إدارة العمليات والتكاليف في عالم القهوة',img:4,lessons:[
{title:'اختيار مصادر البن والتجارة العادلة',img:9,body:'<h3>🌍 من المزرعة إلى المقهى — سلسلة التوريد</h3><p>اختيار مصدر البن هو أهم قرار في المقهى. سلسلة التوريد: المزرعة → المعالجة → الوسيط → المستورد → المحمصة → المقهى. كل وسيط يضيف 10-20% للسعر.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80" alt=""><div class="cap">🌍 سلسلة توريد القهوة من المزرعة إلى الفنجان</div></div><p><strong>شهادات الاستدامة:</strong></p><ul><li><strong>Direct Trade:</strong> المقهى يشتري مباشرة من المزرعة — أعلى جودة، أعلى سعر، علاقة مباشرة</li><li><strong>Fair Trade:</strong> سعر عادل للمزارع — الحد الأدنى $1.40/باوند للأرابيكا، $1.01 للروبوستا</li><li><strong>Rainforest Alliance:</strong> تحافظ على الغابات المطيرة — 30% من إنتاج القهوة العالمي</li><li><strong>Organic:</strong> زراعة عضوية بدون مبيدات — 10% من الإنتاج العالمي</li></ul><div class="info-b"><strong>📊 أسعار البن 2024-2025:</strong> الأرابيكا التجارية: $2.5-3.5/باوند · Specialty: $5-12/باوند · Direct Trade الفاخر: $15-40/باوند (مثل Panama Geisha الذي قد يصل إلى $600/باوند في المزادات!).</div><div class="err"><strong>❌ خطأ شائع:</strong> افتراض أن السعر الأعلى = جودة أعلى دائماً. السعر يعكس أيضاً الندرة والتكاليف اللوجستية. اعرف من تتعامل معه واطلب عينات قبل الشراء.</div>'},
{title:'حساب التكاليف وإدارة المخزون',img:8,body:'<h3>💰 اقتصاديات المقهى — من التكلفة إلى الربح</h3><p>فهم التكاليف ضروري لاستمرارية المقهى. كلفة فنجان القهوة لا تقتصر على البن فقط.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80" alt=""><div class="cap">📊 تحليل تكلفة فنجان القهوة</div></div><p><strong>توزيع تكلفة الفنجان (مثال):</strong></p><ul><li>البن: 12-18 جرام بـ $0.15-0.30 للفنجان (8-12% من سعر البيع)</li><li>الحليب: $0.10-0.20 للفنجان (للمشروبات بالحليب)</li><li>الكوب والغطاء: $0.05-0.15</li><li>العمالة: $0.50-1.00 للفنجان (أكبر تكلفة تشغيلية)</li><li>الإيجار والمصاريف: $0.30-0.80 للفنجان</li></ul><table><tr><th>المشروب</th><th>تكلفة المواد</th><th>سعر البيع</th><th>هامش الربح</th></tr><tr><td>إسبريسو</td><td>$0.20</td><td>$2.50-3.50</td><td>85-92%</td></tr><tr><td>لاتيه</td><td>$0.45</td><td>$4.50-6.00</td><td>87-92%</td></tr><tr><td>V60 Specialty</td><td>$0.80-1.50</td><td>$5.00-8.00</td><td>70-84%</td></tr></table><div class="hl"><strong>💡 قاعدة 30%:</strong> تكلفة البن يجب ألا تتجاوز 30% من سعر بيع الفنجان. إذا اشتريت بناً بـ $8/باوند، كلفة 18 جرام = $0.32. أقل سعر بيع = $0.32 ÷ 0.30 = $1.07. أضف الحليب والتكاليف الأخرى للوصول للسعر النهائي.</div><div class="sum"><strong>💡 الخلاصة:</strong> المقهى الناجح = جودة عالية + تكاليف مضبوطة + تجربة مميزة. البن الجيد يجذب الزبائن، لكن الإدارة الجيدة تبقي المقهى مفتوحاً.</div>'},
{title:'تدريب فريق الباريستا ومعايير الجودة',img:8,body:'<h3>👥 بناء فريق باريستا احترافي</h3><p>فريق الباريستا هو وجه المقهى. تدريبهم وتقييمهم المستمر يضمن جودة ثابتة وتجربة زبون ممتازة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1559056199-641a0ac8b55e?w=600&q=80" alt=""><div class="cap">👥 فريق باريستا محترف في العمل</div></div><p><strong>برنامج تدريب الباريستا الأساسي (أسبوعان):</strong></p><ul><li>اليوم 1-2: نظرية القهوة (أصول، أنواع، تحميص) + اختبار نظري</li><li>اليوم 3-4: تشغيل الماكينة (طحن، جرع، ضبط) + تدريب عملي</li><li>اليوم 5-6: تبخير الحليب و Latte Art الأساسي</li><li>اليوم 7-8: المشروبات (إسبريسو، لاتيه، كابتشينو، موكا)</li><li>اليوم 9-10: النظافة، الصيانة، خدمة الزبائن، طلب الرصيد</li></ul><div class="info-b"><strong>📊 نظام تقييم الجودة اليومي:</strong> كل صباح، اسحب إسبريسو تجريبي وقيّمه: الوقت (25-30 ث) · اللون (بني ذهبي) · الكريما (3-5 مم، مستمرة) · الطعم (توازن بين الحموضة والحلاوة والمرارة). سجل في دفتر الجودة اليومي.</div><div class="err"><strong>❌ خطأ شائع:</strong> تدريب الباريستا الجديد على ماكينة الإسبريسو فقط. الباريستا المحترف يجب أن يتقن كل طرق التحضير: V60، Chemex، AeroPress، Cold Brew.</div><div class="hl"><strong>💡 نصيحة:</strong> اعمل جلسة تذوق أسبوعية للفريق. كل باريستا يحضر قهوته ويتذوقها الفريق ويناقش النكهات. هذا يبني لغة نكهات مشتركة ويرفع مستوى الفريق كله.</div>'},
]},

{title:'طرق المعالجة — مغسول، طبيعي، عسل',img:6,body:'<h3>🧪 طرق معالجة كرزة القهوة</h3><p>بعد حصاد كرز القهوة، يجب إزالة اللب والطبقات المحيطة بالبذرة قبل التحميص. طريقة المعالجة تؤثر بشكل جذري على نكهة القهوة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=600&q=80" alt=""><div class="cap">🧪 كرز القهوة قبل المعالجة — تختلف طرق المعالجة حسب المنطقة</div></div><p><strong>الطرق الثلاث الرئيسية:</strong></p><p><strong>1. المعالجة المغسولة (Washed):</strong> تزال القشرة واللب مباشرة، تخمر البذور في الماء 12-36 ساعة، ثم تغسل وتجفف. النتيجة: نكهات نظيفة، حموضة زاهية، Body خفيف.</p><p><strong>2. المعالجة الطبيعية (Natural):</strong> تجفف الكرزة كاملة مع لحمها تحت الشمس 3-4 أسابيع. النتيجة: نكهات فاكهية كثيفة (توت، فراولة)، Body ثقيل، حلاوة عالية.</p><p><strong>3. المعالجة بالعسل (Honey):</strong> تزال القشرة لكن يبقى بعض اللب اللزج (Mucilage) أثناء التجفيف. درجة اللون: أصفر ← أحمر ← أسود حسب كمية اللب المتبقي.</p><table><tr><th>الطريقة</th><th>النكهة</th><th>الجسم (Body)</th><th>الحموضة</th><th>استهلاك الماء</th></tr><tr><td>مغسول</td><td>نظيفة، زهرية</td><td>خفيف</td><td>عالية</td><td>40-50 لتر/كجم</td></tr><tr><td>طبيعي</td><td>فاكهية، كثيفة</td><td>ثقيل</td><td>متوسطة</td><td>0.5-1 لتر/كجم</td></tr><tr><td>عسل</td><td>حلوة، كراميل</td><td>متوسط</td><td>متوسطة-عالية</td><td>5-10 لتر/كجم</td></tr></table><div class="info-b"><strong>📊 مركب كيميائي فريد:</strong> المعالجة الطبيعية تنتج ضعف كمية ester-2-nonenone (نكهة التوت) مقارنة بالمغسولة. المغسولة تنتج ضعف كمية linalool (نكهة زهرية). اختيار طريقة المعالجة هو اختيار النكهة.</div><div class="err"><strong>❌ خطأ شائع:</strong> افتراض أن الطبيعي (Natural) أردأ جودة من المغسول. في الواقع، بعض أغلى أنواع القهوة في العالم (مثل اليمنية والإثيوبية الطبيعية) تُعالج طبيعياً وتعطي أعلى درجات التقييم.</div>'},
{title:'كيمياء التخمير وتأثيره على النكهة',img:6,body:'<h3>🔬 التخمير في القهوة — علم النكهات المخمرة</h3><p>التخمير (Fermentation) هو عملية تكسير السكريات في لب الكرزة بواسطة الكائنات الدقيقة (الخمائر والبكتيريا). ينتج مركبات عطرية جديدة لا توجد في القهوة غير المخمرة.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=600&q=80" alt=""><div class="cap">🔬 خزانات تخمير — التحكم في درجة الحرارة والوقت</div></div><p><strong>مركبات التخمير الرئيسية:</strong></p><ul><li><strong>الإيثانول:</strong> يتبخر بالتحميص لكنه ساعد في تكوين استرات</li><li><strong>حمض اللاكتيك:</strong> يعطي نكهة زبادي ناعمة، حموضة كريمية</li><li><strong>حمض الخليك:</strong> بكميات صغيرة يعطي حيوية، بكثرة يفسد القهوة</li><li><strong>الإسترات:</strong> مسؤولة عن نكهات الفواكه الطازجة (تفاح، أناناس)</li></ul><div class="info-b"><strong>📊 العوامل المؤثرة في التخمير:</strong> درجة الحرارة (18-25°م مثالية) · وقت التخمير (12-72 ساعة) · نوع الكائنات الدقيقة (طبيعية أو مُضافة) · الأكسجين (تخمير هوائي أم لاهوائي) · سماكة طبقة اللب. التخمير اللاهوائي (Anaerobic) ينتج نكهات أكثر كثافة وتعقيداً.</div><div class="hl"><strong>💡 اتجاه 2025:</strong> التخمير المُتحكم به (Controlled Fermentation) هو أحدث صيحة في القهوة الفاخرة. بعض المنتجين يضيفون خمائر محددة (Saccharomyces cerevisiae) لتحقيق نكهات معينة — مثل نبيذ القهوة!</div><div class="err"><strong>❌ خطأ شائع:</strong> التخمير الزائد (Over-fermentation) يعطي نكهة خلّية وكحولية غير مرغوبة. علامة التخمير الزائد: رائحة كحول قوية، طعم لاذع، لون بني غامق غير طبيعي للحبة المجففة.</div>'},
{title:'تقييم الجودة واختيار الموردين',img:1,body:'<h3>📋 نظام تقييم الجودة الشامل</h3><p>تقييم القهوة الخضراء قبل الشراء هو أهم خطوة لضمان جودة المنتج النهائي. يتضمن تقييم الحواس، الفحص الفيزيائي، والتحليل الكيميائي.</p><div class="img-c"><img src="https://images.unsplash.com/photo-1504630083234-14187a9df0f5?w=600&q=80" alt=""><div class="cap">📋 فحص البن الأخضر — المرحلة الأولى لضمان الجودة</div></div><p><strong>معايير فحص البن الأخضر (Green Coffee Grading):</strong></p><table><tr><th>المعيار</th><th>Specialty Grade</th><th>Premium</th><th>تجاري</th></tr><tr><td>عدد العيوب الأولية</td><td>0 كاملة</td><td>0-5</td><td>5+</td></tr><tr><td>عدد العيوب الثانوية</td><td>0-3</td><td>3-8</td><td>8+</td></tr><tr><td>نسبة الرطوبة</td><td>10-12%</td><td>10-12.5%</td><td>9-13%</td></tr><tr><td>النشاط المائي (Aw)</td><td>0.55-0.65</td><td>0.55-0.70</td><td>0.50-0.75</td></tr><tr><td>حجم الحبة (Screen Size)</td><td>>80% فوق 15</td><td>>70% فوق 15</td><td>أي حجم</td></tr></table><p><strong>العيوب الأولية (Primary Defects):</strong> حبة سوداء كاملة، حبة متعفنة، كرزة مجففة، حصاة كبيرة. عيب أولي واحد يخفض القهوة من Specialty إلى Premium.</p><div class="info-b"><strong>📊 أسئلة قبل شراء البن:</strong> 1) ما تاريخ الحصاد؟ (يفضل أقل من 12 شهراً) 2) ما نسبة الرطوبة؟ (10-12% مثالية) 3) هل تم تحليل العيوب؟ 4) هل يوجد عينات محمصة ومتذوقة؟ 5) هل السعر يشمل الشحن؟ 6) ما شروط التخزين عند المورد؟</div><div class="sum"><strong>💡 الخلاصة:</strong> تقييم الجودة ليس رفاهية — هو استثمار. بن جيد يمنحك قهوة ممتازة تبني سمعة المقهى. بن رديء يخسرك الزبائن حتى مع أمهر باريستا.</div><div class="q-section"><div class="q-q"><div class="q-t">📝 مشروع تخرج</div><p style="font-size:.9rem;color:#6d4c41">اجمع 3 عينات بن من 3 موردين مختلفين. قيم كل عينة: 1) الفحص البصري (عيوب، حجم) 2) التحميص التجريبي 3) الكابينج 4) احسب تكلفة الفنجان. قدم تقريراً مقارناً.</p></div></div>'},
]}
];

function cRatio(){

function cTDS(){
  let w=parseFloat($('tbw').value),td=parseFloat($('ttd').value),cd=parseFloat($('tcd').value);
  if(!w||!td||!cd){to('⚠️ أدخل القيم');return}

  let v=ey<16?'🔴 استخلاص ناقص جداً — زد الطحن أو الحرارة':ey<18?'🟡 ناقص خفيف — انعم الطحن قليلاً':ey<20?'🟢 مثالي للحموضة الزهرية':ey<22?'🟢 مثالي للتوازن (المعيار الذهبي)':ey<24?'🟡 زائد خفيف — اخشن الطحن قليلاً':'🔴 استخلاص زائد — اخشن الطحن أو قلل الحرارة';
  $('tr').innerHTML='<strong>وزن المشروب:</strong> '+w+' جم &nbsp;|&nbsp; <strong>TDS:</strong> '+td+'% &nbsp;|&nbsp; <strong>البن:</strong> '+cd+' جم<br>'+
    '<div style="font-size:1.3rem;color:#3e2312;margin:8px 0">EY = '+ey.toFixed(1)+'%</div>'+v;
}

    let ts=new Date().toISOString();
    let key='cert_'+l+'_'+n.replace(/\s/g,'_')+'_'+ts;
    await pA('c',{k:key,level:l,name:n,score:p,date:ts});
  }catch(e){}
  to('✅ تم حفظ الشهادة — شاهدها في تبويب الشهادات');
}

/* ===== Certificates View ===== */
function sV(){
  return '<div class="ap"><h2>🖨️ الشهادات المحفوظة</h2><div id="cv"><div style="color:#a67b5b;padding:20px;text-align:center">جارٍ تحميل الشهادات...</div></div></div>';
}

async function lC(){
  try{
    let d=await oD();
    let t=d.transaction('c','readonly');
    let q=t.objectStore('c').getAll();
    q.onsuccess=()=>{
      d.close();
      let certs=q.result;
      let e=$('cv');
      if(!certs||!certs.length){e.innerHTML='<div style="color:#a67b5b;padding:30px;text-align:center">📭 لا توجد شهادات بعد — اختبر مستواك واحصل على شهادتك!<br><button class="btn" onclick="rT(\'e\')" style="margin-top:16px">📝 ابدأ الاختبار</button></div>';return}
      let h='<p style="color:#6d4c41;margin-bottom:16px;font-size:.9rem">لديك <strong>'+certs.length+'</strong> شهادة:</p>';
      certs.sort((a,b)=>new Date(b.date)-new Date(a.date));
      certs.forEach(c=>{
        let lv=LV[c.level];
        let d=new Date(c.date);
        let ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        h+='<div class="cci" onclick="sCertV(\''+c.k+'\',\''+c.level+'\',\''+c.name+'\','+c.score+')"><div class="ccic">'+lv.ic+'</div><div class="ccid"><div class="cct">'+c.name+' — المستوى '+c.level+' ('+lv.t+')</div><div class="ccs">الدرجة: '+c.score+'%</div><div class="ccd">📅 '+ds+'</div></div></div>';
      });
      e.innerHTML=h;
    };
    q.onerror=()=>{d.close();$('cv').innerHTML='<div style="color:#e74c3c;padding:20px;text-align:center">⚠️ فشل تحميل الشهادات</div>'}
  }catch(e){$('cv').innerHTML='<div style="color:#e74c3c;padding:20px;text-align:center">⚠️ قاعدة البيانات غير متاحة</div>'}
}

function sCertV(k,l,n,p){
  let h='<button class="btn" onclick="lC()" style="margin-bottom:16px">⬅ العودة للشهادات</button>';
  h+=gCert(l,n,p);
  h+='<br><button class="btn" onclick="window.print()" style="background:#3e2312;color:white">🖨️ طباعة الشهادة</button>';
  $('cv').innerHTML=h;
  window.scrollTo(0,0);
}

/* ===== Admin ===== */
function sA(){
  return '<div class="ap"><h2>🔐 لوحة المشرف — إدارة الطلاب</h2>'+
    '<h3>➕ إضافة طالب</h3><div class="sf">'+
    '<input type="text" id="ni" placeholder="الاسم">'+
    '<input type="text" id="ui" placeholder="اسم المستخدم">'+
    '<input type="text" id="pi" placeholder="كلمة المرور">'+
    '<button class="btn" onclick="aS()">➕ إضافة</button></div>'+
    '<h3>📋 قائمة الطلاب</h3><div id="sl"><div style="color:#a67b5b;padding:20px;text-align:center">لا يوجد طلاب بعد</div></div></div>';
}

function oD(){return new Promise((r,j)=>{let q=indexedDB.open('edb',2);q.onupgradeneeded=e=>{let d=e.target.result;if(!d.objectStoreNames.contains('u'))d.createObjectStore('u',{keyPath:'k'});if(!d.objectStoreNames.contains('c'))d.createObjectStore('c',{keyPath:'k'})};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function gA(s){let d=await oD();return new Promise((r,j)=>{let t=d.transaction(s,'readonly'),q=t.objectStore(s).getAll();q.onsuccess=()=>{d.close();r(q.result)};q.onerror=()=>{d.close();j(q.error)}})}
async function pA(s,v){let d=await oD();return new Promise((r,j)=>{let t=d.transaction(s,'readwrite'),q=t.objectStore(s).put(v);q.onsuccess=()=>{d.close();r()};q.onerror=()=>{d.close();j(q.error)}})}
async function dA(s,k){let d=await oD();return new Promise((r,j)=>{let t=d.transaction(s,'readwrite'),q=t.objectStore(s).delete(k);q.onsuccess=()=>{d.close();r()};q.onerror=()=>{d.close();j(q.error)}})}

async function lS(){
  try{let a=await gA('u'),s=a.filter(x=>x.k!=='admin');let e=$('sl');if(!s.length){e.innerHTML='<div style="color:#a67b5b;padding:20px;text-align:center">لا يوجد طلاب بعد</div>';return}
  e.innerHTML=s.map(x=>'<div class="si"><div><strong>'+x.n+'</strong><br><span style="color:#6d4c41;font-size:.85rem">@'+x.k+'</span></div><button class="btn btn-rd btn-sm" onclick="dS(\''+x.k+'\')">🗑️ حذف</button></div>').join('')}
  catch(e){$('sl').innerHTML='<div style="color:#e74c3c;padding:20px;text-align:center">⚠️ قاعدة البيانات غير متاحة</div>'}
}

async function aS(){
  let n=$('ni').value.trim(),u=$('ui').value.trim(),p=$('pi').value.trim();
  if(!n||!u||!p){to('⚠️ املأ جميع الحقول');return}
  if(u==='admin'){to('⚠️ اسم المستخدم محجوز');return}
  try{await pA('u',{k:u,n,password:p,role:'student'})}catch(e){}
  $('ni').value='';$('ui').value='';$('pi').value='';to('✅ تم إضافة '+n);lS();
}
async function dS(u){try{await dA('u',u)}catch(e){}to('🗑️ تم حذف الطالب');lS()}

rT('c');
</script>
